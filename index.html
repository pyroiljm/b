    <style>
        /* ========== CSS Reset & Variables ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            /* Palette */
            --bg-main: #faf9f5;
            --bg-sidebar: #f0ede4;
            --bg-code: #f0ede4;
            --text-primary: #1f1e1b;
            --text-secondary: #6b6558;
            --accent-orange: #c96442;
            --border-light: #e8e5da;
            --shadow-light: rgba(0, 0, 0, 0.04);
            --shadow-medium: rgba(0, 0, 0, 0.08);

            /* Typography */
            --font-serif: 'Copernicus', 'Tiempos Text', 'Charter', 'Georgia', ui-serif, serif;
            --font-sans: 'Styrene B', 'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: var(--font-sans);
            color: var(--text-primary);
            background-color: var(--bg-main);
            overflow: hidden;
        }

        /* ========== Layout ========== */
        #app {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Sidebar */
        #sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding-top: env(safe-area-inset-top);
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
        }

        .sidebar-brand {
            display: block;
            font-family: var(--font-serif, var(--font-sans));
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
            margin-bottom: 12px;
            letter-spacing: -0.01em;
            cursor: pointer;
            line-height: 1.2;
            transition: color 0.12s ease;
        }

        .sidebar-brand:hover {
            color: var(--accent-orange, var(--text-primary));
        }

        #mobile-header .mobile-brand {
            cursor: pointer;
            color: inherit;
            text-decoration: none;
            transition: color 0.12s ease;
        }

        #mobile-header .mobile-brand:hover {
            color: var(--accent-orange, inherit);
        }

        .search-box {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            font-size: 14px;
            font-family: var(--font-sans);
            color: var(--text-primary);
            background-color: white;
        }

        .search-box::placeholder {
            color: var(--text-secondary);
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 12px 0;
        }

        .category {
            margin-bottom: 12px;
        }

        .category-header {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-secondary);
            padding: 12px 16px 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .category-entries {
            display: flex;
            flex-direction: column;
        }

        .entry-link {
            padding: 10px 16px;
            font-size: 14px;
            color: var(--text-primary);
            text-decoration: none;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.15s ease;
            word-break: break-word;
        }

        .entry-link:hover {
            background-color: rgba(201, 100, 66, 0.05);
        }

        .entry-link.active {
            background-color: rgba(201, 100, 66, 0.1);
            border-left-color: var(--accent-orange);
            color: var(--accent-orange);
            font-weight: 500;
        }

        .entry-link.hidden {
            display: none;
        }

        .entry-hint {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 4px;
        }

        /* Mobile: Hamburger & Overlay */
        #mobile-header {
            display: none;
            width: 100%;
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-light);
            padding: max(12px, env(safe-area-inset-top)) 16px 12px;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }

        .hamburger {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .hamburger span {
            display: block;
            width: 24px;
            height: 2px;
            background-color: var(--text-primary);
            margin: 5px 0;
            transition: all 0.3s ease;
        }

        #sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 998;
        }

        /* Main content */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: var(--bg-main);
        }

        #content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 32px max(32px, env(safe-area-inset-right)) 32px max(32px, env(safe-area-inset-left));
        }

        @media (max-width: 768px) {
            #sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                width: 280px;
                z-index: 999;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                padding-top: 0;
            }

            #sidebar.open {
                transform: translateX(0);
            }

            #sidebar-overlay {
                display: none;
            }

            #sidebar-overlay.visible {
                display: block;
            }

            #mobile-header {
                display: flex;
            }

            #content {
                padding: 20px 16px 20px max(16px, env(safe-area-inset-left));
            }
        }

        /* Content Typography */
        .content-pane {
            max-width: 720px;
            margin: 0 auto;
        }

        .landing {
            text-align: center;
            padding: 60px 20px;
        }

        .landing h1 {
            font-family: var(--font-serif);
            font-size: 32px;
            font-weight: 500;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .landing .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            font-style: italic;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .landing p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        h1 {
            font-family: var(--font-serif);
            font-size: 28px;
            font-weight: 500;
            margin-top: 0;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        h2 {
            font-family: var(--font-serif);
            font-size: 22px;
            font-weight: 500;
            margin-top: 28px;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        h2:first-child {
            margin-top: 0;
        }

        h3 {
            font-family: var(--font-serif);
            font-size: 18px;
            font-weight: 600;
            margin-top: 20px;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        h4 {
            font-size: 15px;
            font-weight: 600;
            margin-top: 16px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        p {
            font-size: 16px;
            line-height: 1.65;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        ul, ol {
            margin-bottom: 12px;
            padding-left: 24px;
        }

        li {
            margin-bottom: 6px;
            color: var(--text-primary);
            line-height: 1.65;
        }

        strong {
            font-weight: 600;
            color: var(--text-primary);
        }

        em {
            font-style: italic;
        }

        code {
            background-color: var(--bg-code);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            color: var(--text-primary);
        }

        pre {
            background-color: var(--bg-code);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        pre code {
            background: none;
            padding: 0;
            font-size: 13px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 12px;
            font-size: 14px;
        }

        th {
            background-color: var(--bg-code);
            padding: 10px;
            text-align: left;
            font-weight: 600;
            border: 1px solid var(--border-light);
        }

        td {
            padding: 10px;
            border: 1px solid var(--border-light);
        }

        tr:nth-child(even) {
            background-color: rgba(0, 0, 0, 0.02);
        }

        hr {
            border: none;
            height: 1px;
            background-color: var(--border-light);
            margin: 20px 0;
        }

        a {
            color: var(--accent-orange);
            text-decoration: none;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        a:hover {
            opacity: 0.7;
        }

        a.wiki-link {
            cursor: pointer;
            text-decoration: underline;
        }

        a.wiki-link.broken {
            opacity: 0.5;
            cursor: default;
        }

        /* Callouts */
        .callout {
            border-left: 4px solid;
            border-radius: 8px;
            padding: 12px 16px;
            margin: 12px 0;
            display: flex;
            gap: 12px;
        }

        .callout-icon {
            flex-shrink: 0;
            font-size: 18px;
            line-height: 1.4;
        }

        .callout-body {
            flex: 1;
        }

        .callout-title {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 14px;
        }

        .callout-tip {
            background-color: rgba(29, 153, 112, 0.08);
            border-left-color: #1d9970;
        }

        .callout-note {
            background-color: rgba(76, 126, 217, 0.08);
            border-left-color: #4c7ed9;
        }

        .callout-info {
            background-color: rgba(76, 126, 217, 0.08);
            border-left-color: #4c7ed9;
        }

        .callout-warning {
            background-color: rgba(217, 119, 6, 0.08);
            border-left-color: #d97706;
        }

        .callout-danger {
            background-color: rgba(220, 38, 38, 0.08);
            border-left-color: #dc2626;
        }

        blockquote {
            border-left: 4px solid var(--border-light);
            padding-left: 12px;
            color: var(--text-secondary);
            font-style: italic;
            margin: 12px 0;
        }

        /* ========== TL;DR Quick Reference Card ========== */
        .tldr-card {
            background: linear-gradient(135deg, #fdfcf7 0%, #f5f2e8 100%);
            border: 1px solid var(--border-light);
            border-left: 4px solid var(--accent-orange);
            border-radius: 12px;
            padding: 16px 18px;
            margin: 0 0 24px;
            box-shadow: 0 1px 2px var(--shadow-light);
        }

        .tldr-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--accent-orange);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .tldr-rows {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 6px 14px;
            font-size: 14px;
            line-height: 1.5;
        }

        .tldr-key {
            font-weight: 600;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .tldr-val {
            color: var(--text-primary);
        }

        .tldr-val strong,
        .tldr-val b {
            color: var(--accent-orange);
            font-weight: 600;
        }

        /* ========== Flowchart ========== */
        .flowchart {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0;
            margin: 20px 0;
            max-width: 100%;
        }

        .flow-box {
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 14px;
            line-height: 1.45;
            background: white;
            border: 1.5px solid var(--border-light);
            box-shadow: 0 1px 2px var(--shadow-light);
        }

        .flow-action {
            background: #fdfcf7;
            border-color: #e0ddd0;
        }

        .flow-action.flow-danger,
        .flow-branch.flow-danger {
            background: rgba(220, 38, 38, 0.06);
            border-color: #dc2626;
            color: #991b1b;
        }

        .flow-action.flow-safe,
        .flow-branch.flow-safe {
            background: rgba(29, 153, 112, 0.06);
            border-color: #1d9970;
            color: #0f5d44;
        }

        .flow-action.flow-info,
        .flow-branch.flow-info {
            background: rgba(76, 126, 217, 0.06);
            border-color: #4c7ed9;
            color: #1e3a6b;
        }

        .flow-action.flow-warn,
        .flow-branch.flow-warn {
            background: rgba(217, 119, 6, 0.06);
            border-color: #d97706;
            color: #78350f;
        }

        .flow-decision {
            background: white;
            border-color: var(--accent-orange);
            border-width: 2px;
            padding: 0;
            overflow: hidden;
        }

        .flow-decision-q {
            padding: 12px 16px;
            font-weight: 600;
            background: rgba(201, 100, 66, 0.08);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .flow-decision-q::before {
            content: "◆";
            color: var(--accent-orange);
            font-size: 12px;
        }

        .flow-branches {
            display: flex;
            flex-direction: column;
        }

        .flow-branch {
            padding: 10px 16px;
            border-top: 1px solid var(--border-light);
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 14px;
            line-height: 1.45;
        }

        .flow-branch-label {
            flex-shrink: 0;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.05em;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--bg-sidebar);
            color: var(--text-secondary);
            min-width: 36px;
            text-align: center;
            margin-top: 1px;
        }

        .flow-branch.flow-danger .flow-branch-label {
            background: rgba(220, 38, 38, 0.15);
            color: #991b1b;
        }

        .flow-branch.flow-safe .flow-branch-label {
            background: rgba(29, 153, 112, 0.15);
            color: #0f5d44;
        }

        .flow-branch.flow-info .flow-branch-label {
            background: rgba(76, 126, 217, 0.15);
            color: #1e3a6b;
        }

        .flow-branch.flow-warn .flow-branch-label {
            background: rgba(217, 119, 6, 0.15);
            color: #78350f;
        }

        .flow-branch-text {
            flex: 1;
        }

        .flow-arrow {
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1;
            position: relative;
        }

        .flow-arrow::before {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 2px;
            background: var(--border-light);
            transform: translateX(-50%);
            z-index: 0;
        }

        .flow-arrow::after {
            content: "▼";
            position: relative;
            z-index: 1;
            background: var(--bg-main);
            padding: 0 4px;
            color: var(--text-secondary);
            font-size: 10px;
        }

        /* ========== Entry Header with Breadcrumb ========== */
        .entry-breadcrumb {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.02em;
        }

        .entry-breadcrumb-category {
            font-weight: 600;
        }

        /* ========== Pinned tag pills (Red flags / Doses / Targets) ========== */
        .pills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 10px 0 18px;
        }

        .pill {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 999px;
            background: var(--bg-sidebar);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
        }

        .pill-danger { background: rgba(220,38,38,0.08); border-color: rgba(220,38,38,0.3); color: #991b1b; }
        .pill-safe   { background: rgba(29,153,112,0.08); border-color: rgba(29,153,112,0.3); color: #0f5d44; }
        .pill-info   { background: rgba(76,126,217,0.08); border-color: rgba(76,126,217,0.3); color: #1e3a6b; }
        .pill-warn   { background: rgba(217,119,6,0.08); border-color: rgba(217,119,6,0.3); color: #78350f; }

        /* ========== Landing chips ========== */
        .landing-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .landing-chip {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 10px;
            background: white;
            border: 1px solid var(--border-light);
            color: var(--text-primary) !important;
            text-decoration: none !important;
            font-size: 13px;
            line-height: 1.3;
            transition: all 0.15s ease;
            box-shadow: 0 1px 2px var(--shadow-light);
        }

        .oncall-chip {
            background: #fff7ed !important;
            border-color: var(--accent-orange) !important;
            color: var(--accent-orange) !important;
            font-weight: 600;
        }
        .oncall-chip:hover {
            background: var(--accent-orange) !important;
            color: white !important;
        }

        .landing-chip:hover {
            border-color: var(--accent-orange);
            color: var(--accent-orange) !important;
            opacity: 1 !important;
        }

        /* ========== Sidebar count badges ========== */
        .category-count {
            margin-left: auto;
            font-weight: 500;
            font-size: 10px;
            color: var(--text-secondary);
            background: rgba(0,0,0,0.04);
            padding: 1px 6px;
            border-radius: 999px;
        }

        /* ========== Recent & Favorites ========== */
        .sidebar-pin {
            padding: 6px 0 12px;
            border-bottom: 1px solid var(--border-light);
            margin-bottom: 6px;
        }

        .sidebar-pin .category-header {
            padding-top: 6px;
        }

        /* ========== Mobile polish ========== */
        @media (max-width: 768px) {
            h1 { font-size: 24px; margin-bottom: 16px; }
            h2 { font-size: 19px; }
            h3 { font-size: 16px; }
            p, li, .flow-box, .tldr-rows { font-size: 15px; }
            .tldr-card { padding: 14px; }
            .tldr-rows { grid-template-columns: 1fr; gap: 2px 0; }
            .tldr-key { margin-top: 8px; }
            .tldr-key:first-child { margin-top: 0; }
            table { font-size: 13px; }
            th, td { padding: 6px 8px; }
            pre { font-size: 12px; }
            .flow-box { padding: 10px 12px; }
            .flow-decision-q { padding: 10px 12px; }
            .flow-branch { padding: 8px 12px; }
        }

        /* Prevent iOS font zoom on focus */
        @supports (-webkit-touch-callout: none) {
            .search-box { font-size: 16px; }
        }
    </style>
</head>

    <script type="application/json" id="kb-data">
{
  "title": "Clinical Knowledge Base",
  "subtitle": "Singapore-oriented | NHG cluster | MOH CPG / GINA / KDIGO / GOLD / AHA/ACC",
  "categories": [
    {
      "name": "On-Call",
      "emoji": "🚨",
      "entries": [
        {
          "slug": "oncall-acls",
          "title": "ACLS — Cardiac Arrest (quick ref)",
          "markdown": "> [!danger] **Unresponsive + no pulse** → start CPR 30:2 • attach defib • call MET/code blue • IV/IO access\n\n### Shockable vs non-shockable (from rhythm strip)\n\n| Rhythm | First action | Then |\n|---|---|---|\n| VF / pulseless VT | **Shock** (150–200 J biphasic) → CPR 2 min → adrenaline 1 mg | Amiodarone 300 mg after 3rd shock ([[#acls-cardiac-arrest]]) |\n| PEA / asystole | **CPR 2 min + adrenaline 1 mg** ASAP | Search Hs & Ts ([[#acls-cardiac-arrest]]) |\n\n### Reversible causes (Hs & Ts) — where to look\n\n| Cause | Article |\n|---|---|\n| **H**ypoxia / Type 2 RF | [[#acute-respiratory-failure-niv-intubation]] · [[#peri-intubation-physiology]] |\n| **H**⁺ (acidosis) | [[#low-bicarbonate-metabolic-acidosis-workup]] · [[#elevated-lactate-full-differential]] |\n| **H**yperkalaemia | [[#hyperkalaemia-management-ladder]] |\n| **H**ypokalaemia / HypoMg | [[#recurrent-hypokalaemia]] · [[#other-electrolytes-hypernatraemia-ca-mg-phosphate]] |\n| **H**ypovolaemia / bleeding | [[#shock-classification-approach]] · [[#massive-transfusion-protocol]] |\n| **T**hrombosis — PE | [[#pulmonary-embolism-diagnosis-risk-stratification]] |\n| **T**hrombosis — MI | [[#acute-coronary-syndrome-acs-nstemi-unstable-angina]] |\n| **T**amponade / tension pneumo | [[#peri-intubation-physiology]] |\n| **T**oxins / anaphylaxis | [[#anaphylaxis-recognition-management]] |\n\n### Post-ROSC\n- 12-lead ECG → if STEMI → [[#acute-coronary-syndrome-acs-nstemi-unstable-angina]]\n- Targeted temperature 32–36 °C ≥24 h; sedation + ventilation: [[#peri-intubation-physiology]]\n- Full post-arrest workup: [[#acls-cardiac-arrest]]\n"
        },
        {
          "slug": "oncall-chest-pain",
          "title": "Chest Pain (quick ref)",
          "markdown": "> [!danger] Life-threats to rule out FAST: **ACS, PE, aortic dissection, tension pneumo, oesophageal rupture.**\n\n### Step 1 — ECG within 10 min + observations\n\n| Finding | Go to |\n|---|---|\n| ST elevation / new LBBB | [[#acute-coronary-syndrome-acs-nstemi-unstable-angina]] (cath-lab pathway) |\n| ST depression / T-wave inversion + troponin rise | [[#acute-coronary-syndrome-acs-nstemi-unstable-angina]] (NSTEMI pathway) |\n| Sinus tachy + hypoxia + pleuritic pain | [[#pulmonary-embolism-diagnosis-risk-stratification]] |\n| Tearing pain, BP asymmetry, wide mediastinum | Aortic dissection → CT aorta + cardiothoracic |\n| Sudden SOB + unilateral ↓ breath sounds | Tension pneumo — decompress → [[#peri-intubation-physiology]] |\n| Post-vomiting + subcut emphysema | Boerhaave — CT + surgery |\n\n### Step 2 — Differential by character\n\n| Character | Likely | Article |\n|---|---|---|\n| Crushing, radiation, diaphoretic | ACS | [[#acute-coronary-syndrome-acs-nstemi-unstable-angina]] |\n| Pleuritic + SOB | PE / pneumonia / pneumothorax | [[#pulmonary-embolism-diagnosis-risk-stratification]] · [[#community-acquired-pneumonia]] |\n| Positional, worse on lying | Pericarditis — treat NSAID + colchicine |\n| Burning, post-prandial, nocturnal | GORD | [[#gastro-oesophageal-reflux-disease-gord-h-pylori]] |\n| Reproducible on palpation | MSK / costochondritis — reassure, NSAID |\n\n### Step 3 — Workup baseline\n- Troponin (× serial) · CXR · d-dimer if PE possible ([[#pulmonary-embolism-diagnosis-risk-stratification]] has Wells/PERC)\n- Full ECG read: [[#ecg-interpretation-systematic-approach]] · [[#ecg-visual-pattern-recognition]]\n"
        },
        {
          "slug": "oncall-hypotension",
          "title": "Hypotension / Shock (quick ref)",
          "markdown": "> [!danger] SBP <90 or MAP <65, or drop >40 from baseline → act now. **IV access × 2, bolus 500 mL crystalloid, call for help.**\n\n### Step 1 — Classify the shock\nFull approach: [[#shock-classification-approach]]\n\n| Clue | Shock type | Article |\n|---|---|---|\n| Warm, bounding pulse, fever, ↑lactate | Distributive (septic) | [[#sepsis-septic-shock-sepsis-3-resuscitation-antibiotics]] |\n| Hives + stridor + bronchospasm | Distributive (anaphylactic) | [[#anaphylaxis-recognition-management]] |\n| ↑JVP, crackles, S3 | Cardiogenic | [[#acute-coronary-syndrome-acs-nstemi-unstable-angina]] · [[#heart-failure-classification-gdmt]] |\n| Obvious blood loss / melaena | Haemorrhagic | [[#upper-gi-bleed-assessment-scoring-management]] · [[#massive-transfusion-protocol]] |\n| Pleuritic chest pain + hypoxia | Obstructive (PE) | [[#pulmonary-embolism-diagnosis-risk-stratification]] |\n| ↑JVP + muffled HS + pulsus paradoxus | Tamponade | Cardiac echo STAT |\n\n### Step 2 — Rate-related?\n\n| Rhythm | Article |\n|---|---|\n| Tachy → SVT / VT / AF with RVR | [[#tachycardia-acute-management]] · [[#atrial-fibrillation-acute-chronic]] |\n| Brady → high-grade block / inferior MI | [[#bradycardia-heart-block]] |\n\n### Step 3 — Fluid choice\n[[#fluid-therapy-which-fluid-when]] — crystalloid vs colloid vs blood decisions.\n\n### Step 4 — Endpoints + escalation\n- Lactate clearance: [[#elevated-lactate-full-differential]]\n- CO₂ gap for adequacy of resuscitation: [[#co2-gap-pv-aco2]]\n- If still hypotensive after 30 mL/kg → vasopressor (NA) → ICU\n"
        },
        {
          "slug": "oncall-desaturation",
          "title": "Desaturation (quick ref)",
          "markdown": "> [!danger] SpO₂ <90% → sit up, O₂ on, ABG, call for help. Re-check probe + waveform. **Not all desaturation is a lung problem — see below.**\n\n### Step 1 — Is it really hypoxia?\n- Probe placement, perfusion (warm peripheries), nail polish, waveform on monitor\n- **ABG** confirms PaO₂ + gives **pCO₂** + **A-a gradient** + **lactate**\n\n### Step 2 — A-a gradient: lung or not?\nFull teaching: [[#abg-interpretation-systematic-approach]]\n\n| A-a gradient | Implication |\n|---|---|\n| **Raised** + hypoxia | Lung pathology (V/Q mismatch, shunt, diffusion) |\n| **Normal** + hypoxia | Hypoventilation or low FiO₂ |\n\n### Step 3 — By pattern\n\n| Pattern | Think of | Go to |\n|---|---|---|\n| Wheeze, ↓PEF, tripoding | Asthma exacerbation | [[#asthma-gina-2023]] |\n| Smoker, productive cough, CO₂ rise | COPD exacerbation | [[#copd-gold-staging-exacerbation]] |\n| Fever + focal crepitations + CXR consolidation | Pneumonia | [[#community-acquired-pneumonia]] |\n| Pink frothy sputum, bilateral crackles, ↑JVP | APO / HF | [[#heart-failure-classification-gdmt]] |\n| Sudden pleuritic pain + sinus tachy + hypoxia | PE | [[#pulmonary-embolism-diagnosis-risk-stratification]] |\n| Bilateral infiltrates + sepsis | ARDS | [[#acute-respiratory-failure-niv-intubation]] |\n| Unilateral ↓ breath sounds + stony dull | Pleural effusion | [[#pleural-effusion-pleural-studies]] |\n| ↓GCS + ↑pCO₂ + normal A-a | Hypoventilation (opioid, neuromuscular) | [[#acute-respiratory-failure-niv-intubation]] |\n| **High lactate + unexplained desaturation** | **Desaturation trap — compensating for acidosis** | [[#elevated-lactate-full-differential]] |\n\n### Step 4 — Escalation ladder\n- Devices: [[#oxygen-therapy-devices-flow-rates]] — NC → HFM → HFNC\n- NIV vs intubation decisions: [[#acute-respiratory-failure-niv-intubation]]\n- If intubating: [[#peri-intubation-physiology]] (preoxygenation pitfalls)\n"
        },
        {
          "slug": "arrhythmias-quick-ref",
          "title": "Arrhythmias (quick ref)",
          "markdown": "> [!danger] HR >150 + SBP <90 / chest pain / ↓LOC / APO → **synchronised DC cardioversion** — [[#tachycardia-acute-management]]\n\n### Step 1 — Narrow vs wide QRS, regular vs irregular\n\n| QRS | Regular? | Likely rhythm | Article |\n|---|---|---|---|\n| Narrow (<120 ms) | Yes | Sinus tachy, atrial flutter, SVT (AVNRT/AVRT) | [[#tachycardia-acute-management]] |\n| Narrow | No | AF, MAT | [[#atrial-fibrillation-acute-chronic]] |\n| Wide (>120 ms) | Yes | **VT** (assume until proven otherwise) · SVT with aberrancy | [[#tachycardia-acute-management]] |\n| Wide | No | Pre-excited AF (WPW) · polymorphic VT / torsades | [[#tachycardia-acute-management]] |\n\nECG morphology help: [[#ecg-visual-pattern-recognition]] · [[#ecg-interpretation-systematic-approach]]\n\n### Step 2 — Is the tachy appropriate? (don't chase sinus tachy)\n\n| Driver | Article |\n|---|---|\n| Sepsis / fever | [[#sepsis-septic-shock-sepsis-3-resuscitation-antibiotics]] |\n| Hypovolaemia / bleed | [[#shock-classification-approach]] · [[#upper-gi-bleed-assessment-scoring-management]] |\n| PE | [[#pulmonary-embolism-diagnosis-risk-stratification]] |\n| Anaphylaxis | [[#anaphylaxis-recognition-management]] |\n| Pain, anxiety, delirium | [[#delirium-acute-confusion]] |\n| Thyroid storm | [[#thyroid-disease-hypothyroidism-hyperthyroidism-emergencies]] |\n| DKA | [[#dka-hhs-diagnosis-protocol-monitoring]] |\n| Toxins (cocaine, amphetamine, salbutamol) | [[#elevated-lactate-full-differential]] |\n\n### Tachy-arrhythmias — where to read more\n\n| Rhythm | Article |\n|---|---|\n| AF — acute & chronic | [[#atrial-fibrillation-acute-chronic]] |\n| SVT (AVNRT/AVRT) | [[#tachycardia-acute-management]] |\n| Atrial flutter | [[#tachycardia-acute-management]] |\n| VT (mono / poly) | [[#tachycardia-acute-management]] · [[#acls-cardiac-arrest]] |\n| VF / pulseless VT | [[#acls-cardiac-arrest]] |\n| Torsades | [[#tachycardia-acute-management]] — MgSO₄ 2 g + fix QT drivers |\n\n### Brady-arrhythmias\n\n| Rhythm | Article |\n|---|---|\n| Sinus brady / junctional | [[#bradycardia-heart-block]] |\n| 2° Mobitz I (Wenckebach) | [[#bradycardia-heart-block]] |\n| 2° Mobitz II / 3° complete | [[#bradycardia-heart-block]] — pace |\n\n### Red-flag ECG patterns — where to start\n\n| Pattern | Article |\n|---|---|\n| Wide QRS, peaked T, sine wave | [[#hyperkalaemia-management-ladder]] |\n| Long QT / torsades | [[#tachycardia-acute-management]] |\n| Delta wave + short PR (WPW) | [[#tachycardia-acute-management]] — avoid AV-nodal blockers if AF |\n| STEMI morphology | [[#acute-coronary-syndrome-acs-nstemi-unstable-angina]] |\n| Brugada, HCM, Wellens | [[#ecg-visual-pattern-recognition]] |\n\n### Stabilise first\n\n- **Unstable (any):** synchronised shock 100 J biphasic (or unsynchronised if polymorphic VT / VF)\n- **Stable narrow regular:** vagal → adenosine 6 mg → 12 mg\n- **Stable wide regular:** amiodarone 300 mg IV over 20–60 min (or procainamide if WPW-AF suspected)\n- **Stroke risk in AF:** [[#anticoagulation-by-indication]] · agent & reversal [[#anticoagulation-agents-dosing-reversal]]\n"
        },
        {
          "slug": "oncall-dka-hhs",
          "title": "DKA / HHS (quick ref)",
          "markdown": "> [!danger] DKA: **glucose + ketones + acidosis** (pH <7.3, HCO₃ <15, ketones ≥3). HHS: hyperosmolar (>320), minimal ketones. Full protocol → [[#dka-hhs-diagnosis-protocol-monitoring]]\n\n### Bedside triage\n\n| Step | Do | Link |\n|---|---|---|\n| 1. Secure + fluids | 0.9% NaCl 1 L STAT | [[#fluid-therapy-which-fluid-when]] |\n| 2. K⁺ | Wait for first K — give KCl in bag before insulin | [[#hyperkalaemia-management-ladder]] (if ↑K) · [[#recurrent-hypokalaemia]] (if ↓K) |\n| 3. Insulin | 0.1 u/kg/h fixed-rate — **only after K known** | [[#dka-hhs-diagnosis-protocol-monitoring]] |\n| 4. Monitor | Hourly glucose + ketones + VBG + K | [[#dka-hhs-diagnosis-protocol-monitoring]] |\n| 5. Find precipitant | Infection, MI, missed dose, new T1DM | [[#sepsis-septic-shock-sepsis-3-resuscitation-antibiotics]] · [[#acute-coronary-syndrome-acs-nstemi-unstable-angina]] |\n\n### Common complications\n\n| Complication | Article |\n|---|---|\n| Raised anion-gap acidosis / high lactate | [[#elevated-lactate-full-differential]] · [[#low-bicarbonate-metabolic-acidosis-workup]] |\n| Corrected sodium — calculate before correcting | [[#hyponatraemia-workup-correction]] |\n| Cerebral oedema in children — slow fluids | [[#dka-hhs-diagnosis-protocol-monitoring]] |\n| Euglycaemic DKA (SGLT2i) | [[#type-2-diabetes-moh-cpg-2023-dose-ladders]] · [[#dka-hhs-diagnosis-protocol-monitoring]] |\n\n### Resolution criteria & switch back to SC insulin\nFull conversion: [[#dka-hhs-diagnosis-protocol-monitoring]] (pH >7.3, HCO₃ >15, ketones <0.6, eating).\n"
        },
        {
          "slug": "oncall-gcs-drop",
          "title": "GCS Drop / ↓LOC (quick ref)",
          "markdown": "> [!danger] **ABC first** — if GCS ≤8, protect airway (position, suction, NP airway, anaesthetic call). Intubation pitfalls: [[#peri-intubation-physiology]]\n\n### Step 1 — Bedside reversible screen (DON'T STOP)\n**D**extrose · **O**xygen · **N**aloxone · **T**hiamine · **S**tatus epilepticus · **T**emperature · **O**snolarity/sodium · **P**upils\n\n| Finding | Action | Article |\n|---|---|---|\n| Pinpoint pupils | Naloxone 0.4–2 mg IV | — |\n| Cap glucose low | 50 mL 50% dextrose (100 mL 10%) | [[#recurrent-hypoglycaemia]] |\n| Seizing / post-ictal | Load + workup | [[#status-epilepticus]] |\n| Alcoholic / malnourished | **Thiamine BEFORE glucose** | [[#elevated-lactate-full-differential]] (Wernicke warning) |\n\n### Step 2 — Structural vs toxic-metabolic\n\n| Lateralising signs / ↓pupil reactivity | Structural |\n|---|---|\n| → CT head + neurosurgery | [[#acute-ischaemic-stroke-thrombolysis-thrombectomy-secondary-prevention]] |\n| Generalised, no focal signs | Toxic-metabolic |\n\n### Step 3 — Common toxic-metabolic causes\n\n| Cause | Article |\n|---|---|\n| Hypoglycaemia | [[#recurrent-hypoglycaemia]] |\n| Hypo/hypernatraemia | [[#hyponatraemia-workup-correction]] · [[#other-electrolytes-hypernatraemia-ca-mg-phosphate]] |\n| Sepsis / fever | [[#sepsis-septic-shock-sepsis-3-resuscitation-antibiotics]] |\n| Meningitis / encephalitis | [[#meningitis-encephalitis]] |\n| Uraemia | [[#aki-kdigo-criteria-approach]] · [[#rrt-modalities]] |\n| Hepatic encephalopathy | [[#liver-disease-lft-interpretation-hepatitis-cirrhosis]] |\n| Hypercapnia (Type 2 RF) | [[#acute-respiratory-failure-niv-intubation]] |\n| Post-ictal / NCSE | [[#status-epilepticus]] |\n| Delirium (elderly) | [[#delirium-acute-confusion]] |\n| Dementia decompensation | [[#dementia-screening-management]] |\n| Thyroid (myxoedema coma) | [[#thyroid-disease-hypothyroidism-hyperthyroidism-emergencies]] |\n\n### Workup minimum\nCT head · ABG · glucose · FBC · UEC · LFT · TFT · Mg · Ca · Phos · septic screen · drug/tox · ammonia if liver disease.\n"
        },
        {
          "slug": "oncall-hb-drop",
          "title": "Haemoglobin Drop (quick ref)",
          "markdown": "> [!danger] **Is the patient bleeding NOW?** Obvious external source? Haemodynamic? If so → group & crossmatch + activate MTP if needed → [[#massive-transfusion-protocol]]\n\n### Step 1 — Acute vs chronic (trend the Hb)\n\n| Pattern | Implication |\n|---|---|\n| Sudden drop + haemodynamic instability | Active bleed — find the source |\n| Slow drift over days | Haemolysis, dilution, marrow failure |\n\n### Step 2 — Find the source\n\n| Clue | Likely | Article |\n|---|---|---|\n| Haematemesis / melaena | Upper GIB | [[#upper-gi-bleed-assessment-scoring-management]] |\n| Fresh PR blood / clots | Lower GIB (or brisk UGIB!) | [[#lower-gi-bleed]] |\n| Post-op / trauma | Surgical source — call team |\n| PV bleed + pregnancy | O&G emergency | [[#pre-eclampsia-obstetric-emergencies]] (if peripartum) |\n| Retroperitoneal (anticoag + pain) | CT + reverse | [[#anticoagulation-agents-dosing-reversal]] |\n| Haemolysis (↑LDH, ↑bili, ↓haptoglobin) | Intravascular vs extravascular | [[#haematology-by-lineage]] |\n\n### Step 3 — Transfuse\n\n| Threshold | Action | Article |\n|---|---|---|\n| Hb <7 (stable) | Pack cells × 1 | [[#blood-transfusion-indications-thresholds-reactions]] |\n| Hb <8 + cardiac disease / ACS | Pack cells | [[#blood-transfusion-indications-thresholds-reactions]] |\n| Massive haemorrhage | Activate MTP | [[#massive-transfusion-protocol]] |\n| Coagulopathic bleed | FFP ± cryo ± platelets | [[#teg-rotem-interpretation]] |\n\n### Step 4 — Reverse + support\n- Anticoag / antiplatelet reversal: [[#anticoagulation-agents-dosing-reversal]]\n- Fluid resuscitation: [[#fluid-therapy-which-fluid-when]]\n- Shock framework: [[#shock-classification-approach]]\n"

          "markdown": "> [!warning] Shockable vs Non-shockable determines adrenaline timing\n\n### Universal Sequence\n1. Confirm: unresponsive, no breathing (agonal counts), no pulse <10 sec\n2. Call crash team / defibrillator\n3. CPR: 30:2 | Rate 100–120/min | Depth 5–6 cm | Full chest recoil | Switch compressor q2 min\n4. Attach defibrillator ASAP\n\n---\n\n### Shockable: VF / Pulseless VT\n\n> [!danger] Resume CPR IMMEDIATELY post-shock — do NOT pause to check pulse\n\n**Loop every 2 minutes:**\n- → Shock **200J biphasic** (escalate each cycle) | Monophasic 360J\n- → Resume CPR immediately\n- → **Adrenaline 1 mg IV**: give AFTER 2nd shock, then every 3–5 min (alternate loops)\n- → **Amiodarone**: 300 mg IV bolus after 3rd shock | 150 mg IV after 5th shock\n- → Treat 4H4T\n- → Rhythm check q2 min\n\n> [!note] In VF: adrenaline after 2nd shock (not before — early defibrillation is priority)\n\n---\n\n### Non-Shockable: PEA / Asystole\n\n> [!danger] Treat reversible causes — this is the key\n\n**Loop every 2 minutes:**\n- → CPR × 2 min (no shock)\n- → **Adrenaline 1 mg IV IMMEDIATELY** on access, then q3–5 min\n- → Treat 4H4T\n- → Rhythm check q2 min → if shockable → switch algorithm\n\n> [!note] Atropine removed from guidelines (2010). Do NOT use.\n\n---\n\n### 4H4T — Reversible Causes\n\n| 4H | 4T |\n|---|---|\n| **H**ypoxia → BVM O₂, secure airway | **T**ension PTX → needle decompression 2nd ICS MCL → drain |\n| **H**ypovolaemia → 500 mL–1 L crystalloid (blood if haemorrhage) | **T**amponade → pericardiocentesis (USS-guided) |\n| **H**ypo/HyperK + metabolic → check BG, K⁺; NaHCO₃ if hyperK/acidosis | **T**hrombosis PE → alteplase 50 mg IV push; CPR ×60–90 min after |\n| **H**ypothermia → rewarm; CPR until ≥35°C or \"warm and dead\" | **T**hrombosis MI → primary PCI post-ROSC; thrombolysis if PCI unavailable |\n| | **T**oxins → specific antidotes; NaHCO₃ for TCA (wide QRS) |\n\n---\n\n### Arrest Drugs\n\n| Drug | Dose | Indication |\n|---|---|---|\n| Adrenaline | 1 mg IV q3–5 min | All arrests (timing differs by rhythm) |\n| Amiodarone | 300 mg → 150 mg IV bolus | VF/pVT only |\n| Lidocaine | 1–1.5 mg/kg IV | If amiodarone unavailable |\n| MgSO₄ | 2g IV push | Torsades de pointes |\n| NaHCO₃ | 50 mmol IV | HyperK arrest, TCA OD, prolonged arrest |\n| Calcium chloride 10% | 10 mL IV | HyperK, hypoCa, Ca channel blocker OD |\n\n---\n\n### Airway During CPR\n- BVM 30:2 until advanced airway placed\n- ETT/SGA placed → continuous compressions 100–120/min + ventilate **10/min**\n- Do NOT hyperventilate (↑intrathoracic pressure → ↓venous return → ↓CPP)\n\n---\n\n### Post-ROSC Care\n\n| System | Target |\n|---|---|\n| Airway | Intubate if GCS <8 |\n| PaO₂ | 94–98% (avoid hyperoxia) |\n| PaCO₂ | 35–45 mmHg (avoid hypocapnia → cerebral vasoconstriction) |\n| MAP | ≥65–80 mmHg; noradrenaline first-line |\n| ECG | STEMI or presumed cardiac → cath lab ASAP |\n| Glucose | 6–10 mmol/L (avoid hypo AND hyper) |\n| TTM | 32–36°C × 24h (comatose survivors); prevent fever >37.7°C × 72h |\n\n> [!note] Prognostication: not before 72h post-arrest (or 72h post-rewarming if TTM used)\n\n---"

          "slug": "tachycardia-acute-management",

          "markdown": "> [!danger] First question: Is the patient stable?\n\n### Unstable Features (any one = urgent cardioversion)\n- SBP <90 / shock / syncope / GCS ↓\n- Ongoing chest pain / ischaemia\n- Acute pulmonary oedema\n\n**→ SYNCHRONISED DC CARDIOVERSION — don't wait for diagnosis**\n- Sedate: midazolam 1–2 mg IV + fentanyl 25–50 mcg IV\n- Synchronised (R-wave triggered — prevents VF induction)\n- Narrow complex: 120–200J | Broad complex: 200J | Escalate if needed\n\n---\n\n### Narrow Complex — Regular (QRS <120 ms)\n\n#### Sinus Tachycardia *(most common!)*\n- P waves upright in II, rate 100–150\n- **DO NOT treat the rate — treat the CAUSE**\n- (Pain, fever, sepsis, hypovolaemia, PE, anaemia, thyrotoxicosis)\n\n#### SVT — AVNRT / AVRT (rate 150–250, abrupt onset/offset)\n\n**Step 1: Vagal Manoeuvres**\n- **Modified Valsalva (REVERT trial):** blow hard into syringe × 15 sec → immediately supine + passive leg raise 45° × 15 sec → sit up\n- Carotid sinus massage: listen for bruit first; avoid in carotid disease/recent stroke\n\n**Step 2: Adenosine** (if vagal fails)\n\n| Dose | Action |\n|---|---|\n| 6 mg IV rapid bolus + 20 mL saline flush | Large antecubital vein |\n| 12 mg IV if no response at 1–2 min | |\n| 12 mg IV again if still no response | Max 30 mg total |\n\n- Warn patient: transient chest tightness, flushing, \"sense of doom\" (lasts seconds)\n- Diagnostic value: terminates → SVT | slows only → AFL | no effect → VT\n\n> [!warning] Avoid adenosine in: severe asthma, WPW + AF (→ VF), 2nd/3rd HB, dipyridamole (use 3 mg instead)\n\n**Step 3 (if adenosine fails):**\n- Verapamil 2.5–5 mg IV over 2 min (repeat 5–10 mg, max 20 mg)\n- Metoprolol 2.5–5 mg IV over 5 min (repeat ×3, max 15 mg)\n\n> [!danger] Never verapamil in: broad complex unknown, WPW, patient on beta-blocker\n\n#### Atrial Flutter (~150 bpm, sawtooth II/III/aVF, 2:1)\n- Rate control: BB/CCB (same as AF)\n- Cardioversion: very sensitive — starts at 50–100J\n- Ablation: definitive (high success rate)\n\n---\n\n### Narrow Complex — Irregular\n\n- **AF** → see [[#Atrial Fibrillation — Acute & Chronic]]\n- **AFL with variable block**\n- **MAT** (≥3 different P morphologies, variable PR): COPD exacerbation, hypoxia, hypoMg, hypoK\n  - Treat the cause; metoprolol or verapamil for rate; NOT adenosine\n\n---\n\n### Broad Complex (QRS ≥120 ms)\n\n> [!danger] ASSUME VT UNTIL PROVEN OTHERWISE — even if patient looks well\n\n**Features favouring VT (vs SVT with aberrancy):**\n- AV dissociation: P waves independent of QRS **(definitive)**\n- Capture beats: narrow QRS within broad complex rhythm\n- Fusion beats: hybrid QRS morphology\n- QRS >160 ms | Extreme (NW) axis | Concordance V1–V6\n- Structural heart disease (IHD, CMP) → almost always VT\n\n#### Stable VT\n1. **Amiodarone** 150 mg IV over 10 min → 1 mg/min × 6h → 0.5 mg/min × 18h\n2. If fails or deteriorates → synchronised DC cardioversion\n3. Lidocaine 1–1.5 mg/kg IV (alternative)\n\n> [!danger] Never adenosine, verapamil, or BB in broad complex of unknown origin\n\n#### Torsades de Pointes (polymorphic VT + long QT, twisting QRS)\n- **MgSO₄ 2g IV over 1–2 min** (even if Mg normal)\n- Stop QT-prolonging drugs\n- Correct K⁺ (target >4.5), Mg²⁺, Ca²⁺\n- Overdrive pacing if recurrent\n- Isoproterenol if bradycardia-induced\n\n> [!danger] Do NOT give amiodarone (further prolongs QT)\n\n#### WPW + AF (pre-excited AF — irregular broad complex, rate >200)\n\n> [!danger] AVOID adenosine, digoxin, verapamil, beta-blockers → all conduction via accessory pathway → VF\n- Stable: **procainamide 15 mg/kg IV over 30–60 min**\n- Unstable: DC cardioversion\n\n---\n\n### IV Rate Control Quick Reference\n\n| Drug | Dose | Notes |\n|---|---|---|\n| Metoprolol | 2.5–5 mg IV q5 min, max 15 mg | First-line BB |\n| Esmolol | 500 mcg/kg IV → 50–200 mcg/kg/min | Ultra short-acting, titratable |\n| Verapamil | 2.5–5 mg IV over 2 min, max 20 mg | Avoid HFrEF, BB, broad complex |\n| Diltiazem | 0.25 mg/kg IV → 5–15 mg/hr infusion | |\n| Digoxin | 0.25–0.5 mg IV → 0.25 mg q6h, max 1.5 mg/24h | Slow onset; use in HF |\n| Amiodarone | 150 mg/10 min → 1 mg/min ×6h → 0.5 mg/min ×18h | Rate + rhythm control |\n\n---"

          "title": "Bradycardia & Heart Block",
          "markdown": "### Is the Patient Stable?\n\n**Unstable** (any one) → **Atropine 0.5mg IV stat**:\n- SBP <90 / syncope / GCS↓ / chest pain / heart failure\n\nRepeat atropine q3–5 min, max 3mg total.\nIf no response → **transcutaneous pacing** (TCP) while arranging transvenous pacing.\n\n> [!warning] Atropine will NOT work in complete heart block or infranodal block — go straight to pacing.\n\n---\n\n### AV Block Types\n\n| Type | ECG | Risk | Action |\n|---|---|---|---|\n| **1st degree** | PR >200ms, all P waves conduct | Benign | Monitor, no treatment |\n| **2nd degree Mobitz I (Wenckebach)** | PR gets longer → dropped QRS → resets | Usually benign | Monitor; treat if symptomatic |\n| **2nd degree Mobitz II** | Fixed PR → sudden dropped QRS, no warning | **High risk** → can progress to complete HB | Admit; pacing |\n| **Complete (3rd degree) HB** | P and QRS completely dissociated, escape rhythm 20–40/min | **Emergency** | Atropine, pacing urgently |\n\n---\n\n### Common Causes\n\n- Inferior MI (RCA supplies AV node) — especially with bradycardia + hypotension\n- Drugs: **beta-blockers, diltiazem, verapamil, digoxin, amiodarone**\n- Hyperkalemia | Hypothyroidism | Hypothermia | Lyme disease\n- Post-cardiac surgery | Infiltrative disease (sarcoid, amyloid)\n\n---\n\n### Management\n\n**Acute (symptomatic):**\n1. Atropine 0.5mg IV → repeat to max 3mg\n2. Adrenaline 2–10mcg/min infusion (if atropine fails)\n3. Dopamine 2–10mcg/kg/min (if atropine fails)\n4. Transcutaneous pacing (TCP) — bridge\n5. Transvenous pacing — definitive bridging\n6. Permanent pacemaker — if no reversible cause\n\n**Drug-induced:** stop offending drug, monitor, may need temporary pacing.\n\n**Inferior MI + complete HB:** often recovers with reperfusion. TCP as bridge.\n\n---"

          "slug": "atrial-fibrillation-acute-chronic",
          "title": "Atrial Fibrillation — Acute & Chronic",
          "markdown": "### Classification\n\n| Type | Definition |\n|---|---|\n| First detected | First ever episode |\n| Paroxysmal | Self-terminating <7 days |\n| Persistent | >7 days, requires cardioversion |\n| Long-standing persistent | >12 months |\n| Permanent | Accepted, no further rhythm control |\n\n---\n\n### Acute: Haemodynamically Unstable?\n\n**UNSTABLE** (↓BP / acute HF / ischaemia / GCS ↓):\n- → **Urgent synchronised DC cardioversion 200J biphasic**\n- → Anticoagulate with UFH/LMWH peri-cardioversion\n- → Sedate if conscious\n\n---\n\n### Rate vs Rhythm Control\n\n**Rate control** (accept AF, slow the rate):\n- Older patients, significant comorbidities, asymptomatic, permanent AF, HFpEF\n- Target: **≤110 bpm at rest** (lenient — RACE II trial non-inferior to strict)\n- Strict target if still symptomatic: <80 bpm rest, <110 on exertion\n\n**Rhythm control** (restore sinus rhythm):\n- Younger patients, first episode, symptomatic despite rate control, HFrEF, tachycardia-mediated CMP, athlete\n- EAST-AFNET 4: early rhythm control reduces CV events even in asymptomatic patients\n\n---\n\n### Acute IV Rate Control\n\n| Drug | Dose | Notes |\n|---|---|---|\n| Metoprolol | 2.5–5 mg IV q5 min, max 15 mg | 1st line; no HFrEF/bronchospasm |\n| Esmolol | 500 mcg/kg load → 50–200 mcg/kg/min | Titratable infusion |\n| Diltiazem | 0.25 mg/kg → 0.35 mg/kg → 5–15 mg/hr | If BB contraindicated |\n| Verapamil | 2.5–5 mg IV | Less preferred (−ve inotropy) |\n| Digoxin | 0.25–0.5 mg IV → 0.25 mg q6h | HFrEF or hypotension |\n| Amiodarone | 150 mg/10 min → 1 mg/min ×6h | Decompensated HF; can cardiovert chemically |\n\n> [!warning] Do NOT use non-dihydropyridine CCB (verapamil/diltiazem) in HFrEF\n\n---\n\n### Cardioversion — Anticoagulation Timing\n\n> [!danger] NEVER cardiovert without anticoagulation if duration >48h or unknown\n\n**Duration KNOWN <48h:**\n- Can cardiovert without 3-week anticoag\n- Give UFH/LMWH or DOAC before cardioversion\n- Continue anticoag ≥4 weeks post-cardioversion (atrial stunning)\n\n**Duration UNKNOWN or >48h — two options:**\n1. Anticoagulate ≥3 weeks → cardiovert → continue ≥4 weeks\n2. TOE to exclude LAA thrombus → if clear → cardiovert → anticoag ≥4 weeks\n\n> [!note] Atrial stunning: 4 weeks anticoag always required post-cardioversion regardless of apparent success\n\n---\n\n### Pharmacological Cardioversion\n*(stable, paroxysmal, structurally normal heart only)*\n\n| Drug | Dose | Contraindications |\n|---|---|---|\n| Flecainide | 2 mg/kg IV over 10 min (max 150 mg) or 200–300 mg oral | Structural heart disease, IHD, HF, BBB |\n| Propafenone | 2 mg/kg IV or 450–600 mg oral | Same as flecainide |\n| Amiodarone | 150 mg IV → infusion | Slower; preferred if structural disease |\n\n> [!warning] Flecainide/propafenone: pre-treat with BB or CCB to prevent 1:1 AFL conduction\n\n---\n\n### Chronic Antiarrhythmics\n\n| Drug | Dose | Notes |\n|---|---|---|\n| Flecainide | 50–150 mg BD | No structural disease; highly effective for paroxysmal AF |\n| Propafenone | 150–300 mg TDS | Same profile as flecainide |\n| Sotalol | 40–160 mg BD | Check QTc; avoid if QTc >450, hypoK, CKD |\n| Amiodarone | Load 200 mg TDS ×1wk → BD ×1wk → 200 mg OD maintenance | Most effective; use last due to toxicity |\n\n**Amiodarone toxicity (dose-dependent):**\n- Pulmonary fibrosis | Thyroid (hypo or hyper) → TFTs q6 months\n- Hepatotoxicity | Corneal microdeposits | Photosensitivity | Peripheral neuropathy\n- Bradycardia, QT prolongation\n- **Drug interaction:** ↑warfarin INR significantly → reduce warfarin dose 30–50%\n\n---\n\n### Stroke Prevention — CHA₂DS₂-VASc\n\n| Factor | Points |\n|---|---|\n| **C**ongestive HF | 1 |\n| **H**ypertension | 1 |\n| **A**ge ≥75 | 2 |\n| **D**iabetes mellitus | 1 |\n| **S**troke/TIA history | 2 |\n| **V**ascular disease (MI, PAD, aortic plaque) | 1 |\n| **A**ge 65–74 | 1 |\n| **S**ex category (female) | 1 |\n\n**Anticoagulate:** men score ≥2 | women score ≥3\nDOACs preferred over warfarin in non-valvular AF\n\n**HAS-BLED** (score ≥3 = high risk — does NOT preclude anticoag; address modifiable risks):\nH-uncontrolled HTN | A-abnormal renal/liver | S-stroke | B-bleeding history | L-labile INR | E-elderly >65 | D-drugs/alcohol\n\n---\n\n### Catheter Ablation (PVI)\n- Paroxysmal AF refractory to antiarrhythmics, or first-line in younger symptomatic patients\n- Success: ~70–80% at 1 year for paroxysmal AF (lower for persistent)\n- Complications: tamponade ~1%, PV stenosis, oesophageal injury (rare), stroke\n\n> [!warning] Continue anticoagulation post-ablation per CHA₂DS₂-VASc even if apparently in SR\n\n---\n\n### Special Situations\n\n| Situation | Management |\n|---|---|\n| AF + acute HF | Amiodarone IV (rate + rhythm). Avoid −ve inotropes in HFrEF. |\n| AF + WPW | DC cardioversion if unstable. Procainamide if stable. **AVOID AV nodal blockers.** |\n| AF + thyrotoxicosis | Beta-blocker for rate; treat thyroid first → often reverts to SR |\n| AF + pregnancy | Metoprolol or digoxin (safest). LMWH anticoag (no DOACs). Cardioversion safe. |\n| AF post-cardiac surgery | Usually self-limiting. Rate control + anticoag if >48h. Often reverts within 6 weeks. |\n\n---"

          "slug": "acute-coronary-syndrome-acs-nstemi-unstable-angina",
          "title": "Acute Coronary Syndrome — ACS, NSTEMI & Unstable Angina",
          "markdown": "### Classification\n\n| | STEMI | NSTEMI | Unstable Angina |\n|---|---|---|---|\n| ECG | ST elevation | ST depression / T changes / normal | ST depression / T changes / normal |\n| Troponin | Elevated | **Elevated** | **Normal** |\n| Mechanism | Complete occlusion | Partial occlusion | Partial occlusion, no necrosis |\n| Urgency | **PCI within 90 min** | PCI within 24–72h | Risk-stratify |\n\n---\n\n### Diagnosis\n\n**Symptoms:** chest pain (central, heavy, radiating jaw/arm), dyspnoea, diaphoresis, nausea\n**Atypical (common in elderly, women, DM):** epigastric pain, fatigue, syncope — no chest pain\n\n**Serial troponin:**\n- Draw at 0h and 3h (high-sensitivity troponin — most labs now)\n- Rising or elevated troponin = myocardial necrosis → NSTEMI\n\n> [!warning] Troponin is elevated in many conditions — not just MI. PE, myocarditis, sepsis, renal failure, cardioversion all raise troponin. Always interpret in clinical context.\n\n**Other causes of ST changes to exclude:** LBBB, LVH, Wellens, pericarditis, hyperkalaemia, Brugada\n\n---\n\n### GRACE Score — Risk Stratification for NSTEMI\n\nLow risk (GRACE <109): medical management, outpatient angio within 72h\nIntermediate (109–140): inpatient, angio within 24h\nHigh risk (>140): urgent angio within 2h\n\n**High-risk features (any → urgent angio):**\n- Ongoing chest pain at rest\n- Haemodynamic instability / cardiogenic shock\n- New ST depression ≥2mm or dynamic ST changes\n- Elevated troponin\n- LVEF <40%\n- Prior PCI/CABG\n\n---\n\n### Immediate Management (all ACS)\n\n1. **Aspirin 300mg** loading dose (then 75mg OD lifelong)\n2. **P2Y12 inhibitor** (choose one):\n   - Ticagrelor 180mg loading → 90mg BD (preferred — PLATO trial)\n   - Clopidogrel 300–600mg loading → 75mg OD (if ticagrelor CI or bleeding risk)\n3. **Anticoagulation:** fondaparinux 2.5mg SC OD (preferred NSTEMI) OR enoxaparin 1mg/kg BD\n4. **Beta-blocker** (if no cardiogenic shock, HR adequate): metoprolol 25–50mg oral\n5. **GTN** sublingual/infusion for pain (if SBP >90)\n6. **High-intensity statin:** atorvastatin 80mg OD — start immediately\n7. **ACEi/ARB:** especially if EF reduced or anterior MI — start within 24h if stable\n\n> [!warning] Avoid NSAIDs — increase cardiovascular events in ACS.\n\n**STEMI → PCI within 90 minutes** of first medical contact. If PCI unavailable within 120 min → thrombolysis.\n\n---\n\n### Secondary Prevention After ACS\n\n- **DAPT** (aspirin + ticagrelor/clopidogrel) × 12 months (bare metal stent × 1 month, drug-eluting stent × 6–12 months)\n- **Beta-blocker** × ≥3 years (or lifelong if EF reduced)\n- **ACEi** (especially if EF <40%)\n- **Statin** (atorvastatin 80mg lifelong)\n- **Cardiac rehabilitation**\n- Driving: off for 4 weeks after NSTEMI, 1 week after uncomplicated elective PCI (SG LTA rules)\n\n---"

          "markdown": "### Classification\n\n| Type | EF | Notes |\n|---|---|---|\n| HFrEF | <40% | Ischaemic most common globally; GDMT well-established |\n| HFmrEF | 40–49% | |\n| HFpEF | ≥50% | ~50% of HF in SG; HTN, DM, obesity, AF are key causes |\n\n### NYHA Functional Class\n- **I:** No symptoms with ordinary activity\n- **II:** Symptoms with moderate exertion\n- **III:** Symptoms with minimal exertion\n- **IV:** Symptoms at rest\n\n### Diagnosis\n- BNP >100 or NT-proBNP >300 pg/mL (age-adjusted: >450 / >900 / >1800 for <50 / 50–75 / >75yr)\n- Low BNP makes HF unlikely. Elevated BNP ≠ diagnostic alone (also: PE, AF, CKD, sepsis)\n- Echo: EF, wall motion, valves, diastolic function\n- CXR: cardiomegaly (CTR >0.5), upper lobe diversion, Kerley B, perihilar haziness, pleural effusion\n\n---\n\n### HFrEF — Four Pillars of GDMT *(all reduce mortality)*\n\n#### 1. ACEi / ARB / ARNI\n\n| Drug | Start | Target/Max |\n|---|---|---|\n| **Sacubitril/Valsartan** (Entresto) ← preferred | 24/26 mg BD | 97/103 mg BD |\n| Enalapril | 2.5 mg BD | 10 mg BD (max 20 mg BD) |\n| Ramipril | 1.25–2.5 mg BD | 5 mg BD (max 10 mg BD) |\n| Candesartan (ARB) | 4 mg OD | 32 mg OD |\n\n> [!warning] ARNI: washout 36h from ACEi before starting (angioedema risk). Avoid eGFR <30, K⁺ >5.4.\n\n#### 2. Beta-Blocker *(start only in STABLE patient)*\n\n| Drug | Start | Max |\n|---|---|---|\n| Carvedilol | 3.125 mg BD | 25 mg BD |\n| Bisoprolol | 1.25 mg OD | 10 mg OD |\n| Metoprolol succinate | 12.5–25 mg OD | 200 mg OD |\n\nDouble dose every 2 weeks as tolerated.\n\n> [!danger] Do NOT start in acute decompensation. Do NOT stop suddenly in stable HF.\n\n#### 3. MRA — Mineralocorticoid Receptor Antagonist\n\n| Drug | Start | Max |\n|---|---|---|\n| Spironolactone | 25 mg OD | 50 mg OD |\n| Eplerenone | 25 mg OD | 50 mg OD (preferred if gynaecomastia) |\n\nCheck K⁺/Cr at 1–2 weeks. Avoid if K⁺ >5.0 or eGFR <30.\n\n#### 4. SGLT2 Inhibitor *(mortality benefit even without DM)*\n\n| Drug | Dose |\n|---|---|\n| Dapagliflozin (DAPA-HF) | 10 mg OD |\n| Empagliflozin (EMPEROR-Reduced) | 10 mg OD |\n\nAlso beneficial in HFpEF (EMPEROR-Preserved, DELIVER). Avoid eGFR <20.\n\n---\n\n### Additional HFrEF Therapies\n\n| Drug | Dose | Indication |\n|---|---|---|\n| Furosemide | 20–40 mg OD → up to 80–160 mg BD | Symptom control (congestion); no mortality benefit |\n| Metolazone | 2.5–5 mg OD | Diuretic resistance (synergistic with loop) |\n| Ivabradine | 5→7.5 mg BD | SR, HR ≥70 on max BB, EF ≤35%, NYHA II–III |\n| Digoxin | 0.0625–0.25 mg OD | Rate control in AF + HFrEF; target level 0.5–0.9 ng/mL |\n| CRT | — | EF ≤35%, LBBB, QRS ≥150 ms, NYHA II–III on optimal GDMT |\n| ICD | — | EF ≤35% on optimal GDMT ≥3 months (primary SCD prevention) |\n\n---\n\n### HFpEF Management\n- No proven mortality-reducing therapy (unlike HFrEF)\n- SGLT2i: dapagliflozin/empagliflozin — reduce HF hospitalisation (Class IIa)\n- Aggressively treat: HTN (<130/80), AF, DM, obesity, OSA\n- Diuretics for fluid overload\n\n> [!note] Avoid excessive HR lowering in HFpEF — patients rely on HR for cardiac output\n\n---\n\n### Acute Decompensated HF — LMNOP\n\n| Letter | Action |\n|---|---|\n| **L** asix | Furosemide IV: 1–2.5× usual oral dose; naive: 40 mg IV stat. Poor response: double or 5–10 mg/hr infusion |\n| **M** orphine | 2–4 mg IV (cautiously; less favoured in current guidelines) |\n| **N** itrates | GTN infusion if SBP >110 (venodilator → ↓preload/afterload) |\n| **O** xygen | SpO₂ ≥95%; NIV (CPAP/BiPAP) if pulmonary oedema + hypoxia |\n| **P** osition | Sit upright, legs dependent |\n\n**Haemodynamic Profiles (Stevenson):**\n\n| Profile | Perfusion | Congestion | Management |\n|---|---|---|---|\n| Warm-Wet | Adequate | Yes | Diurese aggressively |\n| Cold-Wet | Poor | Yes | Inotropes + gentle diuresis |\n| Cold-Dry | Poor | No | Inotropes ± MCS |\n| Warm-Dry | Adequate | No | Optimise GDMT |\n\n---"

t — RE-LY)* | 150 mg BD | 110 mg BD if age ≥80 / verapamil / high bleed risk | eGFR <30 |\n| **Edoxaban** *(ENGAGE AF)* | 60 mg OD | 30 mg OD if eGFR 15–50 / wt ≤60 kg / P-gp inhibitor | eGFR <15 **or >95** |\n| Warfarin | INR 2.0–3.0 | — | — |\n\n> [!warning] Edoxaban: paradoxically worse stroke outcomes if eGFR >95 mL/min in AF — avoid in this group\n\n---\n\n### 4. VTE — DVT and PE Treatment\n\nDOACs preferred over warfarin for most VTE.\n\n| Agent | Treatment Dose | Extended Prevention |\n|---|---|---|\n| **Apixaban** *(lowest bleeding — AMPLIFY)* | 10 mg BD ×7d → 5 mg BD | 2.5 mg BD |\n| **Rivaroxaban** *(EINSTEIN)* | 15 mg BD ×21d → 20 mg OD with meal | 20 mg OD or 10 mg OD |\n| **Dabigatran** *(requires 5–10 days parenteral first)* | 150 mg BD | — |\n| **Edoxaban** *(requires 5–10 days parenteral first)* | 60 mg OD (reduce to 30 mg OD if wt ≤60 kg / eGFR 15–50) | — |\n| Warfarin | Bridge LMWH ×5d until INR ≥2 on 2 consecutive days; INR 2.0–3.0 | — |\n\n**Duration:**\n\n| Scenario | Duration |\n|---|---|\n| Provoked (surgery/immobility/trauma) | 3 months → stop and reassess |\n| Unprovoked | ≥3 months → consider extended if low bleed risk + high recurrence risk |\n| Recurrent unprovoked | Indefinite |\n| Cancer-associated | ≥6 months; continue if active cancer |\n\n---\n\n### 5. Cancer-Associated VTE\n\n- **Apixaban preferred** (CARAVAGGIO — less bleeding than rivaroxaban, including GI/GU cancers)\n  - 10 mg BD ×7d → 5 mg BD\n- Rivaroxaban: ↑GI bleeding vs LMWH — avoid in GI/GU cancers\n- Edoxaban: avoid in GI malignancy (↑GI bleed)\n- **LMWH (dalteparin)** still preferred if: GI/GU cancer, drug interactions with chemo, absorption concerns\n  - 200 IU/kg OD ×1 month → 150 IU/kg OD\n\n---\n\n### 6. Massive / Submassive PE\n\n#### Massive PE (SBP <90, shock, cardiac arrest)\n- **UFH immediately:** 80 units/kg bolus → 18 units/kg/hr\n- **Thrombolysis** (if no absolute CI):\n  - Alteplase 100 mg IV over 2h\n  - In arrest: **50 mg IV push → CPR ×60–90 min**\n  - Absolute CI: prior ICH, ischaemic stroke <3 months, active major bleeding, intracranial malignancy, head trauma <3 months\n- If CI or fails: catheter-directed therapy or surgical embolectomy\n\n#### Submassive PE (stable + RV strain + elevated troponin/BNP)\n- LMWH or DOAC\n- Consider catheter-directed thrombolysis (CDT): lower dose, local delivery\n- Systemic thrombolysis controversial (PEITHO trial: less haemodynamic compromise but more ICH)\n\n#### Low-Risk PE (stable, no RV strain, sPESI = 0)\n- DOAC (apixaban or rivaroxaban)\n- Consider early discharge (Hestia criteria)\n\n---\n\n### 7. Mechanical Heart Valves\n\n> [!danger] Warfarin ONLY — DOACs CONTRAINDICATED (RE-ALIGN trial stopped early)\n\n| Valve Position | INR Target |\n|---|---|\n| Aortic (bileaflet, low-risk, no risk factors) | 2.0–3.0 |\n| Aortic (higher thrombogenicity OR risk factors*) | 2.5–3.5 |\n| Mitral (any) | 2.5–3.5 |\n| Double mechanical | 2.5–3.5 |\n\n*Risk factors: AF, prior thromboembolism, LV dysfunction, hypercoagulable, older generation valve\n\nAdd aspirin 75–100 mg OD if: high thrombogenicity valve or history of TE despite adequate anticoag\n\n---\n\n### 8. Bioprosthetic (Tissue) Valves\n\n- **First 3 months post-implant:** warfarin INR 2.0–3.0 + aspirin 75 mg OD\n  - DOACs emerging for aortic bioprosthetic in low-risk patients\n- **After 3 months (SR, no other indications):** aspirin 75–100 mg OD alone\n  - If AF: anticoagulate per CHA₂DS₂-VASc (DOAC acceptable for aortic bioprosthetic)\n\n---\n\n### 9. Antiphospholipid Syndrome (APS)\n\n> [!danger] Warfarin preferred — DOACs INFERIOR (RAPS, TRAPS, ASTRO-APS: higher recurrence rates)\n\n| Manifestation | Target |\n|---|---|\n| VTE | INR 2.0–3.0 |\n| Arterial thrombosis | INR 2.0–3.0 (± aspirin; some guidelines 2.5–3.5) |\n| Catastrophic APS | UFH + corticosteroids + IVIG or plasmapheresis |\n\n> [!warning] Do NOT switch a stable APS patient from warfarin to DOAC\n\n---\n\n### 10. Perioperative Management\n\n**DOACs** (no bridging needed for most):\n\n| Risk | Stop before | Restart |\n|---|---|---|\n| Low bleed risk | 24–48h pre-op | 24–48h post-op |\n| High bleed risk / dabigatran + CKD | 48–72h pre-op | 24–48h post-op |\n\n**Warfarin** — bridge only if HIGH thrombotic risk:\n- High risk (bridge): mechanical mitral valve, any valve + AF, VTE <3 months, AF + prior stroke\n- Low-moderate (no bridge): most AF, bioprosthetic valve, VTE >3 months\n- Stop warfarin 5 days pre-op; LMWH stop 24h pre-op; UFH stop 4–6h pre-op\n\n---\n\n### Reversal Agents\n\n| Agent | Reversal | Dose |\n|---|---|---|\n| Warfarin | Vit K IV (6–8h) + 4-factor PCC (30 min) | PCC 25–50 units/kg; FFP if no PCC |\n| Dabigatran | **Idarucizumab** (Praxbind) | 5g IV (2 × 2.5g) — complete reversal in minutes |\n| Apixaban / Rivaroxaban | **Andexanet alfa** (Ondexxya) | 400–800 mg IV + infusion |\n| Edoxaban | Andexanet alfa | 4-factor PCC off-label if unavailable |\n| LMWH | Protamine | 1 mg per 1 mg enoxaparin (~70% reversal, last 8h only) |\n| UFH | Protamine | 1 mg per 100 units UFH (max 50 mg IV over 10 min) |\n\n---\n## "

          "markdown": "> [!tip] Systematic order: Rate → Rhythm → Axis → P waves → PR → QRS → ST → T waves → QT → Extra features\n\n### 1. Rate\n```\n300 / number of large squares between R-R peaks\n300 → 150 → 100 → 75 → 60 → 50\n```\nNormal: 60–100 bpm\n\n### 2. Rhythm\n- Regular? Measure R-R intervals\n- P before every QRS? QRS after every P?\n- Sinus rhythm: P upright in I, II, aVF; inverted in aVR\n\n**Common Arrhythmias:**\n\n| Arrhythmia | Key ECG Feature |\n|---|---|\n| AF | Absent P waves, irregularly irregular, fibrillatory baseline |\n| AFL | Regular ~150 bpm, sawtooth flutter in II/III/aVF, 2:1 typical |\n| SVT | Regular 150–250, P buried in/just after QRS |\n| VT | Wide complex regular, 120–250, AV dissociation |\n| Complete heart block | P and QRS completely dissociated, slow escape rhythm |\n| Mobitz I (Wenckebach) | Progressive PR lengthening → dropped QRS |\n| Mobitz II | Fixed PR → sudden dropped QRS *(dangerous — may → 3rd degree)* |\n\n### 3. Axis\n\n| Finding | Axis | Causes |\n|---|---|---|\n| I +, aVF + | Normal | — |\n| I +, aVF − | LAD | LBBB, LAFB, inferior MI, WPW right-sided pathway |\n| I −, aVF + | RAD | RVH, RBBB, PE, lateral MI |\n| I −, aVF − | Extreme/NW axis | VT, hyperK, dextrocardia |\n\n### 4. P Waves\n- Normal: <120 ms, <2.5 mm in II\n- **P mitrale:** broad notched in II, biphasic in V1 → LA enlargement\n- **P pulmonale:** tall peaked in II >2.5 mm → RA enlargement (COPD, PE)\n\n### 5. PR Interval (Normal 120–200 ms)\n- Short (<120): WPW, LGL, junctional\n- Long (>200): 1st degree AV block\n- Variable: 2nd degree AV block\n\n### 6. QRS (Normal <120 ms)\n\n**RBBB:** rSR' in V1 (M pattern), slurred S in I/V5–6\n- New RBBB → consider PE, RV strain\n\n**LBBB:** broad notched R in I/aVL/V5–6, QS in V1. *Always pathological.*\n- New LBBB + chest pain = **STEMI equivalent**\n- **Sgarbossa Criteria:**\n\n| Criterion | Points |\n|---|---|\n| Concordant ST elevation ≥1 mm | 5 |\n| Concordant ST depression V1–V3 ≥1 mm | 3 |\n| Discordant ST elevation ≥5 mm | 2 |\n\nScore ≥3 = 90% specific for AMI\n\n**Pathological Q waves:** >40 ms wide OR >25% height of QRS in same lead\n\n| Territory | Leads |\n|---|---|\n| Inferior | II, III, aVF → RCA |\n| Lateral | I, aVL, V5–V6 → LCx |\n| Anterior | V1–V4 → LAD |\n\n**LVH:** SV1 + RV5/V6 >35 mm OR R aVL >11 mm\n\n### 7. ST Segment\n\n**ST Elevation — ELEVATION Mnemonic:**\n\n| Letter | Cause |\n|---|---|\n| **E** | Early repolarisation (concave, J-point notching, benign in young adults) |\n| **L** | LBBB (new/presumed new = STEMI equivalent) |\n| **E** | LVH strain pattern |\n| **V** | Vasospasm / Prinzmetal (transient, nitrate-responsive) |\n| **A** | AMI/STEMI (convex/tombstone) |\n| **T** | Takotsubo (diffuse elevation → T inversion) |\n| **I** | Inflammation — pericarditis (concave saddle + PR depression, no reciprocal changes) |\n| **O** | Osborne J-waves (hypothermia) |\n| **N** | Normal variant |\n\n**STEMI Localisation:**\n\n| Territory | Leads | Artery |\n|---|---|---|\n| Anterior | V1–V4 | LAD |\n| Inferior | II, III, aVF | RCA |\n| Lateral | I, aVL, V5–V6 | LCx |\n| Posterior | Tall R + ST depression V1–V3 → do V7–V9 | LCx/RCA |\n| RV | V4R | RCA |\n\n> [!danger] RV MI: avoid nitrates (RV is preload-dependent)\n\n**ST Depression:** ischaemia (NSTEMI), LVH strain, digoxin (reverse tick/hockey stick), posterior MI (reciprocal)\n\n### 8. T Waves\n- Normal inverted: aVR, V1 (and V2 in women)\n- Peaked T: hyperK, hyperacute MI, early repolarisation\n- T inversion: ischaemia, RBBB (V1–V3), LVH strain, PE (V1–V4)\n\n**Wellens Syndrome** *(critical LAD stenosis — pain-FREE when ECG recorded)*\n\n> [!danger] Do NOT stress test. → Urgent cardiac catheterisation.\n\n| Type | Pattern |\n|---|---|\n| Type A | Biphasic T waves (terminal inversion) in V2–V3 |\n| Type B | Deep symmetric T wave inversion V2–V3 *(more specific)* |\n\n### 9. QT Interval\n```\nQTc = QT / √RR  (Bazett formula)\nNormal: <440 ms (men), <460 ms (women)\nTorsades risk if QTc >500 ms\n```\n\n**Causes of Long QT:** ondansetron, haloperidol, amiodarone, sotalol, clarithromycin, chloroquine, TCAs, methadone | hypoK, hypoMg, hypoCa | congenital LQTS\n\n### 10. Extra Features\n\n| Finding | Interpretation |\n|---|---|\n| Delta waves + short PR | WPW |\n| J (Osborne) waves | Hypothermia (proportional to degree) |\n| Prominent U waves | HypoK, bradycardia, hypoMg |\n| Inverted U waves | Myocardial ischaemia |\n\n> [!danger] **WPW + AF:** AVOID adenosine, digoxin, verapamil, beta-blockers → rapid accessory pathway conduction → VF. Treat with procainamide or DC cardioversion.\n\n**ECG in Electrolyte Abnormalities:**\n\n| Electrolyte | ECG Changes |\n|---|---|\n| HyperK | Peaked T → PR↑, P flat → QRS wide → sine wave → VF |\n| HypoK | Flat T, prominent U waves, ST depression |\n| HyperCa | Short QT |\n| HypoCa | Long QT, prolonged ST segment |\n| HypoMg | QT prolongation, Torsades risk |\n\n---"
