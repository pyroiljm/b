          "title": "Pre-eclampsia & Obstetric Emergencies",
          "markdown": "### Pre-eclampsia\n\n**Definition:** hypertension (≥140/90) + proteinuria (≥0.3g/24h or protein:creatinine ratio ≥30mg/mmol) after 20 weeks gestation.\n**Severe pre-eclampsia:** BP ≥160/110 OR end-organ damage (headache, visual disturbance, epigastric pain, AKI, thrombocytopenia, deranged LFTs).\n\n**HELLP syndrome:** Haemolysis + Elevated Liver enzymes + Low Platelets. Variant of severe pre-eclampsia — can occur without hypertension.\n\n---\n\n### Management\n\n**Mild (≥140/90, no severe features):**\n- Admit for monitoring\n- Antihypertensives: labetalol 100–400mg BD or nifedipine LA 20–40mg OD\n- Deliver at 37 weeks\n\n**Severe (≥160/110 or end-organ damage):**\n- IV labetalol 20mg over 2 min → repeat/double q10 min to max 300mg total OR\n- IV hydralazine 5–10mg over 2 min, repeat q20 min OR\n- Oral nifedipine 10mg (not SL — precipitous BP drop risk)\n- **Magnesium sulphate** 4g IV over 20 min → 1g/hr infusion (seizure prophylaxis / eclampsia treatment)\n- Deliver as soon as stable\n\n> [!danger] Eclampsia = seizures in a woman with pre-eclampsia. MgSO₄ 4g IV bolus. Resuscitate, deliver.\n\n**MgSO₄ toxicity:** loss of patellar reflex (first sign) → respiratory depression → cardiac arrest. Antidote: calcium gluconate 10mL 10% IV.\n\n---\n\n### Gestational Diabetes (GDM)\n\n**Screening:** 75g OGTT at 24–28 weeks (or earlier if high risk: BMI >30, prior GDM, family history, previous macrosomic baby)\n\n**Diagnosis (IADPSG criteria, used in SG):**\n- Fasting ≥5.1 mmol/L\n- 1h ≥10.0 mmol/L\n- 2h ≥8.5 mmol/L\n\n**Management:**\n1. Dietary modification + moderate exercise (first-line)\n2. If targets not met: **metformin** (2nd trimester onwards) or **insulin** (preferred in SG — more predictable)\n3. Targets: fasting <5.3, 1h post-meal <7.8, 2h <6.7 mmol/L\n\n**Post-delivery:** OGTT at 6 weeks (GDM resolves in ~90% but ↑T2DM risk long-term → annual HbA1c)\n\n---\n\n### Antenatal Screening (SG)\n\n| Test | When |\n|---|---|\n| Blood group, Rh, FBC, VDRL, Rubella, Hep B | First visit |\n| First trimester combined screening (USS + PAPP-A + β-hCG) | 11–14 weeks |\n| NIPT (optional, non-invasive prenatal testing) | 10+ weeks |\n| Anomaly USS | 18–22 weeks |\n| GDM screen (OGTT) | 24–28 weeks |\n| GBS swab | 35–37 weeks |\n\n---"

          "slug": "paediatrics-common-conditions-for-gp",
          "title": "Paediatrics — Common Conditions for GP",
          "markdown": "### Fever in Children\n\n**Under 3 months:** any fever ≥38°C → **urgent referral/A&E** (sepsis risk — limited immune response)\n\n**3 months to 5 years:** assess using traffic light system:\n\n| Green (low risk) | Amber (intermediate) | Red (high risk — refer) |\n|---|---|---|\n| Normal colour | Pallor | Pale/mottled/ashen/blue |\n| Responds normally | Reduced activity | No response to social cues |\n| Normal cry | Nasal flaring | High-pitched/weak cry |\n| Moist mucosa | Dry mucosa, poor feeding | Non-blanching rash |\n| — | Fever >5 days | Bulging fontanelle |\n| — | Fever >39°C at 3–6m | Stiff neck, photophobia |\n\n**Antipyretics:** paracetamol 15mg/kg q4–6h OR ibuprofen 10mg/kg q6–8h (if >3 months). Alternate if one not controlling fever.\n\n> [!warning] Avoid aspirin in children <16 (Reye's syndrome risk).\n\n---\n\n### Febrile Seizure\n\n- **Simple:** generalised, <15 min, single episode in 24h, full recovery, age 6m–5y\n- **Complex:** focal, >15 min, recurs within 24h, or Todd's paresis\n- Reassure parents: simple febrile seizures do NOT cause brain damage or epilepsy in most cases\n- Management: ensure airway, antipyretics, midazolam 0.2mg/kg buccal (if >5 min)\n- Investigate: source of fever. LP not routinely needed in simple febrile seizure >18 months.\n- Recurrence risk: ~30%. No prophylactic anticonvulsants for simple febrile seizures.\n\n---\n\n### Asthma in Children\n\n**Diagnosis:** >5 years: spirometry + bronchodilator reversibility. <5 years: clinical diagnosis (wheeze, cough worse at night, triggered by URTI/exercise).\n\n**Step-up (GINA paediatric):**\n1. SABA PRN (salbutamol 100mcg MDI via spacer)\n2. Low-dose ICS (fluticasone 50mcg BD or budesonide 100mcg BD via spacer)\n3. ICS + LABA (salmeterol/fluticasone or formoterol/budesonide)\n4. Refer paediatric respirology\n\n**Acute wheeze in children:**\n- Salbutamol 6 puffs (100mcg each) via spacer, repeat q20 min × 3\n- Prednisolone 1–2mg/kg (max 40mg) × 3–5 days\n- O₂ if SpO₂ <94%\n- Transfer if: SpO₂ <92%, no improvement after 3 salbutamol doses, severe recession\n\n**Spacer technique:** crucial — most children get poor drug delivery without it. Tight face-mask seal, 10 tidal breaths per actuation, wash spacer monthly.\n\n---\n\n### Childhood Vaccinations — SG National Childhood Immunisation Schedule\n\n| Age | Vaccines |\n|---|---|\n| Birth | BCG, Hep B (1st dose) |\n| 1 month | Hep B (2nd dose) |\n| 3 months | DTaP-IPV-Hib (1st), PCV (1st), Rotavirus (1st) |\n| 4 months | DTaP-IPV-Hib (2nd), PCV (2nd), Rotavirus (2nd) |\n| 5 months | DTaP-IPV-Hib (3rd), Rotavirus (3rd if needed) |\n| 6 months | Hep B (3rd dose) |\n| 12 months | PCV (booster) |\n| 12–15 months | MMR (1st), Varicella (1st) |\n| 18 months | DTaP-IPV-Hib (booster) |\n| 4–6 years | DTaP-IPV (booster), MMR (2nd), Varicella (2nd) |\n| 10–11 years | Tdap, HPV (girls — 2 doses) |\n\n**PCV:** Pneumococcal conjugate vaccine | **DTaP:** Diphtheria, Tetanus, Pertussis | **IPV:** Inactivated polio | **Hib:** Haemophilus influenzae b | **MMR:** Measles, Mumps, Rubella\n\n---\n\n### Common Childhood Rashes\n\n| Rash | Features | Cause | Management |\n|---|---|---|---|\n| **Chickenpox (varicella)** | Crops of vesicles (all stages simultaneously), itchy, starts trunk → spreads | VZV | Supportive, calamine, antihistamine. Aciclovir if immunocompromised or severe. Isolate until all lesions crusted. |\n| **Hand, foot and mouth** | Vesicles on palms/soles/mouth ulcers, mild fever | Enterovirus 71 / Coxsackie | Supportive. Notifiable in SG. Keep off school 10 days. |\n| **Roseola infantum** | High fever 3–5 days → rash appears as fever breaks | HHV-6 | Supportive. Rash benign. |\n| **Measles** | Koplik's spots → maculopapular rash (face → trunk), cough/coryza/conjunctivitis | Measles virus | Supportive. Vit A supplementation. Notifiable. Isolation. |\n| **Rubella** | Mild, pink macular rash, posterior cervical lymphadenopathy | Rubella virus | Supportive. Critical: avoid pregnant contacts. Notifiable. |\n| **Meningococcal** | Non-blanching petechiae/purpura | N. meningitidis | **Emergency.** Ceftriaxone immediately. |\n| **Eczema / atopic dermatitis** | Flexural distribution, pruritic, chronic — see Dermatology section | — | TCS, emollients |\n\n---\n\n### Growth Faltering (Failure to Thrive)\n\n**Definition:** weight consistently <2nd centile OR crossing 2 major centiles downward on growth chart.\n\n**Causes:**\n- **Inadequate intake** (most common): breastfeeding difficulties, poor appetite, food aversion, feeding difficulties\n- **Increased losses:** malabsorption (coeliac — but you excluded; cystic fibrosis), chronic diarrhoea\n- **Increased demands:** chronic illness, congenital heart disease, hyperthyroidism\n\n**Assessment:** detailed feeding history, growth chart, examination (dysmorphic features, organomegaly), FBC, UEC, TFTs, coeliac antibodies, urine MCS\n\n**Management:** nutritional support, dietitian referral, treat underlying cause, child protection consideration if neglect suspected.\n\n---\n\n### Dehydration in Children\n\n**Assessment:**\n\n| Severity | Signs |\n|---|---|\n| Mild (<5%) | Thirsty, slightly dry mucosa, normal observations |\n| Moderate (5–10%) | Sunken eyes/fontanelle, ↓skin turgor, tachycardia, ↓urine output |\n| Severe (>10%) | Above + lethargy, mottled skin, capillary refill >3 sec, weak pulse |\n\n**Causes:** gastroenteritis (most common), fever, poor intake\n\n**Management:**\n- Mild-moderate: **oral rehydration solution (ORS)** — 50–100mL/kg over 4h + replace ongoing losses (10mL/kg per diarrhoea episode, 5mL/kg per vomit)\n  - Use commercial ORS (Hydralyte, Pedialyte) — NOT sports drinks, fruit juice, or plain water\n- Severe / unable to tolerate oral: IV normal saline 20mL/kg bolus → reassess → replace deficit over 24h\n\n> [!warning] Avoid anti-diarrhoeal agents (loperamide) in children — not safe.\n\n---\n\n### Developmental Milestones — Red Flags\n\n| Age | Red Flag |\n|---|---|\n| 2 months | Not fixing and following with eyes |\n| 4 months | Not smiling socially |\n| 6 months | Not sitting with support; not babbling |\n| 9 months | No back-and-forth sharing of sounds/expressions |\n| 12 months | Not pointing; no babbling; no single words |\n| 18 months | No words; not walking |\n| 24 months | No 2-word phrases; not following simple instructions |\n| Any age | **Loss of any previously acquired milestone** → urgent referral |\n\n> [!note] Singapore: refer to KKH Child Development Unit or NUH Child Development Programme for formal developmental assessment."

          "markdown": "### Pain\n\n**WHO analgesic ladder:**\n1. Paracetamol 1g QID ± NSAIDs (ibuprofen 400mg TDS or celecoxib 200mg OD)\n2. Weak opioid: codeine 30–60mg q4–6h OR tramadol 50–100mg q4–6h\n3. Strong opioid: morphine, oxycodone, fentanyl patch\n\n**Morphine (oral immediate-release):**\n- Starting dose: opioid-naive = 2.5–5mg q4h + PRN (same dose for breakthrough, up to hourly)\n- Titrate: if using >3 breakthrough doses/day → increase regular dose by 30–50%\n- Switch to modified release (MST/Zomorph) once stable: divide total 24h dose by 2, give BD\n- Fentanyl patch: convert from total oral morphine dose (72h patch)\n- ⚠️ Always co-prescribe laxative with opioids (senna + lactulose). Nausea settles in 1–2 weeks.\n\n**Neuropathic component:** amitriptyline 10–25mg nocte OR pregabalin 75mg BD (add to opioid — opioids alone ineffective for neuropathic pain)\n\n---\n\n### Breathlessness\n\n- Low-dose morphine (2.5–5mg oral q4h) is the most effective pharmacological treatment for dyspnoea\n- Fan directed at face — stimulates trigeminal nerve, ↓perception of dyspnoea\n- Lorazepam 0.5–1mg sublingual PRN for anxiety component\n- O₂ only if hypoxic (SpO₂ <90%) — no benefit in normoxic dyspnoea\n\n---\n\n### Nausea & Vomiting\n\n**Step 1 — identify cause:**\n- Opioid-induced: metoclopramide 10mg TDS or haloperidol 0.5–1.5mg nocte (tolerance usually develops in 1–2 weeks — can stop)\n- Bowel obstruction: haloperidol + hyoscine butylbromide (avoid prokinetics)\n- Brain mets / ↑ICP: dexamethasone 8–16mg OD + cyclizine\n- Metabolic (hypercalcaemia, uraemia): haloperidol 0.5–1.5mg OD–BD\n\n---\n\n### Constipation\n\n- Universal with opioids — **always prescribe laxative prophylactically**\n- Senna 2 tabs BD + lactulose 15mL BD (stimulant + osmotic)\n- Escalate: bisacodyl suppository, movicol sachets, PR enema\n- Opioid-induced constipation refractory: methylnaltrexone SC (peripheral opioid antagonist — does not affect analgesia)\n\n---\n\n### Agitation / Terminal Restlessness\n\n- Midazolam 2.5–5mg SC/IV q1h PRN (most versatile — also for seizures, breathlessness)\n- Haloperidol 0.5–2mg SC q4–6h PRN (delirium-type agitation)\n- Levomepromazine 6.25–12.5mg SC (very sedating — use if above inadequate)\n\n---\n\n### Syringe Driver (CSCI — Continuous SC Infusion)\n\nUse when oral route not possible (dysphagia, vomiting, coma). Combine over 24h:\n- Morphine (equivalent dose) + midazolam 10–20mg + haloperidol 1.5–5mg\n\n> [!note] Refer to palliative care team early — not just at end of life. They help with symptom control, goals of care, and family support throughout.\n\n---"

          "markdown": "### Diagnosis\n- Symptoms: wheeze, chest tightness, dyspnoea, cough (worse nocturnal/early morning)\n- Spirometry: FEV1/FVC <0.70 + ≥12% and 200 mL improvement post-bronchodilator\n- Consider in: atopy, eczema, allergic rhinitis, family history\n\n---\n\n### GINA Treatment Steps\n\n| Step | Indication | Preferred Treatment |\n|---|---|---|\n| 1 | Symptoms <2×/month | Low-dose ICS-formoterol PRN *(preferred over SABA alone)* |\n| 2 | Symptoms >2×/month, not daily | Low-dose ICS daily + SABA PRN (budesonide 200 mcg BD or fluticasone 100 mcg BD) |\n| 3 | Daily symptoms | Low-dose ICS-LABA (Seretide 125/25 BD or Symbicort 160/4.5 BD). **MART regimen preferred.** |\n| 4 | Severe persistent | Medium/high ICS-LABA + LAMA (tiotropium 2.5 mcg OD) |\n| 5 | Severe uncontrolled | High-dose ICS-LABA + biologics (refer pulmonologist) |\n\n**Biologics by phenotype:**\n- Eosinophilic (eos ≥300): mepolizumab, benralizumab (anti-IL-5)\n- Allergic: omalizumab (anti-IgE)\n- T2 high: dupilumab (anti-IL-4/13)\n\n> [!warning] SABA overuse (>2 canisters/year) = marker of poor control → step up ICS\n\n---\n\n### Assessment of Control *(over past 4 weeks — well-controlled if ALL met)*\n- Daytime symptoms ≤2×/week\n- No night waking\n- Reliever use ≤2×/week\n- No activity limitation\n\n---\n\n### Acute Exacerbation — GP Management\n\n| Severity | SpO₂ | Action |\n|---|---|---|\n| Mild–moderate | >92% | Salbutamol 2.5–5 mg neb q20 min × 3; prednisolone 40–50 mg OD × 5 days |\n| Severe | <92% | Add ipratropium 0.5 mg neb; O₂ to SpO₂ 93–95%; urgent transfer |\n| Life-threatening | Silent chest, cyanosis, GCS↓ | Immediate ICU transfer |\n\n---"

          "markdown": "### Diagnosis\nPost-bronchodilator FEV1/FVC <0.70. **Spirometry required** — do not diagnose on CXR or symptoms alone.\n\n### GOLD Spirometric Severity\n\n| Grade | FEV1 % predicted |\n|---|---|\n| GOLD 1 (Mild) | ≥80% |\n| GOLD 2 (Moderate) | 50–79% |\n| GOLD 3 (Severe) | 30–49% |\n| GOLD 4 (Very severe) | <30% |\n\n### GOLD Groups\n\n| Group | Exacerbations | Symptoms | First-line |\n|---|---|---|---|\n| A | 0–1 | CAT <10 or mMRC 0–1 | SABA or SAMA PRN |\n| B | 0–1 | CAT ≥10 or mMRC ≥2 | LAMA *(preferred)* or LABA |\n| E | ≥2 or ≥1 hospitalisation | Any | LAMA + LABA |\n\n---\n\n### Inhaler Step Ladder\n\n**Group A — SABA/SAMA PRN:**\n- Salbutamol 100 mcg MDI: 1–2 puffs PRN (max 4 puffs QID)\n- Ipratropium 20 mcg MDI: 2 puffs TDS–QID\n\n**Group B — LAMA** (preferred):\n\n| Drug | Dose |\n|---|---|\n| Tiotropium (Spiriva Respimat) | 5 mcg OD |\n| Umeclidinium (Incruse) | 55 mcg OD |\n| Glycopyrronium (Seebri) | 44 mcg OD |\n\n**Group E — LAMA + LABA:**\n\n| Drug | Dose |\n|---|---|\n| Umeclidinium/Vilanterol (Anoro Ellipta) | 55/22 mcg OD |\n| Tiotropium/Olodaterol (Spiolto) | 5/5 mcg OD |\n| Aclidinium/Formoterol (Duaklir) | 340/12 mcg BD |\n\n**Step Up to Triple (LAMA + LABA + ICS):**\n*(if eosinophils ≥300, or frequent exacerbations despite LAMA+LABA)*\n\n| Drug | Dose |\n|---|---|\n| Trelegy Ellipta (Fluticasone/Umeclidinium/Vilanterol) | 100/62.5/25 mcg OD |\n| Breztri (Budesonide/Glycopyrronium/Formoterol) | 160/7.2/4.8 mcg BD |\n\n> [!warning] ICS in COPD ↑ pneumonia risk — use only if eosinophil-guided or frequent exacerbations\n\n---\n\n### Exacerbation Management\n\n> [!danger] Target SpO₂ **88–92%** (NOT 95–100% — hypercapnic drive risk)\n\n| Step | Intervention |\n|---|---|\n| 1 | Controlled O₂: 28% Venturi or 1–2 L/min nasal prongs. Get ABG. |\n| 2 | Salbutamol 2.5–5 mg + Ipratropium 0.5 mg neb q20–30 min × 3, then q4–6h |\n| 3 | Prednisolone **40 mg OD × 5 days** (no benefit extending beyond 5 days) |\n| 4 | Antibiotics if purulent sputum/infection/severe (see below) |\n| 5 | NIV (BiPAP) if pH <7.35 + pCO₂ >45: IPAP 10–20, EPAP 4–5 cmH₂O |\n\n**Antibiotics:**\n\n| Severity | Choice |\n|---|---|\n| Mild–moderate | Amoxicillin 500 mg TDS × 5d OR doxycycline 100 mg BD × 5d OR co-amoxiclav 625 mg TDS × 5d |\n| Severe / Pseudomonas risk | Piperacillin-tazobactam 4.5g IV q6–8h |\n\n*Pseudomonas risk: frequent exacerbations, prior Pseudomonas, bronchiectasis*\n\n---"

          "markdown": "### Diagnosis\n\nSymptoms: fever, cough (purulent sputum), dyspnoea, pleuritic chest pain\nSigns: reduced air entry, dullness, bronchial breathing, crackles\n\n> [!note] CXR: consolidation confirms diagnosis. A normal CXR does NOT exclude CAP if pre-test probability is high (repeat in 24–48h).\n\n**Investigations:** CXR, FBC, UEC, CRP, blood cultures ×2 (before antibiotics if possible), sputum culture, Legionella urinary antigen (if severe), pneumococcal urinary antigen\n\n---\n\n### Severity — CURB-65\n\n| Criterion | Score |\n|---|---|\n| **C**onfusion (new) | 1 |\n| **U**rea >7 mmol/L | 1 |\n| **R**R ≥30/min | 1 |\n| **B**P <90 systolic or ≤60 diastolic | 1 |\n| Age **65** or older | 1 |\n\n| Score | Setting | 30-day mortality |\n|---|---|---|\n| 0–1 | Outpatient | <3% |\n| 2 | Consider admit | 9% |\n| 3–5 | Admit ± ICU | 15–40% |\n\n---\n\n### Treatment\n\n| Setting | Antibiotic |\n|---|---|\n| Outpatient, low risk | Amoxicillin 1g TDS × 5–7 days |\n| Outpatient, atypical suspected | Doxycycline 100mg BD × 5 days |\n| Inpatient, non-ICU | Ceftriaxone 2g IV OD + azithromycin 500mg OD |\n| ICU / severe | Piperacillin-tazobactam 4.5g IV q6h + azithromycin |\n| Legionella suspected | Levofloxacin 750mg OD monotherapy |\n\nDuration: 5 days (mild-moderate); 7–10 days (severe or Legionella)\n\n> [!warning] If no improvement at 48–72h: review diagnosis, escalate cover, consider bronchoscopy, check for complications (empyema, lung abscess).\n\n**Influenza:** oseltamivir 75mg BD × 5 days within 48h. Add if flu season + severe CAP.\n\n---\n\n### Follow-Up\n\n- Repeat CXR at 6 weeks in all patients >50 or smokers (exclude underlying malignancy)\n- Pneumococcal vaccine + influenza vaccine after recovery\n\n---"

          "markdown": "> [!note] Singapore TB incidence ~30–35 per 100,000 — high by developed country standards. TB is a **notifiable disease**. All confirmed TB must be reported to MOH within 24 hours.\n\n### When to Suspect\n\n- Cough >3 weeks + night sweats + weight loss + fever\n- Haemoptysis in any patient\n- Any immigrant from high-endemic country (Philippines, Indonesia, India, Myanmar — common in SG)\n- HIV-positive patient with respiratory symptoms\n- Pleural effusion (lymphocytic) in young adult\n- Meningitis with subacute onset + lymphocytic CSF\n\n---\n\n### Investigations\n\n**Sputum:**\n- AFB smear × 3 (early morning) — sensitivity ~50–80% for pulmonary TB\n- TB culture (gold standard, 2–8 weeks) + drug susceptibility testing (DST)\n- TB NAAT (nucleic acid amplification — Xpert MTB/RIF): rapid, detects rifampicin resistance. Sensitivity ~90% smear-positive, ~67% smear-negative.\n\n**Imaging:**\n- CXR: upper lobe infiltrates, cavitation, miliary pattern, pleural effusion\n- CT chest: better detail for cavitation, lymphadenopathy, miliary\n\n**Blood/other:**\n- IGRA (QuantiFERON-TB Gold): latent vs active TB. Positive = exposure, not active disease.\n- CSF (if meningitis): lymphocytic, low glucose, ADA elevated, TB PCR\n- Pleural fluid ADA >40 IU/L: TB pleuritis\n\n---\n\n### Treatment\n\n**Drug-susceptible TB (standard regimen):**\n\n| Phase | Duration | Drugs |\n|---|---|---|\n| Intensive | 2 months | **RHEZ** — Rifampicin + Isoniazid + Ethambutol + Pyrazinamide |\n| Continuation | 4 months | **RH** — Rifampicin + Isoniazid |\n\nTotal: **6 months** (9–12 months for CNS TB, bone TB, or extensive disease)\n\n**Key side effects:**\n- Rifampicin: orange urine/sweat (warn patient — not harmful), hepatitis, ↑warfarin metabolism\n- Isoniazid: peripheral neuropathy (give pyridoxine 25mg OD), hepatitis\n- Ethambutol: optic neuritis — check colour vision and acuity regularly\n- Pyrazinamide: hepatitis, gout (↑uric acid), arthralgia\n\n**Directly observed therapy (DOT):** standard in SG for infectious cases. TB control programme through SingHealth/NHG TB clinics.\n\n**Latent TB (LTBI):**\n- IGRA positive, no active disease, no prior treatment\n- Treat if: immunocompromised, on biologics/steroids, healthcare worker, close contact\n- Isoniazid 300mg OD × 6–9 months + pyridoxine OR rifampicin 600mg OD × 4 months\n\n---"

          "markdown": "### Clinical Probability — Wells Score\n\n| Criterion | Points |\n|---|---|\n| Clinical signs/symptoms of DVT | 3 |\n| PE is #1 diagnosis or equally likely | 3 |\n| HR >100 | 1.5 |\n| Immobilisation ≥3 days or surgery within 4 weeks | 1.5 |\n| Prior DVT or PE | 1.5 |\n| Haemoptysis | 1 |\n| Malignancy (on treatment, or treated in last 6 months) | 1 |\n\n**Interpretation:** ≤4 = PE unlikely (do D-dimer) | >4 = PE likely (do CTPA directly)\n\n---\n\n### PERC Rule *(if pre-test probability low — can rule out PE without D-dimer if ALL 8 negative)*\n\n1. Age <50\n2. HR <100\n3. SpO₂ ≥95%\n4. No haemoptysis\n5. No exogenous oestrogen use\n6. No prior DVT/PE\n7. No unilateral leg swelling\n8. No surgery/trauma requiring hospitalisation within 4 weeks\n\n---\n\n### D-Dimer\n- High sensitivity (~95%), low specificity\n- Useful to **rule out** PE if pre-test probability low\n- **Age-adjusted D-dimer cutoff:** age × 10 mcg/L (if age >50)\n  - e.g. age 70 → cutoff = 700 mcg/L instead of standard 500\n- Elevated in: PE, DVT, infection, malignancy, pregnancy, post-op, DIC — non-specific\n\n---\n\n### CTPA\n- Gold standard for diagnosis\n- Sensitivity ~83–96%, specificity ~86–97%\n- Also gives information on RV strain (RV:LV ratio >0.9 = RV dysfunction)\n- V/Q scan: use if contrast allergy or CKD; also good in pregnancy (lower radiation to breast)\n\n---\n\n### Severity Stratification\n\n| Category | Haemodynamics | RV Dysfunction | Troponin/BNP | Mortality | Management |\n|---|---|---|---|---|---|\n| **Massive (high-risk)** | Unstable (SBP <90, shock, arrest) | Yes | Usually elevated | >15% | Thrombolysis or surgical embolectomy |\n| **Submassive (intermediate-high)** | Stable | Yes (echo/CT) | Elevated | 3–15% | Anticoagulate; consider CDT |\n| **Low-risk** | Stable | No | Normal | <1% | Anticoagulate; early discharge if sPESI=0 |\n\n**sPESI score** *(simplified PE Severity Index — score 0 = low risk, safe to discharge)*\n- Age >80 (1 pt)\n- Cancer (1 pt)\n- Chronic cardiopulmonary disease (1 pt)\n- HR ≥110 (1 pt)\n- SBP <100 (1 pt)\n- SpO₂ <90% (1 pt)\n\n**Hestia Criteria** — if any YES → admit; if ALL no → safe for outpatient treatment\n\n---\n\n### Management Summary\n*(See also [[#Anticoagulation by Indication]] — Massive/Submassive/Low-risk PE)*\n\n- **Massive PE:** UFH + alteplase 100 mg over 2h (50 mg IV push in arrest → CPR ×90 min)\n- **Submassive:** anticoagulate (LMWH/DOAC); consider catheter-directed thrombolysis (CDT)\n- **Low-risk:** DOAC (rivaroxaban or apixaban preferred — no parenteral lead-in needed); early discharge with outpatient follow-up\n\n---"

          "markdown": "### Classification\n\n| Type | pO₂ | pCO₂ | Mechanism | Examples |\n|---|---|---|---|---|\n| **Type 1** (hypoxaemic) | ↓ | Normal or ↓ | V/Q mismatch, shunt, diffusion | Pneumonia, ARDS, pulmonary oedema, PE |\n| **Type 2** (hypercapnic) | ↓ | ↑ | Hypoventilation | COPD, neuromuscular disease, opioids, severe asthma, chest wall deformity |\n\n> [!note] Type 1 responds to O₂. Type 2 requires treatment of the cause + ventilatory support if severe.\n\n**A-a gradient differentiates:**\n- High A-a + Type 1 → intrinsic lung pathology\n- Normal A-a + ↑CO₂ → pure hypoventilation (CNS, NMJ, chest wall)\n\n---\n\n### ARDS (Acute Respiratory Distress Syndrome) — Berlin Definition\n\nAll four criteria:\n1. **Onset** within 1 week of known insult or new/worsening symptoms\n2. **Bilateral opacities** on CXR/CT not fully explained by effusions, collapse, or nodules\n3. **Not cardiogenic** — respiratory failure not fully explained by cardiac failure or fluid overload (echo to exclude if uncertain)\n4. **P/F ratio** (PaO₂/FiO₂) on PEEP ≥5 cmH₂O:\n   - Mild: 200–300 | Moderate: 100–200 | Severe: <100\n\n**Common causes (ARDS is a syndrome, not a diagnosis):**\nDirect: pneumonia, aspiration, pulmonary contusion, inhalation injury\nIndirect: sepsis (most common), pancreatitis, major trauma, transfusion (TRALI), burns\n\n**Lung-protective ventilation (cornerstone of ARDS management):**\n- Tidal volume: **4–6 mL/kg ideal body weight** (low tidal volume ventilation — ARDSNet)\n- Plateau pressure: <30 cmH₂O\n- PEEP: titrate upward (5–20 cmH₂O) — prevents alveolar collapse\n- Prone positioning: ≥16h/day in moderate-severe ARDS (↓mortality — PROSEVA trial)\n- Conservative fluid strategy once resuscitated\n- Avoid: hyperoxia (target SpO₂ 92–96%), hypercapnia (permissive up to pH >7.20)\n- Neuromuscular blockade (cisatracurium): consider in moderate-severe to improve synchrony\n\n---\n\n### NIV (Non-Invasive Ventilation)\n\n**CPAP (Continuous Positive Airway Pressure):**\n- One pressure level throughout breathing cycle\n- Best for: **cardiogenic pulmonary oedema** (first-line), OSA, post-extubation support\n- Typical settings: 5–10 cmH₂O\n\n**BiPAP (Bilevel Positive Airway Pressure):**\n- IPAP (inspiratory support) + EPAP (expiratory, = PEEP)\n- Best for: **COPD exacerbation with respiratory acidosis** (pH 7.25–7.35), Type 2 respiratory failure, cardiogenic oedema if CPAP fails, neuromuscular disease\n- Typical start: IPAP 12–14, EPAP 4–5; titrate IPAP up to 20 for CO₂ clearance\n\n**Contraindications to NIV:**\n- Cardiac or respiratory arrest\n- Non-respiratory organ failure (haemodynamic instability, encephalopathy — cannot protect airway)\n- Upper airway obstruction\n- Facial trauma/surgery/deformity\n- Inability to cooperate or clear secretions\n- Undrained pneumothorax\n\n**HFNC (High-Flow Nasal Cannula):**\n- 20–60 L/min flow, FiO₂ 21–100%, heated/humidified\n- Reduces dead space, generates low PEEP (~1 cmH₂O per 10 L/min)\n- Use in: mild-moderate hypoxic respiratory failure (Type 1), COVID pneumonia, pre-intubation preoxygenation, post-extubation\n- Does NOT clear CO₂ effectively — avoid in Type 2 failure\n\n---\n\n### Indications for Intubation\n\n> [!danger] Intubate early if deteriorating on NIV or high-flow — crash intubation is more dangerous\n\n- Failure of NIV/HFNC (SpO₂ not maintaining, pH <7.25 and worsening, ↑work of breathing)\n- Cannot protect airway (GCS ≤8, coma, bulbar dysfunction)\n- Respiratory/cardiac arrest\n- Massive secretions unable to clear\n- Haemodynamic instability not responding to treatment\n- Anticipated deterioration (fatigue, exhaustion, rising CO₂ trend)\n\n**Rapid Sequence Intubation (RSI):**\n- Preoxygenate: HFNC or NRB mask × 3–5 min\n- **Induction:** ketamine 1–2 mg/kg IV (haemodynamically stable agent; bronchodilator; preferred in hypotension) OR propofol 1.5–2 mg/kg (avoid if hypotensive) OR etomidate 0.3 mg/kg (avoid if adrenal insufficiency concern)\n- **Paralytic:** succinylcholine 1.5 mg/kg IV (fastest, 60 sec) — avoid in hyperK, burns, crush injury, prolonged paralysis, malignant hyperthermia risk. Alternative: rocuronium 1.2 mg/kg IV (reversed by sugammadex 16 mg/kg if needed)\n- Sellick's manoeuvre (cricoid pressure): controversial — apply if used\n- **Confirmation:** waveform capnography (gold standard), bilateral chest expansion, CXR\n\n---"

          "markdown": "### Step 1 — Transudate or Exudate?\n\nSend **simultaneously**: pleural fluid protein + LDH, AND serum protein + LDH.\n\n**Light's Criteria** — exudate if ANY ONE positive:\n\n| Criterion | Exudate threshold |\n|---|---|\n| Pleural protein / Serum protein | **>0.5** |\n| Pleural LDH / Serum LDH | **>0.6** |\n| Pleural LDH | **>⅔ upper limit of normal serum LDH** |\n\n> [!warning] HF on diuretics can be falsely classified as exudate. If clinically looks like HF but meets exudate criteria → check **serum albumin − pleural albumin**. If >12 g/L → still a transudate.\n\n---\n\n### Step 2 — What to Send from the Tap\n\n| Test | Interpretation |\n|---|---|\n| **Appearance** | Clear = transudate/TB. Turbid/pus = empyema. Milky = chylothorax. Bloody = malignancy/PE/trauma |\n| **pH** | <7.2 = drain it (complicated parapneumonic or empyema) |\n| **Glucose** | <3.4 mmol/L = empyema, RA, or malignancy |\n| **Cell differential** | Neutrophils = bacterial/acute. Lymphocytes = TB or malignancy. |\n| **Cytology** | Malignant cells (~60% sensitive — send ×3 separate samples to ↑yield) |\n| **Gram stain + culture** | Infection |\n| **ADA** | >40 IU/L = TB (especially young patient + lymphocytic effusion) |\n| **Triglycerides** | >1.24 mmol/L = chylothorax (thoracic duct disruption) |\n| **Amylase** | >200 IU/L = pancreatitis or oesophageal rupture |\n\n> [!note] Always send pleural fluid AND serum protein/LDH/albumin simultaneously — Light's criteria are invalid without the paired serum values.\n\n---\n\n### Step 3 — Cause by Pattern\n\n**Transudate** (systemic problem — low protein, low LDH):\n- Heart failure *(most common)*\n- Hepatic cirrhosis / hepatic hydrothorax\n- Nephrotic syndrome\n- Hypothyroidism\n- Hypoalbuminaemia (any cause)\n\n**Exudate** (local/inflammatory — high protein, high LDH):\n- Parapneumonic effusion / empyema\n- Malignancy (lung, breast, lymphoma most common)\n- TB pleuritis *(important in SG — ADA >40, young adult, lymphocytic)*\n- Pulmonary embolism\n- Autoimmune (SLE bilateral; RA — characteristically very low glucose)\n- Pancreatitis (high amylase, left-sided)\n\n---\n\n### When to Drain\n\n| Situation | Action |\n|---|---|\n| pH <7.2 | Drain (chest tube) |\n| Frank pus | Drain (chest tube) |\n| Malignant effusion, recurrent | Pleurodesis or indwelling pleural catheter |\n| Therapeutic for breathlessness | Max 1.5 L per session (re-expansion pulmonary oedema risk) |\n\n> [!warning] TB pleuritis: notifiable disease in Singapore. Standard RHEZ × 2 months → RH × 4 months. ADA >40 IU/L is 90% sensitive and specific for TB pleuritis in the right clinical context.\n\n---"

          "markdown": "### Rheumatoid Arthritis (RA)\n\n**Diagnosis (ACR/EULAR 2010 — score ≥6/10 = definite RA):**\n\n| Domain | Score |\n|---|---|\n| Joint involvement: 1 large joint | 0 |\n| 2–10 large joints | 1 |\n| 1–3 small joints | 2 |\n| 4–10 small joints | 3 |\n| >10 joints (at least 1 small) | 5 |\n| Serology: negative RF + negative anti-CCP | 0 |\n| Low positive RF or anti-CCP | 2 |\n| High positive RF or anti-CCP (>3× ULN) | 3 |\n| Acute phase reactants: normal CRP + ESR | 0 |\n| Abnormal CRP or ESR | 1 |\n| Duration: <6 weeks | 0; ≥6 weeks = 1 |\n\n**Classic features:** symmetrical small joint polyarthritis (MCPs, PIPs, wrists — spares DIPs), morning stiffness >1h, bilateral, ulnar deviation, swan-neck, boutonnière deformity (late)\n\n**Extra-articular:** rheumatoid nodules, ILD, pericarditis, vasculitis, scleritis, Felty's syndrome (RA + splenomegaly + neutropenia), anaemia of chronic disease\n\n**Investigations:** RF (60–70% sensitive, not specific), anti-CCP (70% sensitive, >95% specific — most specific serological test), CRP/ESR (disease activity), hand/feet XR (erosions, joint space narrowing)\n\n---\n\n**Treatment — Treat-to-Target (T2T): target remission or low disease activity**\n\n**Step 1 — cDMARD (start immediately on diagnosis):**\n- **Methotrexate (MTX)** 10–25 mg weekly SC/oral (first-line) + folic acid 5 mg weekly (or 1 mg/day)\n  - Monitor: FBC, LFTs monthly × 3, then q3 months\n  - CI: pregnancy (teratogenic — stop 3 months before conception), severe hepatic/renal disease\n  - Leflunomide 10–20 mg OD (alternative if MTX intolerant)\n  - Hydroxychloroquine 200–400 mg OD (mild RA; also lupus, Sjögren's; retinal toxicity — annual eye screen)\n  - Sulfasalazine 500 mg OD → 1–1.5g BD (combination with MTX and HCQ = triple therapy)\n\n**Short-term bridge:** prednisolone 7.5–15 mg OD (taper over weeks as cDMARD takes effect)\n\n**Step 2 — Biologic or targeted synthetic DMARD (if cDMARD fails at 3–6 months):**\n\n| Class | Drug | Route |\n|---|---|---|\n| Anti-TNF | Etanercept, adalimumab, certolizumab, golimumab, infliximab | SC or IV |\n| Anti-IL-6 | Tocilizumab (also IV), sarilumab | SC/IV |\n| T-cell costimulation blocker | Abatacept | SC/IV |\n| Anti-CD20 | Rituximab | IV (for seropositive RA) |\n| JAK inhibitors (tsDMARDs) | Tofacitinib 5 mg BD, baricitinib 2–4 mg OD, upadacitinib 15 mg OD | Oral |\n\n> [!warning] Screen before biologics: TB (IGRA/Mantoux), HBV (HBsAg + anti-HBc), HIV, baseline FBC/LFTs/renal. Withhold during active infection.\n\n**RA in pregnancy:** MTX/leflunomide STOP. Hydroxychloroquine SAFE. Sulfasalazine SAFE (continue). Prednisolone SAFE. Anti-TNF: generally stop at 3rd trimester (adalimumab, certolizumab can continue — certolizumab preferred — negligible placental transfer).\n\n---\n\n### Systemic Lupus Erythematosus (SLE)\n\n> [!note] SLE predominantly affects women of Asian descent (10–15× more common in women; Asians 2–3× higher prevalence than Caucasians). Common in SG.\n\n**2019 EULAR/ACR Classification Criteria (score ≥10 = SLE if ANA ≥1:80):**\n\nKey domains: constitutional (fever), haematological (cytopenia), neuropsychiatric, mucocutaneous, serosal, musculoskeletal, renal, anti-phospholipid antibodies, complement (low C3/C4), SLE-specific antibodies (anti-dsDNA, anti-Sm)\n\n**Classic features:**\n- Malar (\"butterfly\") rash (spares nasolabial folds)\n- Photosensitive rash, discoid rash\n- Oral ulcers (painless)\n- Non-scarring alopecia\n- Arthralgia/arthritis (non-erosive — Jaccoud's arthropathy)\n- Serositis (pleuritis, pericarditis)\n- Renal (lupus nephritis — see below)\n- Neuropsychiatric (seizures, psychosis, headache, peripheral neuropathy)\n- Haematological: haemolytic anaemia, lymphopenia, thrombocytopenia, leukopenia\n\n**Antibodies:**\n| Ab | Sensitivity | Specificity | Associations |\n|---|---|---|---|\n| ANA | 95–99% | Low | Screening (not diagnostic alone) |\n| Anti-dsDNA | 70% | 95% | Disease activity marker; lupus nephritis |\n| Anti-Sm | 25–30% | 99% | Highly specific for SLE |\n| Anti-Ro/SSA | 30–40% | Moderate | Neonatal lupus, SCLE, photosensitivity |\n| Anti-La/SSB | 15–20% | — | With anti-Ro |\n| Anti-phospholipid | 30–40% | — | APS (thrombosis, pregnancy loss) |\n| Low C3/C4 | Variable | — | Active disease (especially nephritis) |\n\n---\n\n**Lupus Nephritis (most serious manifestation):**\n\nWHO/ISN class:\n- Class I: minimal mesangial\n- Class II: mesangial proliferative\n- **Class III: focal proliferative (<50% glomeruli)** → treat\n- **Class IV: diffuse proliferative (>50% glomeruli)** → most severe, treat aggressively\n- Class V: membranous\n- Class VI: advanced sclerosis\n\n**Induction (Class III/IV/V):**\n- Hydroxychloroquine 200–400 mg OD (all patients with SLE — reduces flares, mortality)\n- **Mycophenolate mofetil (MMF) 2–3g/day** + prednisolone 0.5–1 mg/kg/day (preferred — ALMS trial)\n- OR **cyclophosphamide** IV pulse (Euro-Lupus regimen: 500 mg IV q2 weeks × 6 doses) — for severe/refractory\n- Belimumab (anti-BLyS): add-on for active nephritis (BLISS-LN trial)\n\n**Maintenance:** MMF 1–2g/day → taper over years; hydroxychloroquine continued indefinitely\n\n---\n\n**Treatment ladder:**\n- Mild (skin, joints, serositis): NSAIDs, hydroxychloroquine, low-dose prednisolone\n- Moderate: add MMF or azathioprine\n- Severe/organ-threatening: high-dose prednisolone (IV methylprednisolone 1g × 3d for acute flare) + immunosuppressive\n\n**Monitoring:** anti-dsDNA + complement (C3/C4) — rises in dsDNA + falls in complement = flare. Urinalysis + UPCR (nephritis activity). FBC, UEC, LFTs.\n\n---\n\n### Seronegative Spondyloarthropathies\n\n#### Ankylosing Spondylitis (AS) / Axial SpA\n\n**Features:** inflammatory back pain (young males, onset <40, insidious, improves with exercise, worse with rest, nocturnal), bilateral sacroiliitis, uveitis (anterior — painful red eye), enthesitis (Achilles, plantar fascia), reduced spinal mobility\n\n**Modified New York Criteria (AS):** radiographic sacroiliitis (grade ≥2 bilateral or grade 3–4 unilateral) + ≥1 clinical criterion (inflammatory back pain, limited lumbar mobility, limited chest expansion)\n\n**nr-axSpA (non-radiographic):** MRI sacroiliitis (bone marrow oedema) + HLA-B27 positive\n\n**Investigations:** HLA-B27 (>90% AS positive, but also found in 8% of healthy population — not diagnostic alone), CRP/ESR, pelvic XR, MRI sacroiliac joints (early), spinal XR (late — bamboo spine, syndesmophytes)\n\n**Treatment:**\n- **NSAIDs** (first-line; continuous use shown to slow radiographic progression): diclofenac 150 mg/day; naproxen 1g/day; celecoxib 200 mg BD\n- **Physiotherapy:** crucial — posture, breathing exercises, extension exercises\n- **Biologics** (if NSAIDs fail after ≥2 NSAID trials at full dose × 4 weeks each):\n  - Anti-TNF: adalimumab, etanercept, infliximab, certolizumab, golimumab — all effective\n  - IL-17A inhibitors: **secukinumab** 150 mg SC q4 weeks (preferred if anti-TNF fails or uveitis concern) or ixekizumab\n  - JAK inhibitor: tofacitinib (axial SpA)\n\n#### Psoriatic Arthritis (PsA)\n\n**Patterns:** oligoarthritis (most common), polyarthritis, axial, DIP arthritis (classic — distinguishes from RA), arthritis mutilans (severe)\n**Clues:** nail changes (pitting, onycholysis), dactylitis (\"sausage digit\"), skin psoriasis (may be subtle — check behind ears, umbilicus, scalp), enthesitis\n\n**Treatment:** NSAIDs (mild peripheral) → MTX/sulfasalazine/leflunomide (moderate) → biologics: anti-TNF (adalimumab, etanercept), IL-17A (secukinumab — excellent for skin + joints + nail), IL-12/23 (ustekinumab), JAK inhibitors (tofacitinib, upadacitinib)\n\n#### Reactive Arthritis (ReA)\n\n**Triad (Reiter's):** arthritis + urethritis + conjunctivitis (can't see, can't pee, can't climb a tree)\n**Trigger:** GI infection (Salmonella, Shigella, Campylobacter, Yersinia) or STI (Chlamydia — most common)\n**Treatment:** NSAIDs; antibiotics if active infection; sulfasalazine for persistent; short course steroids\n\n---\n\n### Vasculitis — Classification & Key Features\n\n**Large vessel:**\n- **Giant cell arteritis (GCA):** age >50, headache, jaw claudication, scalp tenderness, visual loss (emergency), elevated ESR >50. Start prednisolone 1 mg/kg/day IMMEDIATELY on clinical suspicion (don't wait for biopsy — temporal artery biopsy within 2 weeks)\n- **Takayasu arteritis:** young women, Asian, pulseless disease, aorta + branches\n\n**Medium vessel:**\n- **Polyarteritis nodosa (PAN):** necrotising vasculitis, skin livedo reticularis, mononeuritis multiplex, mesenteric ischaemia, renal involvement (hypertension, infarcts — NOT glomerulonephritis), HBV-associated\n- **Kawasaki disease:** children, fever >5 days + 4/5: bilateral conjunctivitis, mucous membrane changes, rash, cervical lymphadenopathy, extremity changes. Treat: IVIG + aspirin + echocardiography\n\n**Small vessel (ANCA-associated vasculitis — AAV):**\n\n| Type | ANCA | ENT | Lungs | Kidneys | Other |\n|---|---|---|---|---|---|\n| GPA (Wegener's) | c-ANCA/PR3 | Saddle nose, sinusitis, epistaxis | Nodules, cavities, haemorrhage | Crescentic GN | Orbital pseudotumour |\n| MPA | p-ANCA/MPO | Mild | Haemorrhage, ILD | Crescentic GN (most severe) | — |\n| EGPA (Churg-Strauss) | p-ANCA/MPO (~40%) | Allergic rhinitis, nasal polyps | Asthma (hallmark), eosinophilic infiltrates | Mild | Peripheral eosinophilia, mononeuritis multiplex |\n\n**ANCA-associated vasculitis treatment:**\n- **Induction:** cyclophosphamide IV pulse OR rituximab 375 mg/m² IV weekly × 4 doses + prednisolone 1 mg/kg/day → taper\n- **Maintenance:** azathioprine 2 mg/kg/day OR rituximab 500 mg IV q6 months × 2 years\n- Plasmapheresis: if severe pulmonary haemorrhage or dialysis-dependent renal failure\n\n**IgA vasculitis (Henoch-Schönlein Purpura — HSP):** palpable purpura (buttocks/legs) + arthritis + abdominal pain + IgA nephropathy. Most self-limiting. Steroids if severe abdominal/renal disease.\n\n---"

          "markdown": "*(See also [[#SG Preventive Care & Screen for Life]] for screening)*\n\n### Diagnosis\n- **DEXA scan:** T-score compared to young adult mean\n  - T-score ≥ −1.0: normal\n  - −1.0 to −2.5: osteopenia\n  - ≤ −2.5: osteoporosis\n  - ≤ −2.5 + fragility fracture: severe osteoporosis\n- **FRAX tool:** calculates 10-year probability of major osteoporotic fracture — use to guide treatment in osteopenia\n\n### Who to Treat\n- Osteoporosis on DEXA (T-score ≤ −2.5)\n- Fragility fracture (fragility fracture = fracture from fall from standing height or less)\n- Osteopenia + FRAX 10-year risk ≥20% major fracture or ≥3% hip fracture\n\n---\n\n### Management\n\n**Non-pharmacological:**\n- Calcium 1000–1200 mg/day (dietary preferred; supplement if insufficient)\n- Vitamin D 800–1000 IU/day (supplement — most SG adults are deficient; ensure sufficient before starting bisphosphonates)\n- Weight-bearing exercise + balance training (reduce falls)\n- Falls prevention: home assessment, medication review (sedatives, antihypertensives), vision correction\n\n**Pharmacological — First-line: Bisphosphonates**\n\n| Drug | Dose | Notes |\n|---|---|---|\n| **Alendronate** | 70 mg oral weekly | Take on empty stomach, upright × 30 min, full glass water; avoid if eGFR <35 |\n| **Risedronate** | 35 mg oral weekly | Same instructions as alendronate |\n| **Zoledronic acid** | 5 mg IV annually | Preferred if: oral compliance issue, GI intolerance; avoid if eGFR <35 |\n| **Ibandronate** | 150 mg oral monthly | |\n\n- Duration: 3–5 years then reassess (drug holiday if T-score >−2.5 and no new fracture)\n- SE: osteonecrosis of jaw (rare, mostly with IV in cancer doses), atypical femoral fracture (after prolonged use >5 years)\n\n**Second-line / Severe osteoporosis:**\n- **Denosumab (Prolia):** 60 mg SC every 6 months. Potent; does not require renal adjustment. Rebound bone loss on stopping — must transition to bisphosphonate.\n- **Teriparatide (PTH analogue):** 20 mcg SC daily × 24 months. Most potent anabolic; use in severe/failed bisphosphonate. Expensive. Do not use if prior radiation to skeleton.\n- **Romosozumab (sclerostin inhibitor):** 210 mg SC monthly × 12 months. Dual anabolic + anti-resorptive. Avoid if prior MI/stroke.\n- **Raloxifene (SERM):** 60 mg OD oral. Spine fracture reduction only (not hip). Use in postmenopausal women intolerant of bisphosphonate. ↑DVT risk.\n\n---"
        },
        {
          "slug": "back-pain-red-flags-approach",
          "title": "Back Pain — Red Flags & Approach",
          "markdown": "### Red Flags (must exclude serious cause)\n\n> [!danger] Any red flag → urgent investigation (MRI spine, bloods). Do not treat as mechanical.\n\n| Red Flag | Think |\n|---|---|\n| Age >50 new onset, or <20 | Malignancy, fracture |\n| History of malignancy | Metastatic cord compression |\n| Unexplained weight loss | Malignancy, infection |\n| Fever + back pain | Spinal infection (discitis/osteomyelitis, epidural abscess) |\n| IV drug use | Spinal infection |\n| Trauma | Fracture |\n| Bilateral leg weakness / sensory changes | Cord compression or cauda equina |\n| Bladder/bowel dysfunction (cauda equina) | **EMERGENCY** → same-day MRI + surgical referral |\n| Steroid use / osteoporosis | Vertebral fracture |\n| Night pain not relieved by rest | Malignancy, infection, inflammatory |\n\n---\n\n### Classification\n\n**Mechanical (90%):** worse with movement/prolonged posture, better with rest, no neurological features, aged 20–55\n- Acute: NSAIDs, muscle relaxants (diazepam 2–5mg short-term), heat, early mobilisation\n- Most resolve in 6 weeks\n\n**Inflammatory (ankylosing spondylitis / axial SpA):** young, <40, insidious onset, improves with exercise, worse with rest and morning (>1h stiffness), bilateral sacroiliitis, HLA-B27\n- Refer rheumatology; NSAIDs first-line\n\n**Radiculopathy (nerve root):** radiates to leg in dermatomal pattern, worse with coughing/sneezing\n- L4: medial calf weakness/numbness, knee reflex ↓\n- L5: dorsum foot, big toe extension weakness\n- S1: lateral foot, plantar flexion weakness, ankle reflex ↓\n- Most resolve in 12 weeks; MRI if not improving or neurological deficit\n\n**Cauda equina syndrome (EMERGENCY):** bilateral leg weakness, saddle anaesthesia (perineum/inner thigh), loss of bladder/bowel control\n→ Same-day MRI, emergency surgical referral\n\n---\n\n### Investigations\n\n- **No imaging** for non-specific mechanical back pain <6 weeks in young patient (does not change management)\n- Plain XR: fracture, spondylolisthesis\n- MRI spine: neurological deficit, red flags, not improving at 6 weeks\n- Bloods: ESR, CRP, protein electrophoresis (myeloma), ALP (Paget's), PSA in men\n\n---"

          "markdown": "### Diagnosis\n\nTypically clinical — no investigation required to start treatment.\nFeatures: joint pain (worse with use, better with rest), joint stiffness (<30 min morning stiffness — distinguishes from inflammatory arthritis), crepitus, bony enlargement, reduced range of movement.\n\n**Most common joints in SG:** knees (most common), hips, hands (DIP + PIP — Heberden's and Bouchard's nodes), spine (cervical and lumbar spondylosis)\n\n**XR features:** joint space narrowing, subchondral sclerosis, osteophytes, subchondral cysts (LOSS)\n\n> [!note] XR severity does not correlate well with pain severity — treat symptoms, not the XR.\n\n---\n\n### Management — Step Up\n\n**Step 1 — Non-pharmacological (always):**\n- Weight loss (most effective intervention — 1kg loss = 4kg ↓ force across knee)\n- Physiotherapy and quadriceps strengthening\n- Walking aids if needed\n- Heat/cold therapy\n\n**Step 2 — Topical (start here for knee/hand OA):**\n- Topical diclofenac gel BD–TDS (fewer systemic SE — preferred in elderly)\n- Topical capsaicin cream (neuropathic component)\n\n**Step 3 — Oral analgesia:**\n- Paracetamol 1g TDS–QID (modest benefit)\n- Oral NSAIDs (ibuprofen 400mg TDS or celecoxib 200mg OD with food)\n  - ⚠️ Avoid in: CKD, peptic ulcer, heart failure, elderly (use PPI cover if required)\n- Duloxetine 60mg OD (neuropathic/central sensitisation component)\n\n**Step 4 — Intra-articular:**\n- Corticosteroid injection (triamcinolone 40mg): good short-term relief, repeat ≤3×/year per joint\n- Hyaluronic acid injection: modest evidence; may benefit some patients\n\n**Step 5 — Surgery:**\n- Total knee/hip replacement: end-stage OA, failed conservative, significant functional limitation\n- Referral criteria: persistent pain despite adequate conservative trial\n\n---"

                    categoryDiv.className = 'category';

                    headerDiv.innerHTML = `<span>${category.emoji || '📚'}</span><span>${this.escapeHtml(category.name)}</span><span class="category-count">${category.entries.length}</span>`;

                    category.entries.forEach(entry => {
                        const link = document.createElement('a');
                        link.className = 'entry-link';
                        link.href = `#${entry.slug}`;
                        link.textContent = entry.title;
                        link.dataset.category = category.name;
                        link.addEventListener('click', (e) => {
                            e.preventDefault();
                            this.loadEntry(entry.slug);
                        });
                        entriesDiv.appendChild(link);
                    });

                    categoryDiv.appendChild(headerDiv);
                    categoryDiv.appendChild(entriesDiv);
                    container.appendChild(categoryDiv);
                });
            },

            handleSearch(query) {
                this.searchQuery = query.toLowerCase();
                const allLinks = document.querySelectorAll('.entry-link');

                allLinks.forEach(link => {
                    const title = link.textContent.toLowerCase();
                    let matches = title.includes(this.searchQuery);
                    let hint = '';

                    if (!matches && this.searchQuery.length > 0) {
                        // Search in entry content
                        const entrySlug = link.getAttribute('href').substring(1);
                        const entry = this.findEntryBySlug(entrySlug);
                        if (entry && entry.markdown.toLowerCase().includes(this.searchQuery)) {
                            matches = true;
                            hint = 'matches content';
                        }
                    }

                    if (this.searchQuery === '' || matches) {
                        link.classList.remove('hidden');
                        // Remove old hint
                        const oldHint = link.parentElement.querySelector('.entry-hint');
                        if (oldHint) oldHint.remove();
                        // Add hint if needed
                        if (hint && this.searchQuery.length > 0) {
                            const hintEl = document.createElement('div');
                            hintEl.className = 'entry-hint';
                            hintEl.textContent = hint;
                            link.parentElement.insertBefore(hintEl, link.nextSibling);

                        link.classList.add('hidden');

                    this.loadEntry(hash);
                } else {
                    this.showLanding();
                }
            },

            loadEntry(slug) {
                const entry = this.findEntryBySlug(slug);
                if (!entry) {
                    this.showLanding();
                    return;
                }

                this.currentEntrySlug = slug;
                window.location.hash = slug;

                // Update active state
                document.querySelectorAll('.entry-link').forEach(link => {
                    link.classList.remove('active');
                });
                const activeLink = document.querySelector(`a[href="#${slug}"]`);
                activeLink?.classList.add('active');
                const categoryName = activeLink?.dataset.category || '';

                // Render content
                const processedMd = this.preprocessMarkdown(entry.markdown);
                const html = marked.parse(processedMd);
                const processed = this.postprocessHtml(html);

                // Build enhancement blocks (TL;DR card, pills, flowchart)
                const enh = ENHANCEMENTS[slug];
                let tldrHtml = '';
                let pillsHtml = '';
                let flowHtml = '';
                if (enh) {
                    if (enh.tldr) {
                        const rows = enh.tldr.map(([k, v]) =>
                            `<div class="tldr-key">${this.escapeHtml(k)}</div><div class="tldr-val">${v}</div>`
                        ).join('');
                        tldrHtml = `<div class="tldr-card"><div class="tldr-label">Quick Reference</div><div class="tldr-rows">${rows}</div></div>`;
                    }
                    if (enh.pills) {
                        const pills = enh.pills.map(([tag, txt]) =>
                            `<span class="pill pill-${tag}">${this.escapeHtml(txt)}</span>`
                        ).join('');
                        pillsHtml = `<div class="pills">${pills}</div>`;
                    }
                    if (enh.flow) {
                        flowHtml = `<h2>Decision Pathway</h2>${this.renderFlowchart(enh.flow)}`;
                    }
                }

                const breadcrumb = categoryName
                    ? `<div class="entry-breadcrumb"><span class="entry-breadcrumb-category">${this.escapeHtml(categoryName)}</span></div>`
                    : '';

                const content = document.getElementById('content');
                content.innerHTML = `
                    <div class="content-pane">
                        ${breadcrumb}
                        <h1>${this.escapeHtml(entry.title)}</h1>
                        ${pillsHtml}
                        ${tldrHtml}
                        ${flowHtml}
                        ${processed}
                    </div>
                `;
                content.scrollTop = 0;

                // Track recent
                this.addRecent(slug, entry.title);
            },

            addRecent(slug, title) {
                this.recent = this.recent.filter(r => r.slug !== slug);
                this.recent.unshift({ slug, title });
                if (this.recent.length > 5) this.recent.pop();
            },

            renderFlowchart(text) {
                const lines = text.split('\n').map(l => l.replace(/\t/g, '  '));
                const nodes = [];
                let current = null;

                const flushCurrent = () => {
                    if (current) { nodes.push(current); current = null; }
                };

                for (const rawLine of lines) {
                    const line = rawLine.trimEnd();
                    if (!line.trim()) continue;

                    // Branch: starts with whitespace and (yes|no|-|–|→|label:) pattern
                    const branchMatch = line.match(/^\s+(?:[-–→]|(yes|no|[a-z0-9]+))\s*:?\s*(.+?)(?:\s*\[(\w+)\])?$/i);
                    // Decision: starts with ?
                    const decisionMatch = line.match(/^\s*\?\s*(.+?)(?:\s*\[(\w+)\])?$/);

                    if (decisionMatch) {
                        flushCurrent();
                        current = {
                            type: 'decision',
                            text: decisionMatch[1].replace(/\?$/, ''),
                            branches: []
                        };
                    } else if (branchMatch && current && current.type === 'decision') {
                        const rawLabel = (branchMatch[1] || '').toUpperCase();
                        const label = rawLabel || '→';
                        current.branches.push({
                            label,
                            text: branchMatch[2],
                            tag: (branchMatch[3] || '').toLowerCase()
                        });
                    } else {
                        flushCurrent();
                        const actionMatch = line.match(/^(.+?)(?:\s*\[(\w+)\])?$/);
                        nodes.push({
                            type: 'action',
                            text: actionMatch[1].trim(),
                            tag: (actionMatch[2] || '').toLowerCase()
                        });
                    }
                }
                flushCurrent();

                let html = '<div class="flowchart">';
                for (let i = 0; i < nodes.length; i++) {
                    const n = nodes[i];
                    if (n.type === 'action') {
                        const cls = n.tag ? `flow-${n.tag}` : '';
                        html += `<div class="flow-box flow-action ${cls}">${n.text}</div>`;
                    } else if (n.type === 'decision') {
                        html += `<div class="flow-box flow-decision">`;
                        html += `<div class="flow-decision-q">${n.text}?</div>`;
                        html += `<div class="flow-branches">`;
                        for (const b of n.branches) {
                            const cls = b.tag ? `flow-${b.tag}` : '';
                            html += `<div class="flow-branch ${cls}">`;
                            html += `<span class="flow-branch-label">${this.escapeHtml(b.label)}</span>`;
                            html += `<span class="flow-branch-text">${b.text}</span>`;
                            html += `</div>`;
                        }
                        html += `</div></div>`;
                    }
                    if (i < nodes.length - 1) html += '<div class="flow-arrow"></div>';
                }
                html += '</div>';
                return html;
            },

            showLanding() {
                this.currentEntrySlug = null;
                if (window.location.hash) {
                    history.replaceState(null, '', window.location.pathname + window.location.search);
                }
                document.querySelectorAll('.entry-link').forEach(link => {
                    link.classList.remove('active');
                });

                const totalEntries = this.data.categories.reduce((sum, c) => sum + c.entries.length, 0);
                const onCallSlugs = ['oncall-acls','oncall-chest-pain','oncall-hypotension','oncall-desaturation','oncall-tachycardia','oncall-arrhythmias','oncall-dka-hhs','oncall-gcs-drop','oncall-hb-drop','oncall-electrolyte-derangement','oncall-fever'];
                const onCallList = onCallSlugs.map(slug => {
                    const entry = this.findEntryBySlug(slug);
                    return entry ? `<a class="landing-chip oncall-chip" href="#${slug}" onclick="event.preventDefault(); app.loadEntry('${slug}');">${this.escapeHtml(entry.title.replace(' (quick ref)',''))}</a>` : '';
                }).filter(Boolean).join('');
                const enhancedSlugs = Object.keys(ENHANCEMENTS);
                const enhancedList = enhancedSlugs.map(slug => {
                    const entry = this.findEntryBySlug(slug);
                    return entry ? `<a class="landing-chip" href="#${slug}" onclick="event.preventDefault(); app.loadEntry('${slug}');">${this.escapeHtml(entry.title)}</a>` : '';
                }).filter(Boolean).join('');

                const content = document.getElementById('content');
                content.innerHTML = `
                    <div class="content-pane landing">
                        <h1>${this.escapeHtml(this.data.title)}</h1>
                        <div class="subtitle">${this.escapeHtml(this.data.subtitle)}</div>
                        <p style="margin-bottom: 32px;">
                            ${totalEntries} entries across ${this.data.categories.length} categories.
                            ${onCallSlugs.length} on-call chief-complaint pathways below. Click to jump into the decision tree.
                        </p>
                        ${onCallList ? `
                            <div style="text-align: left; max-width: 640px; margin: 0 auto 32px;">
                                <div class="tldr-label" style="color: var(--accent-orange); margin-bottom: 12px;">On-Call Quick Reference</div>
                                <div class="landing-chips">${onCallList}</div>
                            </div>
                        ` : ''}
                        
                        <p style="margin-top: 32px; font-size: 13px;">Tip: use the search box to filter, or tap a category in the sidebar.</p>
                    </div>
                `;
                content.scrollTop = 0;
            },

            preprocessMarkdown(md) {
                // Obsidian callout preprocessing
                const lines = md.split('\n');
                const result = [];
                let i = 0;

                while (i < lines.length) {
                    const line = lines[i];
                    const calloutMatch = line.match(/^\s*>\s*\[!(\w+)\](?:\s+(.+?))?$/);

                    if (calloutMatch) {
                        const calloutType = calloutMatch[1].toLowerCase();
                        const calloutTitle = calloutMatch[2] || '';
                        const bodyLines = [];

                        i++;
                        while (i < lines.length) {
                            const nextLine = lines[i];
                            if (nextLine.trim().startsWith('> ')) {
                                const bodyText = nextLine.replace(/^\s*>\s?/, '');
                                bodyLines.push(bodyText);
                                i++;
                            } else if (nextLine.trim() === '') {
                                bodyLines.push('');
                                i++;
                                if (i < lines.length && lines[i].trim() && !lines[i].trim().startsWith('> ')) {
                                    break;
                                }
                            } else {
                                break;
                            }
                        }

                        const bodyMd = bodyLines.join('\n').trim();
                        const bodyRendered = bodyMd ? marked.parse(bodyMd) : '';
                        const iconMap = {
                            tip: '💡',
                            note: '📝',
                            info: 'ℹ️',
                            warning: '⚠️',
                            danger: '🚨'
                        };
                        const icon = iconMap[calloutType] || '📌';

                        // Blank line BEFORE so marked re-enters markdown mode
                        result.push('');
                        result.push(`<div class="callout callout-${calloutType}">`);
                        result.push(`<div class="callout-icon">${icon}</div>`);
                        result.push(`<div class="callout-body">`);
                        if (calloutTitle) {
                            result.push(`<div class="callout-title">${this.escapeHtml(calloutTitle)}</div>`);
                        }
                        result.push(bodyRendered);
                        result.push(`</div></div>`);
                        // Blank line AFTER so following markdown parses correctly
                        result.push('');
                    } else {
                        result.push(line);
                        i++;
                    }
                }

                return result.join('\n');
            },

            postprocessHtml(html) {
                // Convert wiki-links to clickable navigation
                // Note: marked has already HTML-escaped the content, so &amp; appears instead of &
                return html.replace(/\[\[#([^\]]+)\]\]/g, (match, entryName) => {
                    // Decode HTML entities that marked introduced before slugifying
                    const decodedName = entryName
                        .replace(/&amp;/g, '&')
                        .replace(/&lt;/g, '<')
                        .replace(/&gt;/g, '>')
                        .replace(/&quot;/g, '"')
                        .replace(/&#39;/g, "'");
                    const slug = this.titleToSlug(decodedName);
                    const entry = this.findEntryBySlug(slug);

                    if (entry) {
                        return `<a href="#${slug}" class="wiki-link" onclick="event.preventDefault(); app.loadEntry('${slug}');">${this.escapeHtml(decodedName)}</a>`;
                    } else {
                        return `<span class="wiki-link broken">${this.escapeHtml(decodedName)}</span>`;
                    }
                });
            },

            titleToSlug(title) {
                return title
                    .trim()
                    .toLowerCase()
                    .replace(/[^a-z0-9\s-]/g, '')
                    .replace(/\s+/g, '-')
                    .replace(/-+/g, '-')
                    .replace(/^-|-$/g, '');
            },

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        };

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
