          "slug": "ecg-visual-pattern-recognition",
          "title": "ECG — Visual Pattern Recognition",
          "markdown": "> [!tip] Use alongside [[#ECG Interpretation — Systematic Approach]]. Diagrams are schematic — for morphology recognition, not measurement.\n\n---\n\n### Normal ECG Intervals & Anatomy\n\n<svg viewBox=\"0 0 640 280\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-labelledby=\"ecgn-title\"><title id=\"ecgn-title\">Normal ECG — P, QRS, T and intervals</title>\n<rect width=\"640\" height=\"280\" fill=\"#faf9f5\"/>\n<text x=\"320\" y=\"22\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"14\" font-weight=\"700\" fill=\"#2a2a2a\" text-anchor=\"middle\">Normal ECG — P, QRS, T and intervals</text>\n<rect x=\"30\" y=\"40\" width=\"580\" height=\"200\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<line x1=\"50\" y1=\"140\" x2=\"610\" y2=\"140\" fill=\"none\" stroke=\"#e5e0d5\" stroke-width=\"1\" stroke-dasharray=\"2 3\"/>\n<!-- single beat: P hump, PR segment, QRS complex, ST segment, T wave -->\n<path d=\"M 60 140 L 100 140 Q 120 118 140 140 L 170 140 L 178 140 L 182 142 L 188 100 L 196 180 L 202 140 L 216 140 L 240 140 Q 290 100 340 140 L 400 140\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<!-- annotation ticks -->\n<line x1=\"100\" y1=\"155\" x2=\"100\" y2=\"170\" stroke=\"#6b8e9e\" stroke-width=\"1\"/>\n<line x1=\"182\" y1=\"155\" x2=\"182\" y2=\"170\" stroke=\"#6b8e9e\" stroke-width=\"1\"/>\n<line x1=\"202\" y1=\"155\" x2=\"202\" y2=\"170\" stroke=\"#6b8e9e\" stroke-width=\"1\"/>\n<line x1=\"340\" y1=\"155\" x2=\"340\" y2=\"170\" stroke=\"#6b8e9e\" stroke-width=\"1\"/>\n<!-- PR interval (100→182) -->\n<line x1=\"100\" y1=\"185\" x2=\"182\" y2=\"185\" stroke=\"#6b8e9e\" stroke-width=\"1\"/>\n<text x=\"141\" y=\"198\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#6b8e9e\" text-anchor=\"middle\">PR 120–200 ms</text>\n<!-- QRS (182→202) -->\n<line x1=\"182\" y1=\"210\" x2=\"202\" y2=\"210\" stroke=\"#6b8e9e\" stroke-width=\"1\"/>\n<text x=\"192\" y=\"223\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#6b8e9e\" text-anchor=\"middle\">QRS &lt;120 ms</text>\n<!-- QT (182→340) -->\n<line x1=\"182\" y1=\"232\" x2=\"340\" y2=\"232\" stroke=\"#6b8e9e\" stroke-width=\"1\"/>\n<text x=\"261\" y=\"247\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#6b8e9e\" text-anchor=\"middle\">QT &lt;440 ms (men)</text>\n<!-- wave labels -->\n<text x=\"120\" y=\"110\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">P</text>\n<text x=\"192\" y=\"95\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">QRS</text>\n<text x=\"290\" y=\"110\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">T</text>\n<!-- reference box -->\n<rect x=\"430\" y=\"58\" width=\"170\" height=\"164\" fill=\"#faf9f5\" stroke=\"#e5e0d5\" rx=\"4\"/>\n<text x=\"515\" y=\"74\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#2a2a2a\" text-anchor=\"middle\">Normal values</text>\n<text x=\"440\" y=\"96\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">• PR 120–200 ms (3–5 small sq)</text>\n<text x=\"440\" y=\"112\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">• QRS &lt;120 ms (&lt;3 sq)</text>\n<text x=\"440\" y=\"128\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">• QT &lt;440 m / &lt;460 f</text>\n<text x=\"440\" y=\"144\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">• ST isoelectric</text>\n<text x=\"440\" y=\"168\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Paper: 25 mm/s, 10 mm/mV</text>\n<text x=\"440\" y=\"184\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Small sq = 40 ms × 0.1 mV</text>\n<text x=\"440\" y=\"200\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Large sq = 200 ms (5 small)</text>\n</svg>\n\n- **PR** 120–200 ms (3–5 small squares) — P wave to start of QRS\n- **QRS** <120 ms (<3 small squares)\n- **QT** <440 ms men, <460 ms women (correct for HR — Bazett's QTc)\n- **ST segment** isoelectric (at baseline)\n- Paper speed 25 mm/s: small square = 40 ms × 0.1 mV; large square = 200 ms\n\n---\n\n### STEMI Patterns by Territory\n\n<svg viewBox=\"0 0 660 360\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-labelledby=\"stemi-title\"><title id=\"stemi-title\">STEMI patterns by coronary territory</title>\n<rect width=\"660\" height=\"360\" fill=\"#faf9f5\"/>\n<text x=\"330\" y=\"22\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"14\" font-weight=\"700\" fill=\"#2a2a2a\" text-anchor=\"middle\">STEMI patterns by coronary territory</text>\n<!-- ANTERIOR (top-left) V1-V4: convex tombstone ST elevation -->\n<rect x=\"20\" y=\"40\" width=\"310\" height=\"150\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"60\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Anterior — V1–V4 (LAD)</text>\n<text x=\"30\" y=\"76\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Convex “tombstone” STE • reciprocal ↓ II, III, aVF</text>\n<!-- 2 beats with convex ST elevation -->\n<path d=\"M 30 140 L 60 140 Q 70 130 80 140 L 90 140 L 94 142 L 98 115 L 102 160 L 106 140 Q 115 108 125 108 Q 140 108 150 140 L 160 140 L 175 140 Q 182 132 189 140 L 200 140 L 204 142 L 208 115 L 212 160 L 216 140 Q 225 108 235 108 Q 250 108 260 140 L 315 140\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"120\" y=\"105\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#c9a642\" text-anchor=\"middle\">tombstone STE</text>\n<!-- INFERIOR (top-right) II/III/aVF -->\n<rect x=\"340\" y=\"40\" width=\"310\" height=\"150\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"350\" y=\"60\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Inferior — II, III, aVF (RCA)</text>\n<text x=\"350\" y=\"76\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">STE II/III/aVF • reciprocal ↓ I, aVL • check V3R/V4R</text>\n<path d=\"M 350 140 L 380 140 Q 390 132 400 140 L 410 140 L 414 142 L 418 118 L 422 158 L 426 140 Q 440 118 455 118 Q 470 118 480 140 L 495 140 Q 502 132 509 140 L 520 140 L 524 142 L 528 118 L 532 158 L 536 140 Q 550 118 565 118 Q 580 118 590 140 L 635 140\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"445\" y=\"112\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#c9a642\" text-anchor=\"middle\">⚠ RV MI: avoid nitrates</text>\n<!-- LATERAL (bot-left) I, aVL, V5-V6 -->\n<rect x=\"20\" y=\"200\" width=\"310\" height=\"150\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"220\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Lateral — I, aVL, V5–V6 (LCx)</text>\n<text x=\"30\" y=\"236\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">STE I, aVL, V5, V6 • reciprocal ↓ II, III, aVF</text>\n<path d=\"M 30 300 L 60 300 Q 70 292 80 300 L 90 300 L 94 302 L 98 278 L 102 318 L 106 300 Q 120 278 135 278 Q 150 278 160 300 L 175 300 Q 182 292 189 300 L 200 300 L 204 302 L 208 278 L 212 318 L 216 300 Q 230 278 245 278 Q 260 278 270 300 L 315 300\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<!-- POSTERIOR (bot-right) V1-V3 reciprocal -->\n<rect x=\"340\" y=\"200\" width=\"310\" height=\"150\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"350\" y=\"220\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Posterior — V1–V3 mirror (RCA/LCx)</text>\n<text x=\"350\" y=\"236\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">ST depression + tall R in V1–V3 • confirm V7–V9</text>\n<!-- ST depression: downsloping ST segment, tall R wave -->\n<path d=\"M 350 300 L 385 300 Q 395 292 405 300 L 418 300 L 420 302 L 422 270 L 426 310 L 432 320 L 445 320 L 455 300 L 475 300 Q 480 295 485 300 L 500 300 L 504 302 L 506 270 L 510 310 L 516 320 L 530 320 L 540 300 L 560 300 Q 567 295 574 300 L 590 300 L 592 302 L 594 270 L 598 310 L 604 320 L 620 320 L 635 300\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"495\" y=\"258\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#c9a642\" text-anchor=\"middle\">tall R + ST ↓</text>\n</svg>\n\n- **Anterior (LAD)** — V1–V4: convex (tombstone) STE; reciprocal depression II, III, aVF\n- **Inferior (RCA)** — II, III, aVF: reciprocal ↓ I, aVL. Check V3R/V4R for RV MI\n- **Lateral (LCx)** — I, aVL, V5–V6: reciprocal ↓ II, III, aVF\n- **Posterior** — V1–V3: ST **depression** + tall R waves (mirror). Confirm with V7–V9 posterior leads\n\n> [!danger] RV MI\n> Inferior STEMI + ST elevation in V4R = RV involvement. **Avoid nitrates** — preload-dependent; can cause profound hypotension.\n\n---\n\n### Bundle Branch Blocks — RBBB, LBBB, Sgarbossa\n\n<svg viewBox=\"0 0 660 380\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-labelledby=\"bbb-title\"><title id=\"bbb-title\">Bundle branch blocks — V1 and V6 morphology</title>\n<rect width=\"660\" height=\"380\" fill=\"#faf9f5\"/>\n<text x=\"330\" y=\"22\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"14\" font-weight=\"700\" fill=\"#2a2a2a\" text-anchor=\"middle\">Bundle branch blocks — V1 / V6 morphology</text>\n<!-- RBBB V1 rSR' -->\n<rect x=\"20\" y=\"40\" width=\"310\" height=\"150\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"60\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">RBBB — V1 (key lead)</text>\n<text x=\"30\" y=\"76\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">rSR′ “rabbit ears” • QRS ≥120 ms • T inv V1–V3 expected</text>\n<path d=\"M 30 140 L 80 140 Q 90 132 100 140 L 120 140 L 124 142 L 128 118 L 132 162 L 138 150 L 148 110 L 158 150 L 170 140 Q 200 160 230 150 L 315 150\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"145\" y=\"100\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#6b8e9e\" text-anchor=\"middle\">R′</text>\n<!-- RBBB V6 slurred S -->\n<rect x=\"340\" y=\"40\" width=\"310\" height=\"150\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"350\" y=\"60\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">RBBB — V6 (slurred S)</text>\n<text x=\"350\" y=\"76\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Broad slurred S in I, V5, V6 • new RBBB → think PE/anterior MI</text>\n<path d=\"M 350 140 L 390 140 Q 400 132 410 140 L 425 140 L 429 142 L 433 118 L 437 100 L 445 175 Q 465 165 485 148 L 540 140 L 550 140 Q 558 132 566 140 L 580 140 L 584 142 L 588 118 L 592 100 L 600 175 Q 620 165 635 148\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"475\" y=\"188\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#6b8e9e\" text-anchor=\"middle\">slurred S</text>\n<!-- LBBB V1 QS -->\n<rect x=\"20\" y=\"200\" width=\"310\" height=\"150\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"220\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">LBBB — V1 (QS / rS)</text>\n<text x=\"30\" y=\"236\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Deep negative QS • QRS ≥120 ms • ALWAYS pathological</text>\n<path d=\"M 30 300 L 85 300 Q 95 292 105 300 L 120 300 L 123 302 L 127 315 L 135 355 L 155 310 L 165 300 L 200 300 L 210 300 Q 218 292 226 300 L 240 300 L 244 302 L 248 315 L 256 355 L 276 310 L 286 300 L 315 300\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"145\" y=\"348\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#c9a642\" text-anchor=\"middle\">QS — new LBBB + CP → STEMI</text>\n<!-- LBBB V6 broad notched R -->\n<rect x=\"340\" y=\"200\" width=\"310\" height=\"150\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"350\" y=\"220\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">LBBB — V6 (broad notched R)</text>\n<text x=\"350\" y=\"236\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Tall notched monophasic R • NO septal Q in I/V5/V6</text>\n<path d=\"M 350 300 L 395 300 Q 405 292 415 300 L 425 300 L 430 302 L 435 270 L 448 250 L 456 264 L 465 248 L 478 280 L 490 300 L 520 300 L 530 300 Q 538 292 546 300 L 560 300 L 564 302 L 569 270 L 582 250 L 590 264 L 598 248 L 612 280 L 623 300 L 635 300\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"455\" y=\"244\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#6b8e9e\" text-anchor=\"middle\">notched R</text>\n</svg>\n\n- **RBBB** — *MaRRoW*: rSR′ (\"rabbit ears\") in V1, slurred broad S in V6/I. ST depression + T inversion V1–V3 are expected — do **not** call ischaemia. New RBBB: think PE, RV strain, anterior MI.\n- **LBBB** — *WiLLiaM*: QS/rS in V1, broad notched R in V5/V6/I/aVL. No septal Q waves in I, V5, V6 (any Q = abnormal). Secondary ST changes are **discordant** (opposite to QRS).\n- **LBBB is always pathological** (unlike RBBB). New LBBB + chest pain = STEMI until proven otherwise.\n\n> [!tip] Sgarbossa criteria (AMI in LBBB — score ≥3 = highly specific)\n> - **Concordant STE ≥1 mm** in any lead with positive QRS (**5 pts**)\n> - **Concordant ST depression ≥1 mm** in V1–V3 (**3 pts**)\n> - **Discordant STE ≥5 mm** in any lead with negative QRS (**2 pts**)\n\n---\n\n### Atrial Fibrillation vs Flutter vs Sinus\n\n<svg viewBox=\"0 0 660 320\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-labelledby=\"af-title\"><title id=\"af-title\">Sinus vs Atrial Flutter vs Atrial Fibrillation</title>\n<rect width=\"660\" height=\"320\" fill=\"#faf9f5\"/>\n<text x=\"330\" y=\"22\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"14\" font-weight=\"700\" fill=\"#2a2a2a\" text-anchor=\"middle\">Sinus vs Atrial Flutter vs Atrial Fibrillation</text>\n<!-- SINUS top -->\n<rect x=\"20\" y=\"40\" width=\"620\" height=\"80\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"58\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Sinus rhythm</text>\n<text x=\"30\" y=\"72\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">P before every QRS • regular • normal morphology</text>\n<path d=\"M 30 105 L 70 105 Q 80 97 90 105 L 110 105 L 114 107 L 118 85 L 122 125 L 126 105 Q 140 85 155 105 L 190 105 Q 200 97 210 105 L 230 105 L 234 107 L 238 85 L 242 125 L 246 105 Q 260 85 275 105 L 310 105 Q 320 97 330 105 L 350 105 L 354 107 L 358 85 L 362 125 L 366 105 Q 380 85 395 105 L 430 105 Q 440 97 450 105 L 470 105 L 474 107 L 478 85 L 482 125 L 486 105 Q 500 85 515 105 L 550 105 Q 560 97 570 105 L 590 105 L 594 107 L 598 85 L 602 125 L 606 105 Q 620 85 635 105\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<!-- AFL middle: sawtooth baseline -->\n<rect x=\"20\" y=\"130\" width=\"620\" height=\"80\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"148\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Atrial flutter</text>\n<text x=\"30\" y=\"162\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Sawtooth F waves (best II, III, aVF) • atrial 300, ventricular ~150 (2:1)</text>\n<!-- sawtooth -->\n<path d=\"M 30 195 L 50 180 L 60 200 L 70 180 L 80 200 L 90 180 L 100 200 L 110 180 L 115 200 L 120 180 L 124 182 L 128 168 L 132 215 L 136 195 L 150 195 L 160 180 L 170 200 L 180 180 L 190 200 L 200 180 L 210 200 L 220 180 L 230 200 L 235 195 L 238 182 L 242 168 L 246 215 L 250 195 L 270 195 L 280 180 L 290 200 L 300 180 L 310 200 L 320 180 L 330 200 L 340 180 L 348 195 L 354 182 L 358 168 L 362 215 L 366 195 L 390 195 L 400 180 L 410 200 L 420 180 L 430 200 L 440 180 L 450 200 L 460 180 L 466 195 L 472 182 L 476 168 L 480 215 L 484 195 L 510 195 L 520 180 L 530 200 L 540 180 L 550 200 L 560 180 L 570 200 L 580 180 L 586 195 L 590 182 L 594 168 L 598 215 L 602 195 L 635 195\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<!-- AF bottom: irregular baseline -->\n<rect x=\"20\" y=\"220\" width=\"620\" height=\"80\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"238\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Atrial fibrillation</text>\n<text x=\"30\" y=\"252\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Irregularly irregular R–R • fibrillatory baseline • no P waves</text>\n<path d=\"M 30 285 L 42 280 L 52 288 L 62 283 L 72 287 L 82 280 L 90 286 L 94 288 L 98 265 L 102 308 L 106 285 L 115 282 L 125 288 L 135 280 L 145 286 L 155 283 L 170 285 L 185 282 L 195 288 L 205 280 L 215 286 L 225 284 L 229 286 L 233 265 L 237 308 L 241 285 L 255 280 L 270 286 L 282 283 L 295 287 L 310 282 L 322 285 L 334 288 L 344 282 L 354 287 L 358 288 L 362 265 L 366 308 L 370 285 L 380 283 L 395 287 L 410 282 L 425 285 L 435 282 L 445 287 L 455 282 L 462 285 L 466 288 L 470 265 L 474 308 L 478 285 L 488 282 L 505 287 L 522 283 L 542 286 L 558 282 L 570 285 L 578 288 L 582 265 L 586 308 L 590 285 L 605 282 L 620 287 L 635 284\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n</svg>\n\n- **Sinus** — regular; P before every QRS\n- **Flutter** — sawtooth baseline (best in II, III, aVF); atrial rate ~300, commonly 2:1 block → ventricular rate ~150\n- **AF** — irregularly irregular R–R, no discernible P waves, fibrillatory baseline\n\n---\n\n### Ventricular Tachycardia vs SVT with Aberrancy\n\n<svg viewBox=\"0 0 660 260\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-labelledby=\"vt-title\"><title id=\"vt-title\">VT vs SVT with aberrancy</title>\n<rect width=\"660\" height=\"260\" fill=\"#faf9f5\"/>\n<text x=\"330\" y=\"22\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"14\" font-weight=\"700\" fill=\"#2a2a2a\" text-anchor=\"middle\">Ventricular tachycardia vs SVT with aberrancy</text>\n<!-- SVT with RBBB aberrancy (left) -->\n<rect x=\"20\" y=\"40\" width=\"310\" height=\"200\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"60\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">SVT with aberrancy</text>\n<text x=\"30\" y=\"76\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Typical BBB morphology • QRS &lt;140 ms • responds to adenosine</text>\n<path d=\"M 30 160 L 60 160 L 64 162 L 68 140 L 72 178 L 78 170 L 86 145 L 94 170 L 105 160 L 135 160 L 139 162 L 143 140 L 147 178 L 153 170 L 161 145 L 169 170 L 180 160 L 210 160 L 214 162 L 218 140 L 222 178 L 228 170 L 236 145 L 244 170 L 255 160 L 285 160 L 289 162 L 293 140 L 297 178 L 303 170 L 311 145 L 319 170 L 325 160\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"175\" y=\"228\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#6b8e9e\" text-anchor=\"middle\">typical rSR′ pattern</text>\n<!-- VT (right): very broad bizarre QRS -->\n<rect x=\"340\" y=\"40\" width=\"310\" height=\"200\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"350\" y=\"60\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Ventricular tachycardia</text>\n<text x=\"350\" y=\"76\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Very broad QRS (&gt;160 ms) • AV dissociation • fusion beats</text>\n<path d=\"M 350 160 Q 370 120 390 118 Q 410 116 430 165 L 445 160 Q 465 120 485 118 Q 505 116 525 165 L 540 160 Q 560 120 580 118 Q 600 116 620 165 L 635 160\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"495\" y=\"228\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#c9a642\" text-anchor=\"middle\">⚠ if in doubt treat as VT</text>\n</svg>\n\n**Favours VT:** QRS >160 ms · northwest axis · AV dissociation · concordance V1–V6 · fusion/capture beats · structural heart disease.\n\n**Favours SVT:** QRS <140 ms · typical BBB morphology · responds to adenosine · prior SVT history.\n\n> [!danger] If in doubt → treat as VT\n> Misdiagnosing VT as SVT and giving a nodal blocker can be fatal. Broad-complex tachycardia defaults to VT treatment until proven otherwise.\n\n---\n\n### Torsades de Pointes\n\n<svg viewBox=\"0 0 660 310\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-labelledby=\"tdp-title\"><title id=\"tdp-title\">Torsades de pointes</title>\n<rect width=\"660\" height=\"310\" fill=\"#faf9f5\"/>\n<text x=\"330\" y=\"22\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"14\" font-weight=\"700\" fill=\"#2a2a2a\" text-anchor=\"middle\">Torsades de pointes — long QT, twisting axis</text>\n<!-- Normal QT -->\n<rect x=\"20\" y=\"40\" width=\"620\" height=\"70\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"58\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Normal QT (&lt;440 ms)</text>\n<path d=\"M 30 90 L 90 90 Q 100 82 110 90 L 125 90 L 129 92 L 133 65 L 137 110 L 141 90 Q 160 70 180 90 L 250 90 Q 260 82 270 90 L 285 90 L 289 92 L 293 65 L 297 110 L 301 90 Q 320 70 340 90 L 410 90 Q 420 82 430 90 L 445 90 L 449 92 L 453 65 L 457 110 L 461 90 Q 480 70 500 90 L 635 90\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<!-- Long QT -->\n<rect x=\"20\" y=\"120\" width=\"620\" height=\"70\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"138\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Long QT (&gt;500 ms) — high risk</text>\n<path d=\"M 30 170 L 90 170 Q 100 162 110 170 L 125 170 L 129 172 L 133 145 L 137 190 L 141 170 Q 180 140 220 170 L 300 170 Q 310 162 320 170 L 335 170 L 339 172 L 343 145 L 347 190 L 351 170 Q 390 140 430 170 L 510 170 Q 520 162 530 170 L 545 170 L 549 172 L 553 145 L 557 190 L 561 170 Q 600 140 635 170\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<!-- TdP -->\n<rect x=\"20\" y=\"200\" width=\"620\" height=\"70\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"218\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Torsades de pointes — polymorphic VT, axis twists around baseline</text>\n<!-- axis-twisting polymorphic VT: small-tall-small-tall envelope -->\n<path d=\"M 30 235 L 50 235 L 56 228 L 62 245 L 68 235 L 88 235 L 94 220 L 100 255 L 106 235 L 126 235 L 132 208 L 138 265 L 144 235 L 164 235 L 170 215 L 176 250 L 182 235 L 202 235 L 208 240 L 214 232 L 220 235 L 240 235 L 246 248 L 252 220 L 258 235 L 278 235 L 284 260 L 290 208 L 296 235 L 316 235 L 322 248 L 328 220 L 334 235 L 354 235 L 360 240 L 366 232 L 372 235 L 392 235 L 398 220 L 404 250 L 410 235 L 430 235 L 436 210 L 442 262 L 448 235 L 468 235 L 474 218 L 480 252 L 486 235 L 506 235 L 512 228 L 518 242 L 524 235 L 544 235 L 550 232 L 556 238 L 562 235 L 582 235 L 588 225 L 594 245 L 600 235 L 620 235 L 626 232 L 632 238 L 635 235\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<!-- Rx caption below panels -->\n<text x=\"330\" y=\"295\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#c9a642\" text-anchor=\"middle\">Rx: MgSO₄ 2 g IV; correct K&gt;4.5, Mg&gt;1.0; do NOT give amiodarone</text>\n</svg>\n\n- Polymorphic VT with **twisting axis** around the baseline on background of **long QT**\n- Rate 150–250, often self-terminates but can degenerate to VF\n\n> [!warning] Treatment\n> - **MgSO₄ 2 g IV push** (give even if Mg normal)\n> - Stop all QT-prolonging drugs\n> - Correct K⁺ >4.5, Mg²⁺ >1.0\n> - **Overdrive pacing** if recurrent (or isoprenaline as bridge)\n> - **Do NOT give amiodarone** — prolongs QT further\n\n---\n\n### Wellens Syndrome — Critical LAD Stenosis\n\n<svg viewBox=\"0 0 660 240\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-labelledby=\"well-title\"><title id=\"well-title\">Wellens syndrome T-wave patterns</title>\n<rect width=\"660\" height=\"240\" fill=\"#faf9f5\"/>\n<text x=\"330\" y=\"22\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"14\" font-weight=\"700\" fill=\"#2a2a2a\" text-anchor=\"middle\">Wellens syndrome — critical LAD stenosis (V2–V3)</text>\n<!-- Type A: biphasic T -->\n<rect x=\"20\" y=\"40\" width=\"310\" height=\"180\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"60\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Type A — biphasic T (earlier)</text>\n<text x=\"30\" y=\"76\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">T up then sharply down in V2–V3</text>\n<path d=\"M 30 140 L 80 140 Q 90 132 100 140 L 120 140 L 124 142 L 128 115 L 132 170 L 136 140 Q 155 110 170 110 Q 185 110 200 170 L 215 140 L 270 140 L 280 140 Q 290 132 300 140 L 315 140\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"175\" y=\"198\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#6b8e9e\" text-anchor=\"middle\">biphasic: up then down</text>\n<!-- Type B: deep symmetric T inversion -->\n<rect x=\"340\" y=\"40\" width=\"310\" height=\"180\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"350\" y=\"60\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Type B — deep symmetric T inversion</text>\n<text x=\"350\" y=\"76\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Deep symmetric inverted T (more specific)</text>\n<path d=\"M 350 140 L 400 140 Q 410 132 420 140 L 440 140 L 444 142 L 448 115 L 452 170 L 456 140 Q 475 140 490 175 Q 505 195 520 175 Q 535 140 550 140 L 620 140\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"500\" y=\"218\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#c9a642\" text-anchor=\"middle\">⚠ pain-free ECG — do NOT stress test</text>\n</svg>\n\n- **Type A** (25%): biphasic T in V2–V3 (up-then-down)\n- **Type B** (75%): deep, symmetric T inversion in V2–V3\n- ECG is typically taken **when the patient is pain-free** — an ominous sign of critical proximal LAD stenosis\n\n> [!danger] Do not stress test\n> Stress testing can precipitate VF. Refer for urgent cardiology / coronary angiography.\n\n---\n\n### WPW — Wolff-Parkinson-White\n\n<svg viewBox=\"0 0 660 360\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-labelledby=\"wpw-title\"><title id=\"wpw-title\">WPW and pre-excited AF</title>\n<rect width=\"660\" height=\"360\" fill=\"#faf9f5\"/>\n<text x=\"330\" y=\"22\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"14\" font-weight=\"700\" fill=\"#2a2a2a\" text-anchor=\"middle\">WPW — delta wave, short PR, pre-excited AF</text>\n<!-- Normal top-left -->\n<rect x=\"20\" y=\"40\" width=\"310\" height=\"140\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"60\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Normal PR + QRS</text>\n<text x=\"30\" y=\"76\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">PR 120–200 ms • sharp upstroke</text>\n<path d=\"M 30 130 L 80 130 Q 90 122 100 130 L 130 130 L 134 132 L 138 105 L 142 155 L 146 130 Q 160 110 175 130 L 230 130 Q 240 122 250 130 L 280 130 L 284 132 L 288 105 L 292 155 L 296 130 Q 310 110 315 130\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<!-- WPW top-right -->\n<rect x=\"340\" y=\"40\" width=\"310\" height=\"140\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"350\" y=\"60\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">WPW — delta wave</text>\n<text x=\"350\" y=\"76\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Short PR (&lt;120 ms) • slurred upstroke δ • broad QRS</text>\n<!-- delta wave: slurred upstroke instead of sharp Q -->\n<path d=\"M 350 130 L 400 130 Q 410 122 420 130 L 435 130 L 440 128 L 455 105 L 460 155 L 465 130 Q 480 110 495 130 L 545 130 Q 555 122 565 130 L 580 130 L 585 128 L 600 105 L 605 155 L 610 130 Q 620 110 635 130\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"450\" y=\"98\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#6b8e9e\" text-anchor=\"middle\">δ</text>\n<text x=\"595\" y=\"98\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#6b8e9e\" text-anchor=\"middle\">δ</text>\n<!-- Normal AF bot-left -->\n<rect x=\"20\" y=\"200\" width=\"310\" height=\"140\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"220\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Normal AV node + AF</text>\n<text x=\"30\" y=\"236\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Irregular, narrow QRS, rate ~150</text>\n<path d=\"M 30 290 L 55 290 L 59 292 L 63 265 L 67 315 L 71 290 L 100 290 L 104 292 L 108 265 L 112 315 L 116 290 L 160 290 L 164 292 L 168 265 L 172 315 L 176 290 L 215 290 L 219 292 L 223 265 L 227 315 L 231 290 L 270 290 L 274 292 L 278 265 L 282 315 L 286 290 L 315 290\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<!-- WPW + AF bot-right: DANGER broad irregular -->\n<rect x=\"340\" y=\"200\" width=\"310\" height=\"140\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"350\" y=\"220\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">WPW + AF (pre-excited)</text>\n<text x=\"350\" y=\"236\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Rapid, broad, irregular • can be &gt;250 bpm</text>\n<path d=\"M 350 290 Q 365 260 380 295 L 395 290 Q 415 260 430 295 Q 445 280 460 290 Q 480 260 495 300 Q 515 268 530 295 Q 545 275 560 295 Q 578 260 595 298 Q 615 270 635 292\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"495\" y=\"344\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#c9a642\" text-anchor=\"middle\">⚠ avoid adenosine, digoxin, verapamil, β-blockers</text>\n</svg>\n\n- **Short PR** <120 ms\n- **Delta wave** — slurred upstroke of QRS (pre-excitation via accessory pathway)\n- **Broad QRS** (fusion of accessory + AV node conduction)\n\n> [!danger] WPW + AF is a true emergency\n> Conduction down the accessory pathway bypasses the AV node → rapid, **broad, irregular** QRS, often >200 bpm. Can degenerate to VF.\n> - **AVOID** adenosine, digoxin, verapamil, diltiazem, beta-blockers — they block AV node and force conduction via accessory pathway\n> - **TREAT** with procainamide IV, or DC cardioversion if unstable\n\n---\n\n### Pericarditis vs STEMI\n\n<svg viewBox=\"0 0 660 260\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-labelledby=\"peri-title\"><title id=\"peri-title\">Pericarditis vs STEMI</title>\n<rect width=\"660\" height=\"260\" fill=\"#faf9f5\"/>\n<text x=\"330\" y=\"22\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"14\" font-weight=\"700\" fill=\"#2a2a2a\" text-anchor=\"middle\">Pericarditis vs STEMI — ST morphology</text>\n<!-- STEMI: convex ST elevation -->\n<rect x=\"20\" y=\"40\" width=\"310\" height=\"200\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"60\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">STEMI (convex)</text>\n<text x=\"30\" y=\"76\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Localised • reciprocal ST↓ • no PR↓</text>\n<path d=\"M 30 160 L 90 160 Q 100 152 110 160 L 130 160 L 134 162 L 138 135 L 142 180 L 146 160 Q 160 130 175 130 Q 190 130 205 160 L 215 160 L 230 160 Q 240 152 250 160 L 270 160 L 274 162 L 278 135 L 282 180 L 286 160 Q 300 130 315 130\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"180\" y=\"120\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#c9a642\" text-anchor=\"middle\">convex “tombstone”</text>\n<!-- Pericarditis: concave ST elevation + PR depression -->\n<rect x=\"340\" y=\"40\" width=\"310\" height=\"200\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"350\" y=\"60\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Pericarditis (concave)</text>\n<text x=\"350\" y=\"76\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Diffuse (except aVR/V1) • PR↓ pathognomonic</text>\n<!-- PR depression drawn as slight dip after P before QRS -->\n<path d=\"M 350 160 L 400 160 Q 410 152 420 160 L 435 170 L 450 170 L 454 172 L 458 150 L 462 195 L 466 160 Q 480 150 495 160 Q 510 170 525 160 L 545 160 Q 555 152 565 160 L 580 170 L 595 170 L 599 172 L 603 150 L 607 195 L 611 160 Q 625 150 635 160\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"420\" y=\"195\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#6b8e9e\" text-anchor=\"middle\">PR↓</text>\n<text x=\"500\" y=\"140\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#6b8e9e\" text-anchor=\"middle\">saddle-shaped STE</text>\n</svg>\n\n- **STEMI** — localised to a territory; **convex** (tombstone) ST; reciprocal depression; no PR depression\n- **Pericarditis** — **diffuse** STE (all leads except aVR, V1); **concave** (saddle-shaped) ST; no reciprocal changes; **PR depression** (pathognomonic); PR **elevation in aVR** (\"knuckle sign\")\n\n**Pericarditis stages:** (I) STE + PR↓ → (II) ST normalises, T flattens → (III) T inversion → (IV) normalisation over weeks.\n\n---\n\n### AV Block — 1°, Mobitz I / II, 3° (Complete)\n\n<svg viewBox=\"0 0 660 400\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-labelledby=\"av-title\"><title id=\"av-title\">AV block spectrum</title>\n<rect width=\"660\" height=\"400\" fill=\"#faf9f5\"/>\n<text x=\"330\" y=\"22\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"14\" font-weight=\"700\" fill=\"#2a2a2a\" text-anchor=\"middle\">AV block spectrum</text>\n<!-- 1° AV block -->\n<rect x=\"20\" y=\"40\" width=\"620\" height=\"80\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"58\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">1° AV block — PR &gt;200 ms, all beats conduct</text>\n<path d=\"M 30 100 L 65 100 Q 75 92 85 100 L 140 100 L 144 102 L 148 80 L 152 120 L 156 100 Q 170 80 185 100 L 220 100 Q 230 92 240 100 L 295 100 L 299 102 L 303 80 L 307 120 L 311 100 Q 325 80 340 100 L 375 100 Q 385 92 395 100 L 450 100 L 454 102 L 458 80 L 462 120 L 466 100 Q 480 80 495 100 L 530 100 Q 540 92 550 100 L 605 100 L 609 102 L 613 80 L 617 120 L 621 100 Q 635 80 635 100\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<!-- Mobitz I Wenckebach -->\n<rect x=\"20\" y=\"130\" width=\"620\" height=\"80\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"148\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Mobitz I (Wenckebach) — PR lengthens then dropped QRS, resets</text>\n<!-- beat 1: short PR; beat 2: longer PR; beat 3: longest PR; then P without QRS; then reset -->\n<path d=\"M 30 190 L 60 190 Q 70 182 80 190 L 110 190 L 114 192 L 118 170 L 122 210 L 126 190 Q 140 170 155 190 L 195 190 Q 205 182 215 190 L 260 190 L 264 192 L 268 170 L 272 210 L 276 190 Q 290 170 305 190 L 355 190 Q 365 182 375 190 L 430 190 L 434 192 L 438 170 L 442 210 L 446 190 Q 460 170 475 190 L 525 190 Q 535 182 545 190 L 565 190 L 568 190 M 575 190 Q 585 182 595 190 L 620 190 L 624 192 L 628 170 L 632 210 L 635 190\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"550\" y=\"178\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#c9a642\" text-anchor=\"middle\">dropped</text>\n<!-- Mobitz II -->\n<rect x=\"20\" y=\"220\" width=\"620\" height=\"80\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"238\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Mobitz II — fixed PR, sudden dropped beat (⚠ pacemaker)</text>\n<path d=\"M 30 280 L 65 280 Q 75 272 85 280 L 120 280 L 124 282 L 128 260 L 132 300 L 136 280 Q 150 260 165 280 L 210 280 Q 220 272 230 280 L 265 280 L 269 282 L 273 260 L 277 300 L 281 280 Q 295 260 310 280 L 355 280 Q 365 272 375 280 L 410 280 L 414 282 L 418 260 L 422 300 L 426 280 Q 440 260 455 280 L 500 280 Q 510 272 520 280 L 535 280 M 545 280 Q 560 272 570 280 L 605 280 L 609 282 L 613 260 L 617 300 L 621 280 Q 635 260 635 280\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"525\" y=\"268\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#c9a642\" text-anchor=\"middle\">dropped (no warning)</text>\n<!-- Complete HB -->\n<rect x=\"20\" y=\"310\" width=\"620\" height=\"80\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"328\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">3° (complete) — P and QRS dissociated; slow ventricular escape</text>\n<!-- fast P waves + slow wide escape QRS -->\n<path d=\"M 30 370 Q 42 362 54 370 Q 66 378 78 370 Q 90 362 102 370 Q 114 378 126 370 Q 138 362 150 370 Q 162 378 174 370 Q 186 362 198 370 Q 210 378 222 370 Q 234 362 246 370 Q 258 378 270 370 Q 282 362 294 370 Q 306 378 318 370 Q 330 362 342 370 Q 354 378 366 370 Q 378 362 390 370 Q 402 378 414 370 Q 426 362 438 370 Q 450 378 462 370 Q 474 362 486 370 Q 498 378 510 370 Q 522 362 534 370 Q 546 378 558 370 Q 570 362 582 370 Q 594 378 606 370 Q 618 362 630 370\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"1.5\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<!-- escape QRS: three widely spaced broad complexes -->\n<path d=\"M 30 350 L 70 350 Q 85 340 95 350 L 100 350 L 104 370 L 118 335 L 135 360 L 142 350 Q 155 360 165 350 L 300 350 Q 315 340 325 350 L 330 350 L 334 370 L 348 335 L 365 360 L 372 350 Q 385 360 395 350 L 540 350 Q 555 340 565 350 L 570 350 L 574 370 L 588 335 L 605 360 L 612 350 Q 625 360 635 350\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n</svg>\n\n- **1°** — PR >200 ms, every P conducts. Usually benign.\n- **Mobitz I (Wenckebach)** — progressive PR lengthening, then a dropped QRS, then reset. Usually benign; AV nodal.\n- **Mobitz II** — PR fixed, sudden dropped beat with no warning. Infranodal — **high risk of progression to complete HB**.\n- **3° (complete)** — P waves and QRS completely dissociated; ventricular escape rate 20–40 bpm.\n\n> [!danger] High-grade block is an emergency\n> Mobitz II and complete HB need **transcutaneous → transvenous pacing**. Atropine 0.5–1 mg IV may help nodal block but is often ineffective in infranodal disease. Isoprenaline infusion as a bridge.\n\n---\n\n### PE — Right Heart Strain ECG\n\n<svg viewBox=\"0 0 660 290\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-labelledby=\"pe-title\"><title id=\"pe-title\">PE — right heart strain pattern</title>\n<rect width=\"660\" height=\"290\" fill=\"#faf9f5\"/>\n<text x=\"330\" y=\"22\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"14\" font-weight=\"700\" fill=\"#2a2a2a\" text-anchor=\"middle\">PE / right heart strain — S1Q3T3 pattern</text>\n<!-- Lead I: prominent S -->\n<rect x=\"20\" y=\"40\" width=\"205\" height=\"200\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"30\" y=\"60\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Lead I — deep S</text>\n<text x=\"30\" y=\"76\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Prominent S wave</text>\n<path d=\"M 30 150 L 70 150 Q 80 142 90 150 L 105 150 L 109 150 L 113 125 L 116 135 L 125 190 L 140 150 L 170 150 Q 180 142 190 150 L 210 150\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"125\" y=\"210\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#6b8e9e\" text-anchor=\"middle\">deep S</text>\n<!-- Lead III: Q + inverted T -->\n<rect x=\"235\" y=\"40\" width=\"205\" height=\"200\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"245\" y=\"60\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">Lead III — Q + inverted T</text>\n<text x=\"245\" y=\"76\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Q wave then inverted T</text>\n<path d=\"M 245 150 L 285 150 Q 295 142 305 150 L 325 170 L 330 130 L 335 115 L 350 160 L 380 150 Q 390 175 400 180 Q 410 175 420 150 L 425 150\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"335\" y=\"210\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#6b8e9e\" text-anchor=\"middle\">Q</text>\n<text x=\"400\" y=\"210\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#6b8e9e\" text-anchor=\"middle\">inverted T</text>\n<!-- V1-V4: T inversion pattern -->\n<rect x=\"450\" y=\"40\" width=\"195\" height=\"200\" fill=\"#fff\" stroke=\"#e5e0d5\" stroke-width=\"1\" rx=\"4\"/>\n<text x=\"460\" y=\"60\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"13\" font-weight=\"700\" fill=\"#2a2a2a\">V1–V4 — T inversion</text>\n<text x=\"460\" y=\"76\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"500\" fill=\"#4a4a4a\">Right heart strain</text>\n<path d=\"M 460 150 L 495 150 Q 500 145 505 150 L 520 150 L 523 151 L 527 130 L 530 170 L 534 150 Q 545 180 555 185 Q 565 180 575 150 L 600 150 Q 605 145 610 150 L 625 150\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.6\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/>\n<text x=\"555\" y=\"210\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#6b8e9e\" text-anchor=\"middle\">inverted T</text>\n<!-- Footer note -->\n<text x=\"330\" y=\"270\" font-family='system-ui,-apple-system,\"Segoe UI\",Roboto,sans-serif' font-size=\"11\" font-weight=\"600\" fill=\"#c9a642\" text-anchor=\"middle\">S1Q3T3 is classic but uncommon — most PE ECGs just show sinus tachycardia</text>\n</svg>\n\n**Findings (in order of frequency):**\n\n- **Sinus tachycardia** — most common (≈40%)\n- **T wave inversion V1–V4** — RV strain pattern (second most common, often missed)\n- **New RBBB** — from RV conduction delay\n- **S1Q3T3** — classic but only ~20% sensitive\n- **P pulmonale** — peaked P in II (RA enlargement)\n- **New AF/flutter** — from elevated right-sided pressures\n\n> [!warning] A normal ECG does NOT exclude PE\n> If pretest probability is moderate/high, proceed to CTPA regardless of ECG.\n\n## Coronary Artery to Lead Territory Map\n\n<svg viewBox=\"0 0 640 360\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-labelledby=\"terr-title\"><title id=\"terr-title\">Coronary-to-lead territory map</title><style>.t-t{font:600 13px/1 system-ui,sans-serif;fill:#2a2a2a}.t-l{font:700 14px/1 system-ui,sans-serif;fill:#fff;text-anchor:middle}.t-s{font:500 11px/1 system-ui,sans-serif;fill:#fff;text-anchor:middle}.t-k{font:600 11px/1 system-ui,sans-serif;fill:#2a2a2a;text-anchor:start}.t-box{stroke:#fff;stroke-width:1.5}</style><rect width=\"640\" height=\"360\" fill=\"#faf9f5\"/><text x=\"320\" y=\"24\" class=\"t-t\" text-anchor=\"middle\">Coronary artery → lead territory</text><rect x=\"30\" y=\"50\" width=\"170\" height=\"56\" rx=\"4\" class=\"t-box\" fill=\"#6b8e9e\"/><text x=\"115\" y=\"74\" class=\"t-l\">I</text><text x=\"115\" y=\"94\" class=\"t-s\">Lateral — LCx / diag</text><rect x=\"215\" y=\"50\" width=\"170\" height=\"56\" rx=\"4\" class=\"t-box\" fill=\"#c9a642\"/><text x=\"300\" y=\"74\" class=\"t-l\">II</text><text x=\"300\" y=\"94\" class=\"t-s\">Inferior — RCA</text><rect x=\"400\" y=\"50\" width=\"210\" height=\"56\" rx=\"4\" class=\"t-box\" fill=\"#c9a642\"/><text x=\"505\" y=\"74\" class=\"t-l\">III</text><text x=\"505\" y=\"94\" class=\"t-s\">Inferior — RCA</text><rect x=\"30\" y=\"118\" width=\"170\" height=\"56\" rx=\"4\" class=\"t-box\" fill=\"#b0a89a\"/><text x=\"115\" y=\"142\" class=\"t-l\">aVR</text><text x=\"115\" y=\"162\" class=\"t-s\">Cavity / LMS (recip.)</text><rect x=\"215\" y=\"118\" width=\"170\" height=\"56\" rx=\"4\" class=\"t-box\" fill=\"#6b8e9e\"/><text x=\"300\" y=\"142\" class=\"t-l\">aVL</text><text x=\"300\" y=\"162\" class=\"t-s\">High lateral — LCx</text><rect x=\"400\" y=\"118\" width=\"210\" height=\"56\" rx=\"4\" class=\"t-box\" fill=\"#c9a642\"/><text x=\"505\" y=\"142\" class=\"t-l\">aVF</text><text x=\"505\" y=\"162\" class=\"t-s\">Inferior — RCA</text><rect x=\"30\" y=\"200\" width=\"90\" height=\"68\" rx=\"4\" class=\"t-box\" fill=\"#c96442\"/><text x=\"75\" y=\"228\" class=\"t-l\">V1</text><text x=\"75\" y=\"248\" class=\"t-s\">Septal — LAD</text><rect x=\"128\" y=\"200\" width=\"90\" height=\"68\" rx=\"4\" class=\"t-box\" fill=\"#c96442\"/><text x=\"173\" y=\"228\" class=\"t-l\">V2</text><text x=\"173\" y=\"248\" class=\"t-s\">Septal — LAD</text><rect x=\"226\" y=\"200\" width=\"90\" height=\"68\" rx=\"4\" class=\"t-box\" fill=\"#c96442\"/><text x=\"271\" y=\"228\" class=\"t-l\">V3</text><text x=\"271\" y=\"248\" class=\"t-s\">Anterior — LAD</text><rect x=\"324\" y=\"200\" width=\"90\" height=\"68\" rx=\"4\" class=\"t-box\" fill=\"#c96442\"/><text x=\"369\" y=\"228\" class=\"t-l\">V4</text><text x=\"369\" y=\"248\" class=\"t-s\">Anterior — LAD</text><rect x=\"422\" y=\"200\" width=\"90\" height=\"68\" rx=\"4\" class=\"t-box\" fill=\"#6b8e9e\"/><text x=\"467\" y=\"228\" class=\"t-l\">V5</text><text x=\"467\" y=\"248\" class=\"t-s\">Lateral — LCx / LAD</text><rect x=\"520\" y=\"200\" width=\"90\" height=\"68\" rx=\"4\" class=\"t-box\" fill=\"#6b8e9e\"/><text x=\"565\" y=\"228\" class=\"t-l\">V6</text><text x=\"565\" y=\"248\" class=\"t-s\">Lateral — LCx</text><rect x=\"30\" y=\"284\" width=\"280\" height=\"52\" rx=\"4\" class=\"t-box\" fill=\"#2a2a2a\"/><text x=\"170\" y=\"304\" class=\"t-l\">V7–V9 (posterior, reciprocal V1–V3)</text><text x=\"170\" y=\"322\" class=\"t-s\">Posterior — usually RCA or LCx</text><rect x=\"330\" y=\"284\" width=\"280\" height=\"52\" rx=\"4\" class=\"t-box\" fill=\"#2a2a2a\"/><text x=\"470\" y=\"304\" class=\"t-l\">V4R (right-sided)</text><text x=\"470\" y=\"322\" class=\"t-s\">RV infarct — proximal RCA</text><rect x=\"30\" y=\"346\" width=\"12\" height=\"10\" fill=\"#c96442\"/><text x=\"48\" y=\"355\" class=\"t-k\">LAD</text><rect x=\"90\" y=\"346\" width=\"12\" height=\"10\" fill=\"#6b8e9e\"/><text x=\"108\" y=\"355\" class=\"t-k\">LCx</text><rect x=\"150\" y=\"346\" width=\"12\" height=\"10\" fill=\"#c9a642\"/><text x=\"168\" y=\"355\" class=\"t-k\">RCA</text><rect x=\"210\" y=\"346\" width=\"12\" height=\"10\" fill=\"#b0a89a\"/><text x=\"228\" y=\"355\" class=\"t-k\">Non-specific</text></svg>\n\n## MI Evolution Over Time\n\n<svg viewBox=\"0 0 660 260\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-labelledby=\"mi-title\"><title id=\"mi-title\">Sequential ECG changes in evolving myocardial infarction</title><style>.m-t{font:600 13px/1 system-ui,sans-serif;fill:#2a2a2a;text-anchor:middle}.m-l{font:600 12px/1 system-ui,sans-serif;fill:#2a2a2a;text-anchor:middle}.m-s{font:500 10px/1 system-ui,sans-serif;fill:#4a4a4a;text-anchor:middle}</style><rect width=\"660\" height=\"260\" fill=\"#faf9f5\"/><text x=\"330\" y=\"20\" class=\"m-t\">MI ECG evolution over time</text><g transform=\"translate(10,0)\"><rect x=\"0\" y=\"30\" width=\"120\" height=\"180\" fill=\"#fff\" stroke=\"#e5e0d5\" rx=\"4\"/><path d=\"M 5 120 L 15 120 Q 22 104 30 120 L 42 120 L 44 122 L 46 116 L 52 60 L 58 128 L 62 120 L 70 120 Q 82 55 95 120 L 115 120\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2.2\" stroke-linejoin=\"round\" stroke-linecap 60\" y=\"226\" class=\"m-l\">Resolved</text><text x=\"60\" y=\"242\" class=\"m-s\">Weeks–months — Q persists</text></g></svg>\n\n> [!tip] T-wave inversion is a *later* change\n> Sequence: hyperacute T → STE → Q formation → T inversion → normalisation.\n\n## Electrolyte ECG Pattern Recognition\n\n<svg viewBox=\"0 0 580 620\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-labelledby=\"el-title\"><title id=\"el-title\">ECG patterns in common electrolyte disturbances</title><style>.e-t{font:600 13px/1 system-ui,sans-serif;fill:#2a2a2a;text-anchor:middle}.e-l{font:700 13px/1 system-ui,sans-serif;fill:#2a2a2a}.e-s{font:500 10px/1 system-ui,sans-serif;fill:#4a4a4a}</style><rect width=\"580\" height=\"620\" fill=\"#faf9f5\"/><text x=\"290\" y=\"22\" class=\"e-t\">Electrolyte ECG pattern recognition</text><g transform=\"translate(20,40)\"><rect x=\"0\" y=\"0\" width=\"260\" height=\"110\" fill=\"#fff\" stroke=\"#e5e0d5\" rx=\"4\"/><path d=\"M 10 55 L 25 55 Q 32 48 39 55 L 55 55 L 57 55 L 59 50 L 65 20 L 71 62 L 75 55 L 85 55 L 100 20 L 115 55 L 125 55 M 140 55 L 155 55 Q 162 50 169 55 L 175 55 L 178 70 L 188 22 L 203 72 L 213 55 Q 225 45 235 55 L 245 55\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/><text x=\"10\" y=\"20\" class=\"e-l\">Hyperkalaemia</text><text x=\"10\" y=\"104\" class=\"e-s\">Peaked T → PR prolonged → wide QRS → sine</text></g><g transform=\"translate(20,158)\"><rect x=\"0\" y=\"0\" width=\"260\" height=\"110\" fill=\"#fff\" stroke=\"#e5e0d5\" rx=\"4\"/><path d=\"M 10 55 L 25 55 Q 32 48 39 55 L 55 55 L 57 55 L 59 58 L 62 35 L 68 72 L 72 55 L 88 55 Q 100 50 115 55 Q 135 42 155 55 L 170 55 Q 180 48 190 55 L 210 55 L 213 65 L 220 35 L 228 68 L 235 55 L 245 55\" fill=\"none\" stroke=\"#c96442\" stroke-width=\"2\" stroke-linejoin=\"round\" stroke-linecap=\"round\"/><text x=\"10\" y=\"20\" class=\"e-l\">Hypokalaemia</text><text x=\"10\" y=\"104\" class=\"e-s\">Flat T, prominent U wave, long QT-U<           "slug": "abg-interpretation-systematic-approach",
          "title": "ABG Interpretation — Systematic Approach",
          "markdown": "> [!tip] Order: pH → Primary disorder → Compensation → Oxygenation → Mixed\n\n### Normal Values\n\n| Parameter | Normal |\n|---|---|\n| pH | 7.35–7.45 |\n| pCO₂ | 35–45 mmHg |\n| HCO₃⁻ | 22–26 mmol/L |\n| pO₂ | 80–100 mmHg (room air) |\n| BE | −2 to +2 |\n\n---\n\n### Step 1 — pH\n- <7.35 = Acidaemia\n- >7.45 = Alkalaemia\n- Normal pH ≠ no disorder (mixed disorders can cancel out)\n\n### Step 2 — Primary Disorder\n\n| Disorder | pH | Primary change |\n|---|---|---|\n| Metabolic Acidosis | ↓ | ↓ HCO₃⁻ |\n| Metabolic Alkalosis | ↑ | ↑ HCO₃⁻ |\n| Respiratory Acidosis | ↓ | ↑ pCO₂ |\n| Respiratory Alkalosis | ↑ | ↓ pCO₂ |\n\n### Step 3 — Compensation\n\n| Disorder | Expected Compensation |\n|---|---|\n| Metabolic Acidosis | pCO₂ = (1.5 × HCO₃) + 8 ± 2 **(Winter's formula)** |\n| Metabolic Alkalosis | pCO₂ = (0.7 × HCO₃) + 21 ± 2 |\n| Resp Acidosis (acute) | HCO₃ rises 1 per 10↑pCO₂ |\n| Resp Acidosis (chronic) | HCO₃ rises 3.5 per 10↑pCO₂ |\n| Resp Alkalosis (acute) | HCO₃ falls 2 per 10↓pCO₂ |\n| Resp Alkalosis (chronic) | HCO₃ falls 5 per 10↓pCO₂ |\n\n> [!note] Compensation NEVER overcorrects pH. If it does, there is a second primary disorder.\n\n### Step 4 — Oxygenation\n\n```\nPAO₂ = (FiO₂ × 713) − (pCO₂ / 0.8)\nA-a gradient = PAO₂ − PaO₂\nNormal: <10 mmHg on room air  |  Age-adjusted: age/4 + 4\n```\n\n- High A-a + hypoxia → lung pathology (V/Q mismatch, shunt)\n- Normal A-a + hypoxia → hypoventilation or low FiO₂\n\n**P/F Ratio = PaO₂ / FiO₂**\n\n| P/F | Severity |\n|---|---|\n| >400 | Normal |\n| 300–400 | Mild |\n| 200–300 | Moderate ARDS |\n| <200 | Severe ARDS |\n\n### Step 5 — Mixed Disorders\n\n| Pattern | Meaning |\n|---|---|\n| Normal pH + ↑pCO₂ + ↑HCO₃ | Resp acidosis + Met alkalosis (e.g. COPD + diuretics) |\n| Normal pH + ↓pCO₂ + ↓HCO₃ | Resp alkalosis + Met acidosis **(common ICU — sepsis + lactic)** |\n| ↓pH + ↑pCO₂ + ↓HCO₃ | Combined resp + met acidosis (arrest, severe sepsis) |\n\n**ROME mnemonic:** Respiratory **O**pposite (pH↓, CO₂↑) | Metabolic **E**qual (pH↓, HCO₃↓)\n\n---"

          "slug": "co2-gap-pv-aco2",
          "title": "CO₂ Gap — Pv-aCO₂",
          "markdown": "```\nPv-aCO₂ = Central venous pCO₂ − Arterial pCO₂\nNormal: <6 mmHg\n```\n\n### Concept\n- CO₂ cleared from tissues by cardiac output\n- If CO is low → CO₂ accumulates in venous blood → gap widens\n- **Pv-aCO₂ >6 = LOW FLOW STATE** even if ScvO₂ >70% and lactate falling\n\n### Pv-aCO₂ / Ca-vO₂ Ratio (Respiratory Quotient Proxy)\n- Normal RQ ≈ 0.8\n- **Ratio >1.0 → anaerobic CO₂ being generated → ongoing tissue hypoxia**\n\n| Pattern | Interpretation |\n|---|---|\n| Gap >6 + ratio >1.0 | Low flow AND anaerobic metabolism |\n| Gap >6 + ratio ≤1.0 | Low flow, not necessarily anaerobic |\n| Gap normal + lactate high | Type B lactate (not a flow problem) |\n\n### Resuscitation Endpoints\n\n| Finding | Interpretation | Action |\n|---|---|---|\n| ScvO₂ >70% + gap <6 + lactate clearing | Adequate resuscitation | Maintain |\n| ScvO₂ >70% + gap >6 | Maldistributed flow | Vasopressors / inotropes |\n| ScvO₂ <70% + gap >6 | Global hypoperfusion | Increase CO |\n\n> [!warning] Measure from CVC blood gas (IJV or subclavian ONLY — not peripheral venous)\n\n---"
        },
        {
          "slug": "low-bicarbonate-metabolic-acidosis-workup",
          "title": "Low Bicarbonate — Metabolic Acidosis Workup",
          "markdown": "### Step 1 — Calculate Anion Gap\n\n```\nAG = Na⁺ − (Cl⁻ + HCO₃⁻)\nNormal: 8–12 mmol/L\n```\n\n> [!warning] Albumin correction (critical in sick/ICU patients):\n> `Corrected AG = measured AG + 2.5 × [(40 − albumin) / 10]`\n> Each 10 g/L albumin below 40 → AG underestimated by 2.5\n\n---\n\n### Step 2 — High Anion Gap → GOLDMARK\n\n| Letter | Cause |\n|---|---|\n| **G** | Glycols (ethylene glycol, propylene glycol) |\n| **O** | Oxoproline (paracetamol overuse — malnourished women) |\n| **L** | L-lactate *(most common)* |\n| **D** | D-lactate (short bowel syndrome, gut bacterial overgrowth) |\n| **M** | Methanol |\n| **A** | Aspirin (salicylate) |\n| **R** | Renal failure (uraemia) |\n| **K** | Ketones (DKA, starvation, alcoholic ketoacidosis) |\n\n---\n\n### Step 3 — Osmolar Gap (if toxic alcohol suspected)\n\n```\nCalculated osmolality = 2×Na + glucose + urea  (all mmol/L)\nOsmolar gap = Measured − Calculated\nNormal: <10 mOsm/kg\n```\n\n- Elevated gap + high AG → **toxic alcohol** (ethylene glycol, methanol)\n  - → Fomepizole (or ethanol) + dialysis\n- Elevated gap without high AG → early ingestion (before metabolism) or ethanol\n\n---\n\n### Step 4 — Normal Anion Gap → HARDUPS\n\n| Letter | Cause |\n|---|---|\n| **H** | Hyperalimentation (TPN) |\n| **A** | Acetazolamide / Addison's disease |\n| **R** | RTA (renal tubular acidosis) |\n| **D** | Diarrhoea / GI HCO₃ loss |\n| **U** | Ureteroenteric conduit (ileal conduit) |\n| **P** | Pancreatic fistula |\n| **S** | Saline excess (large volume 0.9% NaCl) |\n\n---\n\n### Step 5 — Urine Anion Gap *(normal AG acidosis only)*\n\n```\nUrine AG = Urine Na⁺ + Urine K⁺ − Urine Cl⁻\n```\n\n| Result | Interpretation |\n|---|---|\n| Negative (<0) | Kidneys excreting NH₄⁺ correctly → **GI loss** (diarrhoea, fistula) |\n| Positive (>0) | Kidneys NOT excreting NH₄⁺ → **RTA** |\n\n---\n\n### Step 6 — RTA Types\n\n| Type | Urine pH | K⁺ | Key Feature | Common Causes |\n|---|---|---|---|---|\n| Type 1 (Distal) | >5.5 | ↓ | Nephrocalcinosis | Sjögren's, SLE, amphotericin B |\n| Type 2 (Proximal) | <5.5 | ↓ | Fanconi syndrome | Myeloma, tenofovir, acetazolamide |\n| Type 4 (Hyperkalaemic) | <5.5 | ↑ | Most common RTA | DM nephropathy, ACEi/ARB, adrenal insufficiency |\n\n---\n\n### Step 7 — Delta-Delta Ratio *(high AG only)*\n\n```\nΔAG = measured AG − 12\nΔHCO₃ = 24 − measured HCO₃\nDelta-delta ratio = ΔAG / ΔHCO₃\n```\n\n| Ratio | Interpretation |\n|---|---|\n| <0.4 | Predominantly normal AG acidosis |\n| 0.4–1.0 | Combined high AG + normal AG acidosis |\n| 1.0–2.0 | Pure high AG acidosis (expected) |\n| >2.0 | High AG + concurrent **metabolic alkalosis** (e.g. DKA + vomiting) |\n\n---"

          "slug": "elevated-lactate-full-differential",
          "title": "Elevated Lactate — Full Differential",
          "markdown": "| Level | Classification |\n|---|---|\n| <2.0 mmol/L | Normal |\n| 2.0–4.0 | Hyperlactataemia |\n| >4.0 + metabolic acidosis | Lactic acidosis |\n\n---\n\n### Type A — Tissue Hypoxia\n\n- **Shock** (septic most common, cardiogenic, hypovolaemic, obstructive)\n- **Severe respiratory failure** (hypoxaemia → ↓DO₂)\n- **Severe anaemia** (↓Hb → ↓O₂ content)\n- **Mesenteric ischaemia** — disproportionately high lactate vs haemodynamics; suspect in AF, PVD, post-cardiac surgery\n- **CO poisoning** — SpO₂ normal on pulse oximetry; check co-oximetry for COHb\n\n---\n\n### Type B — No Overt Hypoxia\n\n**B1 — Disease:**\n\n| Cause | Mechanism |\n|---|---|\n| Liver failure | ↓Clearance (liver clears 60% of lactate) |\n| Malignancy | Warburg effect (haematological > solid) |\n| Thiamine deficiency | PDH fails → pyruvate → lactate |\n| Phaeochromocytoma | Catecholamines → excess glycolysis |\n\n> [!warning] Thiamine: give 200–300 mg IV BEFORE glucose if deficiency suspected (alcoholic, malnourished)\n\n**B2 — Drugs/Toxins:**\n\n| Drug | Mechanism |\n|---|---|\n| Metformin | AKI → accumulation → mitochondrial complex I inhibition |\n| NRTIs (stavudine, didanosine) | Mitochondrial toxicity |\n| Linezolid (prolonged use) | Mitochondrial protein synthesis inhibition |\n| Cyanide / H₂S | Cytochrome c oxidase inhibition — antidote: **hydroxocobalamin** |\n| Propofol infusion syndrome | High dose, prolonged; also rhabdomyolysis + cardiac failure |\n| Propylene glycol | IV lorazepam/diazepam in high doses |\n| Salicylates | Uncouples oxidative phosphorylation |\n| Valproate | Inhibits β-oxidation |\n\n**B3 — Inborn errors:** MELAS, PDH deficiency (rare; usually childhood)\n\n---\n\n### Special Cases\n\n| Entity | Notes |\n|---|---|\n| D-lactate | Not on routine assay; short bowel/gut overgrowth; send specifically if high AG + normal L-lactate |\n| Reperfusion washout | Transient rise after restoring flow — trend matters, not single value |\n| Artefact | Tourniquet, delayed processing; use fluoride-oxalate tube or process on ice within 15–30 min |\n\n---\n\n### Lactate Clearance (Resuscitation Endpoint)\n\n```\nClearance = [(initial − current) / initial] × 100%\nTarget: ≥10% per 2 hours; normalise within 6h in sepsis\n```\n\n---\n\n### Desaturation Trap — Lactate + Unexplained Hypoxia\n\n> [!warning] Desaturation ≠ always a lung problem\n\n**The trap:** lactic acidosis → compensatory hyperventilation. When the patient tires and can no longer hyperventilate, pCO₂ rises → **Type 2 respiratory failure on top of metabolic acidosis**. Treating with O₂ alone without fixing the underlying acidosis will fail.\n\n**Always do ABG in unexplained desaturation** — pulse oximetry alone misses CO₂ retention and the compensation picture.\n\n#### Winter's Formula (expected respiratory compensation)\n```\nExpected pCO₂ = (1.5 × HCO₃⁻) + 8 ± 2\n```\n- pCO₂ **>** expected → *additional* respiratory acidosis (patient tiring — ICU trigger)\n- pCO₂ **<** expected → *additional* respiratory alkalosis (sepsis, anxiety, CNS)\n\n#### A-a Gradient\n```\nPAO₂ = (FiO₂ × 713) − (pCO₂ / 0.8)\nA-a gradient = PAO₂ − PaO₂\nNormal: <10 mmHg on room air (rises ~1 per decade)\n```\n- **High A-a + hypoxia** → lung pathology (V/Q mismatch, shunt, diffusion)\n- **Normal A-a + hypoxia** → hypoventilation or low FiO₂\n\n> [!tip] If lactate is rising and RR is rising but pCO₂ is creeping UP → patient is exhausting compensation. Escalate — don't just titrate O₂.\n"

          "title": "Dermatology — Common SG Skin Conditions",
          "markdown": "### Eczema (Atopic Dermatitis)\n\n**Features:** pruritic, chronic, relapsing; lichenification with chronic scratching; flexural distribution (antecubital, popliteal fossa, neck); associated with asthma, allergic rhinitis (atopic march)\n**SG context:** high prevalence (~20% children, ~3% adults); hot humid climate worsens; dust mites (HDM) major trigger\n\n**Management:**\n- **Emollients** (cornerstone): apply liberally QID; within 3 min of bathing; reduces flares\n- **Topical corticosteroids (TCS):** mild (1% hydrocortisone, desonide — face, flexures) → moderate (betamethasone valerate 0.025% — trunk) → potent (betamethasone valerate 0.1%, mometasone — thick/palms/soles)\n  - Fingertip unit (FTU) for dosing: 0.5g per FTU. Face = 2.5 FTU, trunk = 14 FTU.\n  - SE (prolonged use): skin atrophy, striae, telangiectasia, perioral dermatitis, tachyphylaxis\n- **Topical calcineurin inhibitors (TCI):** tacrolimus 0.1% or 0.03% (children) ointment; pimecrolimus 1% cream — steroid-sparing; safe long-term; use on face/flexures\n- **Wet wrapping:** acute severe eczema — TCS under wet layer, dry layer over\n- **Antihistamines:** sedating (chlorphenamine) for sleep; non-sedating (cetirizine, loratadine) for daytime — evidence limited for itch in AD but widely used\n- **Systemic (severe/refractory):** cyclosporin 2.5–5 mg/kg/day (rapid; nephrotoxic long-term), azathioprine, methotrexate\n- **Dupilumab** (anti-IL-4/13): biologic; highly effective for moderate-severe AD not controlled on topicals; SC q2 weeks; very safe; covered by some insurance in SG\n\n---\n\n### Psoriasis\n\n**Types:** plaque (most common — well-demarcated salmon-pink plaques with silvery scale, scalp, elbows, knees, lower back), guttate (raindrop-shaped, post-streptococcal), inverse (flexures, no scale), pustular (generalised — emergency), erythrodermic (emergency)\n\n**Associated:** psoriatic arthritis (~30%), cardiovascular risk, metabolic syndrome, depression\n\n**Investigations:** usually clinical; biopsy if uncertain; if PsA: XR, RF, anti-CCP (negative in seronegative)\n\n**Treatment:**\n\n*Topical (mild — <10% BSA):*\n- Potent TCS (betamethasone 0.1%) ± calcipotriol (Vit D analogue) combination (Daivobet) — first-line\n- Coal tar preparations (shampoo for scalp — T-Gel, Polytar)\n- Dithranol (anthralin): short-contact therapy; stains\n\n*Phototherapy (moderate — 10–30% BSA or refractory topical):*\n- Narrowband UVB 3×/week × 6–12 weeks; PUVA (psoralen + UVA)\n\n*Systemic (severe — >30% BSA or significant impact):*\n- **Methotrexate** 15–25 mg weekly (monitor FBC, LFTs; alcohol avoid; folic acid)\n- **Ciclosporin** 2.5–5 mg/kg/day (rapid; nephrotoxic; monitor BP/renal)\n- **Acitretin** (retinoid) 25–50 mg OD (especially for palmoplantar, erythrodermic, pustular; teratogenic)\n- **Biologics:** anti-TNF (adalimumab, etanercept), anti-IL12/23 (ustekinumab), anti-IL17A (secukinumab — most effective for plaque), anti-IL23 (risankizumab, guselkumab — very effective, convenient)\n- **Small molecules:** apremilast 30 mg BD (PDE4 inhibitor; oral; moderate); tofacitinib (JAK inhibitor)\n\n---\n\n### Common Fungal Infections (SG — Tropical Climate)\n\n| Condition | Cause | Features | Treatment |\n|---|---|---|---|\n| Tinea pedis (athlete's foot) | Trichophyton | Interdigital maceration, scaling, blisters | Clotrimazole/miconazole cream BD × 4 weeks; terbinafine 1% cream × 1–2 weeks |\n| Tinea corporis (ringworm) | Trichophyton | Ring-shaped scaly plaque | Clotrimazole cream BD × 4 weeks; griseofulvin oral if widespread |\n| Tinea versicolor | Malassezia | Hypo/hyperpigmented macules, trunk; hot climate | Ketoconazole 2% shampoo (leave 5 min) OD × 2 weeks; selenium sulfide lotion; fluconazole 150–300 mg once/weekly × 2 (recalcitrant) |\n| Tinea unguium (onychomycosis) | Dermatophyte | Discoloured, thickened, crumbly nail | Terbinafine 250 mg OD × 6 weeks (fingernail) or 12 weeks (toenail); or itraconazole pulse |\n| Candida intertrigo | Candida albicans | Moist flexures (groin, axilla, under breast); satellite lesions | Clotrimazole cream + hydrocortisone 1% (reduce inflammation); keep dry |\n| Candida vaginitis | Candida | Cottage-cheese discharge, pruritus | Clotrimazole pessary 500 mg single dose or fluconazole 150 mg oral single dose |\n\n---\n\n### Drug Reactions — Stevens-Johnson Syndrome & TEN\n\n> [!danger] SJS/TEN is a medical emergency. Mortality TEN ~30%. Admit to burns/ICU.\n\n**Spectrum:**\n- SJS: <10% BSA skin detachment\n- SJS-TEN overlap: 10–30%\n- TEN (Toxic Epidermal Necrolysis): >30% — full-thickness epidermal necrosis\n\n**Causes:** allopurinol (most common in **Asians** — HLA-B*5801 as discussed), carbamazepine, lamotrigine, phenytoin, sulfamethoxazole, nevirapine, NSAIDs (especially oxicams), penicillins\n\n> [!warning] In SG: HLA-B*5801 testing before allopurinol in Han Chinese/Thai/Korean is mandatory. HLA-B*1502 screen before carbamazepine in Chinese patients (TEN risk).\n\n**Features:** prodrome fever/malaise → mucosal involvement (oral, conjunctival, genital) → target lesions/blisters → skin detachment (Nikolsky sign positive)\n\n**SCORTEN score** (predicts mortality — score ≥5 → >90% mortality):\n- Age >40, malignancy, HR >120, initial epidermal detachment >10%, BUN >10 mmol/L, glucose >14 mmol/L, bicarbonate <20 mmol/L\n\n**Management:**\n- **Stop causative drug IMMEDIATELY** (each day of continued exposure worsens prognosis)\n- Supportive: wound care (like burns), fluid/electrolyte replacement, nutritional support, eye care (ophthalmology daily), oral care\n- **Cyclosporin** 3–5 mg/kg/day: emerging as first-line (halts progression); shorter course → taper\n- IVIG (controversial), systemic steroids (controversial — some centres use early pulse steroids)\n- Burns centre/ICU if TEN\n- Genetic counselling: avoid implicated drug + related drugs for life; advise family screening\n\n\n---"

          "markdown": "### Is it an Emergency?\n\n> [!danger] Refer same day to ophthalmology if ANY of: sudden vision loss, severe pain, trauma, chemical injury, fixed dilated pupil, corneal opacity, hyphema (blood in anterior chamber).\n\n---\n\n### Differential by Features\n\n| Features | Diagnosis |\n|---|---|\n| Diffuse redness, discharge (sticky/watery), no vision change, no pain | **Conjunctivitis** |\n| Redness around cornea (ciliary flush), pain, photophobia, vision ↓ | **Keratitis / Uveitis** |\n| Severe pain, halos around lights, fixed mid-dilated pupil, nausea, ↓vision | **Acute angle-closure glaucoma** |\n| Localised raised red area, no pain, no discharge | **Subconjunctival haemorrhage** |\n| Nodular raised red area, moderate pain | **Scleritis / Episcleritis** |\n| Eyelid crusting + red lid margins | **Blepharitis** |\n| Pain worse on movement, ↓vision, RAPD (afferent pupil defect) | **Optic neuritis** |\n\n---\n\n### Conjunctivitis\n\n**Bacterial:** purulent discharge, bilateral often, lids stuck in morning\n- Chloramphenicol 0.5% drops QID × 5 days OR fusidic acid 1% gel BD × 5 days\n- Usually self-limiting — antibiotics shorten course\n\n**Viral (adenoviral):** watery discharge, preauricular lymph node, highly contagious\n- Supportive (cold compresses, lubricants). No antibiotics needed. Off work/school until discharge stops.\n\n**Allergic:** bilateral, itchy (key symptom), watery, papillary reaction\n- Topical antihistamine (olopatadine 0.1% BD) + sodium cromoglicate 2% QID\n- Oral antihistamine if systemic allergy component\n\n**Neonatal conjunctivitis:** <28 days — always refer. Gonococcal = emergency (IV ceftriaxone).\n\n---\n\n### Acute Angle-Closure Glaucoma\n\n> [!danger] Ophthalmic emergency — irreversible vision loss within hours.\n\nFeatures: severe eye pain, headache, nausea/vomiting, halos around lights, cloudy cornea, fixed mid-dilated pupil, hard eye on palpation.\n\nManagement (while awaiting ophthalmology):\n- Pilocarpine 2% eye drops 1 drop q15 min × 4 doses (constricts pupil, opens drainage angle)\n- Acetazolamide 500mg oral or IV (↓aqueous production)\n- Lie patient supine\n- Analgesia + antiemetics\n\n---"

          "markdown": "### Acute Otitis Media (AOM)\n\n**Features:** ear pain (otalgia), fever, often follows URTI. In children: pulling at ear, irritability.\n**Otoscopy:** red bulging tympanic membrane (TM). Perforation: sudden pain relief + discharge.\n\n**Management:**\n- Analgesia first (paracetamol + ibuprofen)\n- Watchful waiting × 48–72h for mild cases in children >2 years and adults (most resolve without antibiotics)\n- Antibiotics if: <2 years bilateral AOM, perforated TM with discharge, severe symptoms, not improving at 48–72h, immunocompromised\n\n**Antibiotics:** amoxicillin 500mg TDS × 5 days (children: 40–90mg/kg/day in 3 doses)\nPenicillin allergy: azithromycin 500mg OD × 3 days or co-trimoxazole\n\n**Complications (refer ENT):** mastoiditis, meningitis, facial nerve palsy, persistent effusion >3 months (glue ear)\n\n---\n\n### Otitis Externa (Swimmer's Ear)\n\n**Features:** ear canal pain (worse on tragus pression or pulling pinna), itch, discharge, ↓hearing.\n**Causes:** water exposure, cotton bud trauma, eczema. Usually Pseudomonas or Staph.\n\n**Management:**\n- Keep ear dry (cotton wool with Vaseline for showers)\n- Acetic acid 2% spray (EarCalm) TDS–QID × 7 days (mildly acidifies canal — first-line)\n- Topical antibiotic + steroid drops: ciprofloxacin 0.3%/dexamethasone 0.1% (Ciloxan-Dex) or gentamicin + hydrocortisone (Gentisone HC)\n- If canal oedematous — microsuction + ear wick (soaked in drops) in ENT\n- Oral antibiotics (ciprofloxacin 500mg BD) only if: spreads beyond canal, cellulitis, diabetic/immunocompromised (risk of malignant otitis externa — Pseudomonas osteomyelitis of skull base)\n\n> [!danger] Malignant (necrotising) otitis externa: diabetic elderly + severe ear pain + granulation tissue on floor of canal + CN palsy → urgent ENT + CT petrous bone + IV ciprofloxacin.\n\n---"

        {
          "slug": "bells-palsy",
          "title": "Bell's Palsy",
          "markdown": "Idiopathic unilateral LMN facial nerve (CN VII) palsy — most common cause of acute facial paralysis.\n\n## Key Feature: Forehead Involvement\n\n**LMN (Bell's):** Forehead weak — can't wrinkle brow. **UMN (stroke):** Forehead spared.\n\n## House–Brackmann Grading (I–VI)\n\nI = normal; II = mild; III–IV = obvious; V = severe; VI = total paralysis. Prognosis: ~70–80% recover fully within 6 weeks.\n\n## Management\n\n**Steroids:** Prednisolone 60 mg daily × 5 days, then taper (start <72 h). **Antivirals:** Valaciclovir 1 g TDS if severe. **Eye care (critical):** Lubricants, tape at night, protective eyewear.\n\n## Red Flags\n\nBilateral → Guillain-Barré, sarcoid, Lyme. Other CN palsies → central/skull base pathology. **Ramsay Hunt** (vesicles in ear canal) → add aciclovir IV/high-dose PO to steroids.\n"
