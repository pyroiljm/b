          "slug": "leukaemia",
          "title": "Leukaemia — AML, ALL, CML, CLL",
          "markdown": "> [!danger] Pancytopenia + blasts on film, **or** WBC >30 with shift, **or** sudden neutropenia with fever → **same-day haematology referral** or ED. Treat neutropenic fever with broad-spectrum antibiotics within 1 hour.\n\n### Initial triage\n\n**Red-flag FBC patterns → refer urgently:**\n\n| Pattern | Likely concern |\n|---|---|\n| Pancytopenia (↓Hb + ↓WBC + ↓plt) | Acute leukaemia, aplastic anaemia, marrow infiltration, severe B12 deficiency |\n| WBC >30 with circulating blasts | Acute leukaemia |\n| Lymphocytosis >5 × 10⁹/L sustained | CLL |\n| Persistent leukocytosis with left shift, splenomegaly | CML |\n| Unexplained neutropenia (ANC <1.0) | Marrow disease, drugs, autoimmune |\n\nAlways request a **blood film** — film findings (blasts, Auer rods, smear cells) change urgency.\n\n### Acute leukaemias (AML, ALL)\n\n**Presentation** (weeks): fatigue, bruising, epistaxis / bleeding gums, infections, fever, bone pain, splenomegaly, hepatomegaly, lymphadenopathy (ALL).\n\n| Feature | AML | ALL |\n|---|---|---|\n| Age | Adults (median ~65) | Children + young adults (peak 2–5 y) |\n| Blasts | Myeloblasts ± **Auer rods** | Lymphoblasts |\n| Organomegaly / LN | Less prominent | Prominent; often mediastinal mass (T-ALL), CNS involvement |\n| APL (AML-M3) | t(15;17) — DIC risk, **ATRA emergency** | n/a |\n| Treatment | Induction (7+3), consolidation, allo-SCT for high-risk | Multi-phase chemo + CNS prophylaxis, TKI if Ph+, allo-SCT |\n\n> [!danger] Suspected **acute promyelocytic leukaemia (APL)** — any acute leukaemia with DIC (↓plt, ↓fib, ↑D-dimer, bleeding) = give **ATRA immediately** on suspicion; APL is highly curable but bleeds fatally without early ATRA.\n\n### Chronic leukaemias\n\n**CML — chronic myeloid leukaemia**\n\n- Often incidental: leukocytosis (often >50 × 10⁹/L) with full spectrum of myeloid precursors (myelocytes, metamyelocytes), **basophilia**, splenomegaly\n- **Philadelphia chromosome t(9;22) → BCR-ABL1** fusion\n- **TKIs:** imatinib, dasatinib, nilotinib — excellent prognosis in chronic phase\n- Three phases: chronic → accelerated → blast crisis (AML- or ALL-like); progression becomes acute leukaemia\n- Monitor with quantitative BCR-ABL PCR\n\n**CLL — chronic lymphocytic leukaemia**\n\n- Elderly (median >70), often picked up on routine FBC: isolated lymphocytosis ≥5 × 10⁹/L with small mature lymphocytes, **smear / smudge cells** on film\n- Diagnosis: flow cytometry (CD5⁺, CD19⁺, CD23⁺ B-cells)\n- **Rai / Binet staging**\n- **Early-stage disease is watched**, not treated. Treat when: advanced stage, cytopenias, bulky symptomatic lymphadenopathy, systemic symptoms, rapid lymphocyte doubling\n- Treatments: BTK inhibitors (ibrutinib, acalabrutinib), venetoclax + obinutuzumab, FCR in younger fit\n- Complications: hypogammaglobulinaemia + infection, AIHA, ITP, Richter transformation (aggressive DLBCL)\n\n### Neutropenic fever\n\n- **ANC <0.5 × 10⁹/L + temp ≥38.3 °C** (or >38.0 sustained)\n- **Empirical broad-spectrum antibiotics within 1 hour** (e.g. piperacillin-tazobactam or cefepime; add vancomycin if line / severe mucositis / MRSA risk)\n- Full septic workup, blood cultures from each lumen + peripheral, CXR, urine, stool, skin\n- G-CSF not routinely indicated for uncomplicated NF but may be used for severe or prolonged neutropenia\n\n### When to refer urgently\n\n- Pancytopenia, blasts on film, Auer rods\n- Any suspicion of APL (DIC picture + leukaemia) — ED / haematology same day, start ATRA\n- Neutropenic fever — ED\n- New lymphocytosis with smear cells — outpatient haematology\n- CML features — outpatient haematology (start TKI)\n"

          "title": "Lymphoma — Hodgkin, NHL, Lymphadenopathy",
          "markdown": "### Recognition — who gets worked up?\n\n- **Persistent lymphadenopathy** — any LN >2 cm, present >4–6 weeks, hard or rubbery, fixed, or in supraclavicular fossa\n- **B symptoms** — fever (>38 °C without infection), drenching **night sweats**, unexplained **weight loss** (>10% in 6 months)\n- **Mediastinal mass** on CXR — SVC obstruction, airway compromise\n- **Unexplained pruritus, alcohol-induced LN pain** (Hodgkin classic)\n- **Hepatosplenomegaly**, extranodal mass (gut, bone, skin)\n\n> [!tip] Supraclavicular lymphadenopathy is pathological until proven otherwise. Axillary / inguinal small soft mobile nodes are often reactive; persistent or enlarging ones need investigating.\n\n### Initial tests\n\n- FBC + film, U&E, LFT, **LDH** (prognostic), **β2-microglobulin**, urate (tumour lysis risk), ESR\n- HIV, HBV, HCV serology (pre-treatment, risk stratification)\n- CXR → CT neck/chest/abdo/pelvis; **PET-CT** for staging\n- **Excisional node biopsy** (not FNA — architecture needed)\n\n### Hodgkin lymphoma (HL)\n\n- Bimodal age distribution (20s and >55)\n- Contiguous nodal spread (cervical → mediastinal → abdominal)\n- **Reed-Sternberg cells** (classic HL, CD30⁺ CD15⁺)\n- Generally **very responsive to treatment** — cure rates ~80%\n- Ann Arbor staging with A/B modifier (B = B symptoms present)\n- Treatment: ABVD chemo ± radiotherapy; brentuximab vedotin / nivolumab in relapsed\n\n### Non-Hodgkin lymphoma (NHL)\n\nBroad group; broadly split by pace:\n\n**Aggressive (high-grade) NHL** — weeks to months course, treatable with curative intent:\n\n- **Diffuse large B-cell lymphoma (DLBCL)** — most common adult NHL. R-CHOP chemo, ~60–70% cure.\n- **Burkitt lymphoma** — t(8;14) MYC, doubling time days. Emergency: tumour lysis syndrome.\n- Primary CNS lymphoma, mantle cell (heterogeneous), peripheral T-cell lymphomas.\n\n**Indolent (low-grade) NHL** — years course, treatable but not curable with chemo:\n\n- **Follicular lymphoma** — t(14;18) BCL2. Watch and wait if asymptomatic low burden; R-CHOP / R-bendamustine if treatment indicated.\n- **Marginal zone lymphoma** — gastric MALT (H. pylori eradication may cure), splenic, nodal.\n- Small lymphocytic lymphoma (SLL — tissue equivalent of CLL).\n\n### Lymphadenopathy GP decision path\n\n1. **Tender, <2 cm, recent URTI** — observe 4–6 weeks, re-examine\n2. **>2 cm or persistent >6 weeks** — investigate: FBC, film, LDH, monospot, HIV, CXR\n3. **Supraclavicular, fixed, hard, >2 cm, B-symptoms, HSM** — urgent haematology / oncology referral for excisional biopsy\n\n### When to refer urgently\n\n- Any supraclavicular node, rapidly enlarging node, or persistent >2 cm node\n- B symptoms + unexplained LN\n- Mediastinal mass on CXR (especially with SVC symptoms)\n- Suspected Burkitt's (urgent — tumour lysis risk)\n"

          "title": "Multiple Myeloma & Monoclonal Gammopathies",
          "markdown": "Plasma cell malignancy producing monoclonal paraprotein. Typical age 60–70. Often presents via bone pain, anaemia, renal failure, or hypercalcaemia.\n\n### CRAB features — diagnostic end-organ damage\n\n| Feature | Detail |\n|---|---|\n| **C**alcium ↑ | Corrected Ca >2.75 mmol/L, or symptomatic hypercalcaemia |\n| **R**enal impairment | Cr >177 µmol/L or CrCl <40 — cast nephropathy (light chain casts) |\n| **A**naemia | Hb <100, or >20 g/L below normal |\n| **B**one lesions | Lytic lesions on skeletal survey / whole-body MRI / low-dose CT — skull, spine, ribs, pelvis |\n\n### The monoclonal gammopathy spectrum\n\n| Condition | Paraprotein | BM plasma cells | End-organ damage |\n|---|---|---|---|\n| **MGUS** (monoclonal gammopathy of undetermined significance) | <30 g/L | <10% | None |\n| **Smouldering myeloma** | ≥30 g/L | 10–60% | None |\n| **Myeloma** | any | >10% (usually) | **CRAB** or high-risk biomarkers (≥60% BM plasma cells, FLC ratio ≥100, >1 MRI lesion) |\n| **Plasmacytoma** | often none | Solitary mass | Local |\n\n### Workup in primary care\n\n- **Serum protein electrophoresis (SPEP)** + **immunofixation** — identifies paraprotein and class (IgG 55%, IgA 20%, light chain only 15%)\n- **Serum free light chains (sFLC)** + **κ:λ ratio** (abnormal in most myelomas, including light-chain only)\n- **Urine** — Bence Jones protein (urine immunofixation) — light chains\n- **Β2-microglobulin, albumin** — ISS staging\n- **FBC, U&E, corrected Ca, LFT, LDH, urate**\n- **Imaging** — low-dose whole-body CT or MRI (skeletal survey with plain films is obsolete)\n- **Refer** for bone marrow biopsy if sFLC abnormal or paraprotein present with any CRAB feature\n\n### Red flags to refer\n\n- Back pain + anaemia + elevated ESR + raised globulin in an older adult\n- Unexplained renal failure with bland sediment in an older adult (light chains)\n- Pathological fracture\n- Hypercalcaemia without obvious cause\n- Recurrent bacterial infections (hypogammaglobulinaemia)\n\n### Emergencies\n\n- **Hypercalcaemia** — IV fluids + bisphosphonate (zoledronate); calcitonin if severe\n- **Spinal cord compression** — MRI whole spine, urgent neurosurgery / oncology, high-dose dexamethasone, RT\n- **Hyperviscosity syndrome** (rare; IgM myeloma / Waldenström) — plasmapheresis\n\n### Treatment overview (specialist-led)\n\n- Proteasome inhibitors (bortezomib, carfilzomib)\n- Immunomodulators (lenalidomide, pomalidomide)\n- Anti-CD38 antibodies (daratumumab)\n- Steroids (dexamethasone)\n- Autologous stem cell transplant in transplant-eligible\n"

          "slug": "thrombocytopenia",
          "title": "Thrombocytopenia — ITP, TTP, HIT, DIC",
          "markdown": "> [!tip] Always look at the **blood film**: schistocytes (MAHA), dysplastic cells, platelet clumping (EDTA artefact — repeat in citrate).\n\n### Safe platelet thresholds\n\n| Clinical context | Target |\n|---|---|\n| No bleeding, stable | No threshold (observe if >50) |\n| Prophylactic transfusion | <10 × 10⁹/L |\n| Minor procedure / LP | >50 |\n| Major surgery, neurosurgery, active bleeding | >50–100 |\n| Active major bleeding | Transfuse to halt bleed |\n\n### Causes — three-bucket framework\n\n| Mechanism | Examples |\n|---|---|\n| **↓ Production** | Marrow infiltration (leukaemia, myeloma, metastatic), aplastic anaemia, MDS, B12/folate deficiency, viral suppression, chemo |\n| **↑ Destruction / consumption** | **ITP**, **TTP**, **HIT**, **DIC**, HELLP, mechanical (valve), antiphospholipid |\n| **Sequestration** | Splenomegaly (portal HTN, lymphoma, infection) |\n| **Dilution** | Massive transfusion |\n\n### ITP — immune thrombocytopenia\n\n- Diagnosis of exclusion: isolated thrombocytopenia, normal film (except large platelets), no other cytopenias, no splenomegaly, no drug/infection trigger\n- **Workup:** FBC + film, HIV, HCV, HBV, H. pylori, ANA, TFT, quantitative Ig, DAT\n- **Treat** if plt <30 × 10⁹/L or bleeding: prednisolone 1 mg/kg OD (or dexamethasone 40 mg OD × 4/7), IVIG 1 g/kg for faster response / bleeding\n- Second-line: rituximab, thrombopoietin receptor agonists (eltrombopag, romiplostim), splenectomy\n- Pregnancy: steroids / IVIG; avoid splenectomy\n\n### TTP — thrombotic thrombocytopenic purpura\n\n> [!danger] TTP is a **haematological emergency.** Untreated mortality ~90%; early plasma exchange reduces to ~10%.\n\n**Classic pentad** (full pentad rare; first 3 are the triad):\n\n1. **Thrombocytopenia**\n2. **Microangiopathic haemolytic anaemia (MAHA)** — ↑LDH, ↑bili, ↓haptoglobin, **schistocytes** on film\n3. **Neurological symptoms** (often fluctuating)\n4. Renal impairment\n5. Fever\n\n- **ADAMTS13 activity <10%** is diagnostic but don't wait for it\n- **Treat:** urgent **plasma exchange** + steroids + caplacizumab; rituximab added in relapsed/refractory\n- **Avoid platelet transfusion** (fuels microthrombi) unless life-threatening bleed\n\n### HIT — heparin-induced thrombocytopenia\n\n- Platelet fall **>50% (or to <150)** starting **5–10 days after heparin exposure** (earlier if re-exposure), often with new thrombosis\n- **4Ts score** for clinical probability: **T**iming, **T**hrombocytopenia magnitude, **T**hrombosis, o**T**her causes (score ≥4 = intermediate/high; send anti-PF4/heparin antibodies, confirm with SRA)\n\nManagement:\n\n- **Stop ALL heparin** (including flushes)\n- Do **not** give warfarin alone — risk of venous limb gangrene\n- **Non-heparin anticoagulant:** argatroban, bivalirudin (hepatic clearance for argatroban); fondaparinux in stable patients; transition to DOAC once platelets recover\n- Patient must be flagged — avoid heparin for life\n\n### DIC — disseminated intravascular coagulation\n\n- Underlying trigger: sepsis, malignancy, obstetric (abruption, AFE), trauma, APL\n- **Consumptive picture:** ↓ plt, ↓ fibrinogen, ↑ PT / aPTT / INR, ↑↑ **D-dimer**, schistocytes, bleeding AND clotting\n- **Treat the cause.** Supportive products: FFP, cryoprecipitate (fib <1.5), platelets, RBC. LMWH only if predominantly thrombotic phenotype and not bleeding.\n\n### Drug-induced\n\nCommon culprits: heparin (HIT), quinine / quinidine, sulphonamides, vancomycin, linezolid, rifampicin, ibuprofen, valproate, chemotherapy. Stop the drug; platelets typically recover in 1–2 weeks.\n\n### Pseudothrombocytopenia\n\nEDTA-induced platelet clumping. Repeat FBC in **citrate or heparin tube** and examine film.\n\n### When to refer urgently\n\n- Any suspicion of **TTP** (MAHA + thrombocytopenia) — ED same day\n- Any suspicion of **HIT** with thrombosis — haematology / vascular same day\n- DIC — treat underlying cause, haematology input\n- ITP with bleeding, plt <30, or refractory to steroids — haematology\n"

          "slug": "coagulation",
          "title": "Coagulation — Haemophilia, vWD, DIC, PT/aPTT",
          "markdown": "### Interpreting PT / INR and aPTT\n\n| PT / INR ↑ | aPTT ↑ | Likely |\n|---|---|---|\n| ↑ | Normal | Warfarin, early liver disease, vit K deficiency, factor VII deficiency |\n| Normal | ↑ | Heparin, lupus anticoagulant, factor VIII/IX/XI deficiency (haemophilia) |\n| ↑ | ↑ | DIC, liver failure, DOAC, vitamin K deficiency (late), common pathway deficiency |\n\n**Mixing study** (1:1 with normal plasma) corrects factor deficiencies but **not inhibitors** (lupus anticoagulant, factor VIII inhibitor).\n\n### Haemophilia A (factor VIII) and B (factor IX)\n\n- X-linked recessive; A far more common\n- Clinical severity tracks factor activity: severe (<1%), moderate (1–5%), mild (5–40%)\n- **aPTT ↑, PT normal, platelets normal**\n- Haemarthroses, muscle bleeds, prolonged bleeding after procedures\n- **Management:** factor replacement (recombinant FVIII / FIX), emicizumab (bispecific Ab, subcut prophylaxis), DDAVP for mild haemophilia A. Avoid IM injections and NSAIDs.\n\n### von Willebrand disease (vWD)\n\n- Most common inherited bleeding disorder (~1% prevalence); most mild\n- Mucocutaneous bleeding: epistaxis, menorrhagia, easy bruising, post-procedure bleeding\n- **aPTT usually normal or mildly ↑**; screening tests: vWF antigen, ristocetin cofactor activity, FVIII\n- Three broad types: **1** (partial quantitative — most common), **2** (qualitative), **3** (severe, near-absent vWF)\n- **Treatment:** DDAVP 0.3 µg/kg IV (works in type 1 and most type 2); vWF concentrate for type 3 or major bleeding / surgery; tranexamic acid for menorrhagia / dental work\n\n### VTE basics (deep detail in anticoagulation entries)\n\n- **Well's scores** for DVT and PE stratify pretest probability\n- D-dimer useful only if pretest probability is low/moderate — high NPV, poor specificity\n- Confirm DVT with venous Doppler; PE with CTPA (V/Q if contrast contraindication)\n- Treat per [[#anticoagulation-by-indication]]; reversal per [[#anticoagulation-agents-dosing-reversal]]\n\n### DIC\n\nSee [[#thrombocytopenia]] (same framework — consumptive, schistocytes, ↑PT/aPTT, ↑D-dimer, ↓plt, ↓fib). Treat the trigger; supportive blood products.\n\n### Peri-procedure management\n\n**Warfarin** — hold 5 days before surgery, bridge with LMWH only if high thrombotic risk (mechanical mitral valve, recent VTE, CHA₂DS₂-VASc ≥6).\n\n**DOACs** — hold 24–48 h (low-bleed procedures) or 48–96 h (high-bleed), longer if renal impairment:\n\n| Drug | CrCl ≥50 | CrCl 30–49 | CrCl 15–29 |\n|---|---|---|---|\n| Apixaban / Rivaroxaban | 24 h / 48 h | 24 h / 48 h | 36 h / 48 h |\n| Dabigatran | 24 h / 48 h | 36 h / 72 h | 48 h / 96 h |\n\n(Low-bleed / high-bleed procedures.)\n\n**Antiplatelets** — aspirin continued for most surgery; clopidogrel held 5 days for high-bleed procedures unless DES <12 months (then balance with cardiology).\n\n### Reversal quick-reference\n\n| Agent | Reversal |\n|---|---|\n| Warfarin | Vit K 5–10 mg IV + PCC (beriplex) 25–50 IU/kg for life-threatening bleed; FFP only if PCC unavailable |\n| Heparin (unfractionated) | Protamine 1 mg per 100 IU heparin (max 50 mg) |\n| LMWH | Protamine partially effective (~60%) |\n| Dabigatran | **Idarucizumab** 5 g IV |\n| Apixaban / Rivaroxaban | **Andexanet alfa** (if available) or PCC 50 IU/kg |\n| Antiplatelets | Platelet transfusion (limited evidence) + DDAVP |\n\nFull details: [[#anticoagulation-agents-dosing-reversal]]\n\n### When to refer\n\n- Unexplained bleeding history (consider vWD, mild haemophilia A, platelet function disorder)\n- Any severe bleeding phenotype in a young adult / child\n- Recurrent VTE despite adequate anticoagulation (thrombophilia screen)\n- Pregnancy with known bleeding disorder or on anticoagulation\n"

          "title": "Sepsis & Septic Shock — Sepsis-3, Resuscitation & Antibiotics",
          "markdown": "### Definitions (Sepsis-3, 2016)\n\n| Term | Definition |\n|---|---|\n| **Sepsis** | Life-threatening organ dysfunction caused by dysregulated host response to infection. SOFA score ↑≥2 from baseline. |\n| **Septic shock** | Sepsis + vasopressor requirement to maintain MAP ≥65 mmHg + serum lactate >2 mmol/L despite adequate fluid resuscitation |\n\n**qSOFA** *(quick screening tool — score ≥2 = high risk, consider ICU)*\n- RR ≥22/min (1 pt)\n- Altered mentation (1 pt)\n- SBP ≤100 mmHg (1 pt)\n\n> [!note] qSOFA is a screening tool, not a diagnostic one. SOFA score defines sepsis. Do not use qSOFA alone to rule out sepsis.\n\n---\n\n### SOFA Score (Organ Dysfunction)\n\n| System | 0 | 1 | 2 | 3 | 4 |\n|---|---|---|---|---|---|\n| Respiratory (PaO₂/FiO₂) | ≥400 | <400 | <300 | <200 (ventilated) | <100 (ventilated) |\n| Coagulation (platelets ×10⁹/L) | ≥150 | <150 | <100 | <50 | <20 |\n| Liver (bilirubin μmol/L) | <20 | 20–32 | 33–101 | 102–204 | >204 |\n| CVS (MAP / vasopressors) | MAP ≥70 | MAP <70 | Dopamine ≤5 or dobutamine | Dop >5 or adrenaline ≤0.1 or norad ≤0.1 | Dop >15 or adrenaline >0.1 or norad >0.1 |\n| CNS (GCS) | 15 | 13–14 | 10–12 | 6–9 | <6 |\n| Renal (Cr μmol/L or UO) | <110 | 110–170 | 171–299 | 300–440 or UO <500 mL/d | >440 or UO <200 mL/d |\n\n---\n\n### Hour-1 Bundle (Surviving Sepsis Campaign)\n\n> [!danger] Do all within 1 hour of recognition\n\n1. **Measure lactate** — if >2 mmol/L, repeat at 2h. Target clearance ≥10% per 2h.\n2. **Blood cultures ×2** (different sites) — before antibiotics if possible; do not delay antibiotics >45 min\n3. **Broad-spectrum antibiotics** — give within 1 hour of recognition\n4. **IV crystalloid 30 mL/kg** — if hypotension or lactate ≥4 mmol/L. Give within 3h. Reassess after each bolus.\n5. **Vasopressors** — if MAP <65 after fluid resuscitation. **Noradrenaline first-line.**\n\n---\n\n### Empirical Antibiotics (SG context)\n\n> [!warning] Always check local antibiogram. NHG/NUHS/SingHealth institutions have different resistance patterns. Adjust based on cultures.\n\n| Source | Empirical Choice | Notes |\n|---|---|---|\n| **Community pneumonia (severe)** | Ceftriaxone 2g IV OD + azithromycin 500 mg IV OD | Add oseltamivir in flu season |\n| **Urosepsis** | Ceftriaxone 2g IV OD | High ESBL prevalence in SG — escalate to ertapenem if risk factors (prior UTI, recent antibiotics, healthcare-associated) |\n| **Abdominal/biliary sepsis** | Piperacillin-tazobactam 4.5g IV q6–8h | Cover gram-negatives + anaerobes |\n| **Skin/soft tissue (non-severe)** | Cloxacillin 2g IV q6h | MRSA risk: vancomycin (15–20 mg/kg IV q8–12h, target trough 15–20 or AUC-guided) |\n| **Unknown source (community)** | Ceftriaxone 2g IV OD ± metronidazole | Broad cover |\n| **Unknown source (hospital/ICU)** | Piperacillin-tazobactam 4.5g IV q6–8h | Pseudomonas/ESBL coverage; consider carbapenems if high-risk |\n| **Neutropenic fever** | Piperacillin-tazobactam 4.5g IV q6–8h | Escalate to meropenem if unstable or prior ESBL |\n| **Meningitis (community)** | Ceftriaxone 2g IV q12h + dexamethasone 10 mg IV q6h × 4 days | Add ampicillin 2g IV q4h if Listeria risk (elderly, immunocompromised, pregnant) |\n\n**Typical ESBL risk factors in SG:** recent antibiotics within 3 months, hospitalisation within 90 days, catheter, travel to endemic region, recurrent UTI, prior ESBL organism\n\n**De-escalation:** review at 48–72h with culture results. Narrow spectrum as soon as possible. Target 5–7 days most infections (7–10 days bacteraemia).\n\n---\n\n### Fluid Resuscitation\n\n- **Initial:** 30 mL/kg crystalloid (0.9% NaCl or Hartmann's/PlasmaLyte) over 3h if hypotension/lactate ≥4\n- **Reassess** after each 500 mL bolus using dynamic fluid responsiveness:\n  - Passive leg raise (PLR): raise legs 45° × 1 min → if CO ↑≥10% → fluid responsive\n  - Pulse pressure variation (PPV) >13% in mechanically ventilated patients = fluid responsive\n- **Avoid fluid overload** — associated with worse outcomes. Once resuscitated → restrict further fluids.\n- Balanced crystalloids (Hartmann's/PlasmaLyte) preferred over 0.9% NaCl (less hyperchloraemic acidosis)\n- Albumin 4%: consider if requiring large volumes (>3L) — ALBIOS trial\n\n### Vasopressors\n- **Noradrenaline:** first-line. Target MAP ≥65 mmHg.\n- **Vasopressin 0.03 units/min:** add-on if noradrenaline >0.25–0.5 mcg/kg/min (spares noradrenaline, reduces dose)\n- **Adrenaline:** second-line, or if myocardial depression\n- **Dobutamine:** add if low CO/cardiac dysfunction + evidence of hypoperfusion despite adequate MAP\n\n### Steroids\n- **Hydrocortisone 200 mg/day** IV (50 mg q6h or 200 mg infusion) if septic shock not responding to vasopressors after adequate resuscitation (ADRENAL/APROCCHSS trials)\n- Do NOT use for sepsis without shock\n\n---"

          "markdown": "### Community-Acquired Pneumonia (CAP)\n\n**Severity assessment — CURB-65:**\n\n| Criterion | Score |\n|---|---|\n| **C**onfusion | 1 |\n| **U**rea >7 mmol/L | 1 |\n| **R**espiratory rate ≥30 | 1 |\n| **B**P <90 systolic or ≤60 diastolic | 1 |\n| **65** years or older | 1 |\n\n| Score | Severity | Setting | 30-day mortality |\n|---|---|---|---|\n| 0–1 | Low | Outpatient | <3% |\n| 2 | Moderate | Consider admit | 9% |\n| 3–5 | Severe | Admit ± ICU | 15–40% |\n\n**Treatment:**\n\n| Setting | Choice |\n|---|---|\n| Outpatient, low risk | Amoxicillin 1g TDS × 5–7 days OR doxycycline 100 mg BD × 5 days |\n| Outpatient, atypical features | Amoxicillin + azithromycin OR doxycycline alone (covers atypicals) |\n| Hospitalised, non-ICU | Ceftriaxone 2g IV OD + azithromycin 500 mg IV/oral OD |\n| ICU/severe | Piperacillin-tazobactam 4.5g IV q6h + azithromycin ± add oseltamivir if influenza |\n| Legionella/atypical suspected | Fluoroquinolone (levofloxacin 750 mg OD) monotherapy |\n\n> [!note] **Influenza:** rapid antigen test; oseltamivir 75 mg BD × 5 days within 48h of symptom onset. Higher dose + longer duration in severe/immunocompromised.\n\n---\n\n### Urinary Tract Infections\n\n**Uncomplicated UTI (non-pregnant women, no structural abnormality):**\n- Nitrofurantoin 100 mg MR BD × 5 days *(first-line in SG — check eGFR; avoid if <30)*\n- Trimethoprim 200 mg BD × 7 days (check local resistance — increasing E.coli resistance in SG)\n- Co-trimoxazole (trimethoprim-sulfamethoxazole) — check resistance\n- Cefalexin 500 mg QID × 5–7 days (if above unsuitable)\n\n**Complicated UTI / pyelonephritis (outpatient):**\n- Cefalexin 500 mg QID × 7–14 days OR co-amoxiclav 625 mg TDS × 7–14 days\n- If ESBL risk: ertapenem 1g IV OD or fosfomycin 3g sachet × 3 doses every 48h\n\n**Urosepsis (hospitalised):**\n- Ceftriaxone 2g IV OD (if low ESBL risk)\n- Ertapenem 1g IV OD or meropenem 1g IV q8h (if ESBL risk — SG rates significant)\n- **ESBL risk factors:** prior ESBL UTI, healthcare-associated, recent antibiotics, catheter, elderly in nursing home, travel to high-endemic region\n\n> [!warning] SG: E.coli ESBL prevalence ~30–40% in hospitalised patients. Low threshold to use carbapenem empirically if high-risk.\n\n**Catheter-associated UTI:** treat only if symptomatic (do not treat asymptomatic bacteriuria)\n\n**Asymptomatic bacteriuria:** treat only in pregnancy and pre-urological procedures\n\n---\n\n### Cellulitis and Skin/Soft Tissue Infections (SSTI)\n\n**Classification:**\n- Non-purulent (erythema without abscess/purulence): streptococcal most likely\n- Purulent (abscess, furuncle, carbuncle): Staphylococcal (MRSA vs MSSA)\n\n**Non-purulent cellulitis:**\n- Outpatient (mild): cefalexin 500 mg QID × 5–7 days OR cloxacillin 500 mg QID × 5 days\n- Inpatient (moderate): cloxacillin 2g IV q6h OR cefazolin 1g IV q8h\n- MRSA risk: vancomycin 15 mg/kg IV q12h (target trough 15–20 mg/L or AUC-guided)\n\n**Purulent/MRSA risk factors in SG:** prior MRSA, healthcare-associated, dialysis, injection drug use, recurrent SSTI, close contact with MRSA carrier\n- Oral MRSA: trimethoprim-sulfamethoxazole 2 tabs BD OR doxycycline 100 mg BD\n- IV: vancomycin\n\n**Necrotising fasciitis:**\n- Surgical emergency — immediate debridement\n- Antibiotics: piperacillin-tazobactam + clindamycin (anti-toxin effect) + vancomycin (MRSA cover)\n- \"Hard signs\": pain out of proportion, rapidly spreading erythema, crepitus, grey skin, skin necrosis, haemodynamic instability\n- LRINEC score: laboratory risk indicator (CRP, WBC, Hb, Na, Cr, glucose)\n\n---\n\n### Dengue *(Singapore — endemic)*\n\n> [!warning] Dengue is always on the differential for fever in Singapore. Report all confirmed cases to MOH (notifiable disease).\n\n**Phases:**\n- **Febrile phase (day 1–3):** high fever, headache, retro-orbital pain, myalgia, arthralgia, facial flushing, early rash\n- **Critical phase (day 4–6):** fever defervescence, plasma leakage (↑haematocrit, pleural effusion, ascites), risk of shock (dengue shock syndrome)\n- **Recovery phase (day 7+):** reabsorption of leaked fluid, bradycardia, rash, risk of fluid overload\n\n**Warning signs (require close monitoring):**\nAbdominal pain/tenderness | Persistent vomiting | Clinical fluid accumulation | Mucosal bleed | Lethargy | Liver >2 cm | Rising haematocrit + rapid platelet drop\n\n**Investigations:** FBC (haematocrit, platelet trend), dengue NS1 antigen (day 1–5), dengue IgM/IgG (day 4+), LFTs\n\n**Management:**\n- No specific antiviral\n- **Oral hydration** if can tolerate: water/ORS/juice ≥2L/day\n- **IV fluids** if cannot tolerate oral, warning signs, or haemoconcentration: Hartmann's/PlasmaLyte 5–10 mL/kg/hr, titrate\n- **Paracetamol** (NOT NSAIDs or aspirin — ↑bleeding risk)\n- Blood transfusion if severe bleeding\n- **Avoid unnecessary IV fluids in recovery phase** (risk of fluid overload as plasma reabsorbs)\n\n**Platelet transfusion:** only if <20 × 10⁹ + spontaneous significant bleeding (not prophylactic)\n\n---"

          "markdown": "> [!note] Based on MOH Antimicrobial Stewardship Programme (ASP) / NHG Antimicrobial Guidelines / SAC (Singapore Antibiotic Consumption) data. Always check local institutional antibiogram. De-escalate at 48–72h based on cultures.\n\n---\n\n### SG Resistance Landscape (Key Points)\n\n| Organism | Key Resistance | Clinical Implication |\n|---|---|---|\n| E. coli | ESBL ~30–40% (hospital), ~15–20% community | UTI/urosepsis: carbapenem if ESBL risk |\n| Klebsiella pneumoniae | ESBL ~20–30%; CRE emerging | Carbapenem for ESBL; colistin/ceftazidime-avibactam for CRE |\n| Pseudomonas aeruginosa | Intrinsic resistance to many; MDR increasing | Anti-pseudomonal β-lactam (pip-tazo, ceftazidime, meropenem) |\n| Staphylococcus aureus | MRSA ~20–30% (hospital); ~5–10% community | Cloxacillin MSSA; vancomycin MRSA |\n| Streptococcus pneumoniae | Penicillin resistance ~10–15% SG | High-dose amoxicillin or cephalosporin |\n| Enterococcus | VRE emerging | Vancomycin-sensitive: ampicillin/vancomycin. VRE: linezolid/daptomycin |\n\n---\n\n### By Organism Type\n\n#### Gram-Positive Coverage\n\n| Organism | First-Line | Alternative | Resistant/Severe |\n|---|---|---|---|\n| **Staph aureus (MSSA)** | Cloxacillin 2g IV q4–6h | Cefazolin 1–2g IV q8h | — |\n| **Staph aureus (MRSA)** | Vancomycin 15–20 mg/kg IV q8–12h (AUC-guided) | Teicoplanin 6 mg/kg IV BD ×3 doses → OD | Linezolid 600 mg BD; daptomycin 6–10 mg/kg OD (not lungs) |\n| **Streptococcus pyogenes** | Benzylpenicillin 1.2g IV q4h | Amoxicillin 1g IV/oral | Clindamycin (toxin suppression in severe) |\n| **Strep pneumoniae** | Benzylpenicillin (if sensitive) | Amoxicillin 1–3g q8h | Ceftriaxone 2g IV OD; moxifloxacin |\n| **Enterococcus (non-VRE)** | Ampicillin 2g IV q6h | Vancomycin | Linezolid; daptomycin |\n| **VRE** | Linezolid 600 mg BD | Daptomycin 6 mg/kg IV OD | — |\n| **C. difficile (mild)** | Fidaxomicin 200 mg BD × 10d (preferred) | Metronidazole 400 mg TDS × 10d (mild only) | Vancomycin 125 mg QID × 10d (moderate-severe) |\n| **C. difficile (severe)** | Vancomycin 125–500 mg QID | ± fidaxomicin | Bezlotoxumab for recurrence prevention |\n\n#### Gram-Negative Coverage\n\n| Organism | First-Line | ESBL/Resistant |\n|---|---|---|\n| **E. coli (sensitive)** | Ceftriaxone 1–2g IV OD | — |\n| **E. coli (ESBL)** | Ertapenem 1g IV OD | Meropenem 1g IV q8h (if unstable) |\n| **Klebsiella (sensitive)** | Ceftriaxone 1–2g IV OD | — |\n| **Klebsiella (ESBL)** | Ertapenem 1g IV OD | Meropenem 1g IV q8h |\n| **CRE (carbapenem-resistant)** | Ceftazidime-avibactam 2.5g IV q8h | Colistin (last resort); ID consult |\n| **Pseudomonas aeruginosa** | Piperacillin-tazobactam 4.5g IV q6h | Ceftazidime 2g IV q8h; cefepime 2g IV q8h; meropenem 1–2g IV q8h |\n| **MDR Pseudomonas** | Ceftolozane-tazobactam 1.5g IV q8h | Colistin; ID consult |\n| **Haemophilus influenzae** | Amoxicillin-clavulanate 1.2g IV q8h | Ceftriaxone if β-lactamase positive |\n| **Neisseria gonorrhoeae** | Ceftriaxone 500 mg IM single dose | Azithromycin 1g if cephalosporin CI |\n| **Neisseria meningitidis** | Benzylpenicillin 2.4g IV q4h (if sensitive) | Ceftriaxone 2g IV q12h |\n\n#### Anaerobic Coverage\n\n| Organism | Agent |\n|---|---|\n| **Bacteroides fragilis (GI anaerobe)** | Metronidazole 500 mg IV/oral q8h; pip-tazo; carbapenems |\n| **Clostridium (non-difficile)** | Benzylpenicillin; metronidazole |\n| **Oral anaerobes** | Amoxicillin-clavulanate; metronidazole |\n\n#### Atypical / Intracellular\n\n| Organism | Treatment |\n|---|---|\n| **Mycoplasma pneumoniae** | Doxycycline 100 mg BD or azithromycin 500 mg OD × 5d |\n| **Chlamydophila pneumoniae** | Doxycycline 100 mg BD × 10–14d |\n| **Legionella pneumophila** | Levofloxacin 750 mg OD × 5d (preferred) or azithromycin 500 mg OD |\n| **Burkholderia pseudomallei (Melioidosis)** | **Intensive:** ceftazidime 2g IV q6h × ≥10–14d or meropenem 1g IV q8h. **Eradication:** TMP-SMX × 3–6 months. SG/SEA endemic. |\n\n---\n\n### By Infection Site\n\n#### Respiratory\n\n| Infection | Outpatient | Inpatient (non-ICU) | ICU / Severe |\n|---|---|---|---|\n| **CAP (typical)** | Amoxicillin 1g TDS × 5–7d | Ceftriaxone 2g IV OD | Piperacillin-tazobactam 4.5g IV q6h |\n| **CAP (atypical cover needed)** | Doxycycline 100 mg BD × 5–7d | + Azithromycin 500 mg IV/oral OD | Levofloxacin 750 mg OD monotherapy |\n| **HAP (hospital-acquired)** | — | Piperacillin-tazobactam 4.5g IV q6h | ± Vancomycin (MRSA risk) |\n| **VAP (ventilator-associated)** | — | — | Piperacillin-tazobactam + vancomycin (if MRSA risk) or cefepime + vancomycin |\n| **Aspiration pneumonia** | Amoxicillin-clavulanate 625 mg TDS | Ceftriaxone + metronidazole | Pip-tazo 4.5g IV q6h |\n| **Lung abscess** | Amoxicillin-clavulanate 625 mg TDS × 4–6 wks | Co-amoxiclav IV → oral step-down | Pip-tazo IV; drain if >3cm |\n| **Influenza** | Oseltamivir 75 mg BD × 5d (within 48h) | Same dose; longer if severe/immunocompromised | — |\n| **COVID-19 (high risk)** | Nirmatrelvir/ritonavir (Paxlovid) × 5d if within 5d symptoms | Remdesivir 200 mg IV D1 → 100 mg IV D2–5 | Dexamethasone 6 mg OD × 10d if requiring O₂ |\n\n#### Urinary Tract\n\n| Infection | First-Line (SG) | Alternative | ESBL-Risk |\n|---|---|---|---|\n| **Uncomplicated UTI (women)** | Nitrofurantoin 100 mg MR BD × 5d (eGFR >30) | Trimethoprim 200 mg BD × 7d | Fosfomycin 3g sachet × 1–3 doses |\n| **Uncomplicated UTI (men)** | Co-trimoxazole 960 mg BD × 7d | Ciprofloxacin 500 mg BD × 7d | Cefalexin 500 mg QID × 7d |\n| **Pyelonephritis (outpatient)** | Cefalexin 500 mg QID × 10–14d | Co-amoxiclav 625 mg TDS × 14d | Ertapenem 1g SC/IM OD × 7–14d |\n| **Urosepsis (inpatient)** | Ceftriaxone 2g IV OD | — | Ertapenem 1g IV OD; meropenem if unstable |\n| **CAUTI (catheter-associated)** | Treat only if symptomatic. Culture-guided. | Remove/change catheter. | — |\n| **Recurrent UTI prevention** | Trimethoprim 100 mg nocte | Nitrofurantoin 50 mg nocte | Fosfomycin 3g every 7–10d |\n| **STI — urethritis/cervicitis (chlamydia) n) |\n| **C. difficile colitis** | See gram-positive section above |\n\n#### CNS Infections\n\n| Infection | Treatment |\n|---|---|\n| **Bacterial meningitis (empirical)** | Ceftriaxone 2g IV q12h + dexamethasone 10 mg IV q6h × 4d ± ampicillin 2g IV q4h (Listeria risk) |\n| **Viral encephalitis (HSV)** | Aciclovir 10 mg/kg IV q8h × 14–21d |\n| **Cryptococcal meningitis (HIV)** | Amphotericin B liposomal 3–4 mg/kg IV OD + flucytosine 25 mg/kg QID × 2 weeks → fluconazole 400 mg OD × 8 wks → 200 mg OD maintenance |\n| **TB meningitis** | RHEZ × 2 months → RH × 10 months + dexamethasone |\n| **Brain abscess** | Ceftriaxone 2g IV q12h + metronidazole 500 mg IV q8h ± vancomycin (if MRSA). Neurosurgery drainage. |\n| **Shunt infection** | Vancomycin IV ± rifampicin; neurosurgery (shunt removal usually needed) |\n\n#### Bone & Joint\n\n| Infection | Treatment | Duration |\n|---|---|---|\n| **Septic arthritis** | Cloxacillin 2g IV q6h (MSSA); vancomycin (MRSA). Surgical washout. | 2–4 weeks total (step down to oral when improving) |\n| **Osteomyelitis (acute)** | Cloxacillin 2g IV q6h → oral cefalexin 1g QID | 4–6 weeks total |\n| **Osteomyelitis (chronic/diabetic foot)** | Culture-guided; often involves gram-negatives and anaerobes | ≥6 weeks; may need surgical debridement |\n| **Prosthetic joint infection** | Vancomycin IV + rifampicin 300 mg BD oral. Orthopaedic surgery. | 3 months (hip) or 6 months (knee) |\n\n---\n\n### Antibiotic Properties Quick Reference\n\n| Drug | Spectrum | Key Advantage | Key Caution |\n|---|---|---|---|\n| Amoxicillin | Gram+ (Strep, Enterococcus), some Gram− | Narrow, cheap, oral | Not anti-staphylococcal |\n| Amoxicillin-clavulanate | Broad (+ anaerobes, some ESBL) | Oral, convenient | GI SE; Clostridioides risk |\n| Cloxacillin | MSSA | Best for MSSA | Not MRSA; poor oral bioavailability |\n| Piperacillin-tazobactam | Broad (MSSA, GN, anaerobes, Pseudomonas) | Anti-pseudomonal; covers anaerobes | Not MRSA; not ESBL reliably |\n| Ceftriaxone |           "title": "Anaphylaxis — Recognition & Management",
          "markdown": "### Diagnostic Criteria *(any one of three)*\n1. Acute onset with skin/mucosa involvement + either respiratory compromise OR hypotension\n2. Two or more of: skin/mucosa, respiratory compromise, hypotension, persistent GI symptoms — after exposure to likely allergen\n3. Hypotension alone after exposure to a known allergen\n\n**Common triggers in SG:** shellfish/seafood (most common food allergen), peanuts, latex, NSAIDs, beta-lactam antibiotics, contrast media, insect stings, anaesthetic agents\n\n---\n\n### Management\n\n> [!danger] Adrenaline is the FIRST and MOST IMPORTANT treatment — give immediately\n\n**Step 1: Adrenaline (IM)**\n- **Adrenaline 1:1000 (1 mg/mL)** — dose 0.5 mg IM (0.5 mL) in **outer mid-thigh**\n- Repeat every 5 minutes if no improvement (most patients need only 1–2 doses)\n- IM preferred over SC (faster absorption, less variability)\n- IV adrenaline ONLY if cardiac arrest or extreme circulatory collapse (1:10,000 solution, 0.5–1 mL titrated; risk of VF if given too fast)\n\n> [!warning] No absolute contraindications to adrenaline in anaphylaxis. Do not withhold.\n\n**Step 2: Position**\n- Supine + legs elevated (↑venous return)\n- If pregnant: left lateral decubitus\n- If respiratory distress: semi-recumbent\n\n**Step 3: O₂**\n- High-flow O₂ 10–15 L/min via non-rebreather mask\n\n**Step 4: IV access + fluids**\n- 0.9% NaCl 500 mL–1 L IV rapidly if hypotensive\n\n**Step 5: Antihistamines (adjuncts — NOT primary treatment)**\n- Chlorphenamine 10 mg IV/IM slow (H1 antagonist) — treats urticaria/pruritus but does NOT treat systemic anaphylaxis\n- Ranitidine or famotidine (H2 antagonist) — optional\n\n**Step 6: Corticosteroids (adjuncts — NOT primary treatment)**\n- Hydrocortisone 200 mg IV or prednisolone 50 mg oral\n- Prevents biphasic anaphylaxis (second wave 4–8h later) — evidence limited but common practice\n\n**Step 7: Bronchospasm**\n- Salbutamol 5 mg nebulised if wheeze/bronchospasm\n- Magnesium sulphate 2g IV if refractory\n\n**Adrenaline infusion** (if refractory/recurrent): 0.1–0.5 mcg/kg/min IV, titrate to response\n\n---\n\n### Beta-blocker Complication\nPatients on beta-blockers may not respond to adrenaline:\n- Give **glucagon 1–2 mg IV** (bypasses beta receptor) + adrenaline\n- May need atropine for bradycardia\n\n---\n\n### Biphasic Anaphylaxis\n- Recurrence 4–8h (sometimes up to 72h) after apparent resolution\n- Observe all significant anaphylaxis ≥4–6h (some guidelines 24h)\n- Discharge with: **adrenaline auto-injector (EpiPen 0.3 mg or 0.15 mg for children)**, medical alert, allergy referral, education\n\n---"

          "markdown": "### Symptoms\n\n**Obstructive (voiding):** hesitancy, poor stream, straining, terminal dribbling, incomplete emptying\n**Irritative (storage):** frequency, urgency, nocturia, urge incontinence\n\n**IPSS score:** 0–7 mild | 8–19 moderate | 20–35 severe\n\n---\n\n### Assessment\n\n- **DRE (digital rectal exam):** assess prostate size, consistency, nodules (hard/irregular → suspect cancer)\n- **PSA:** offer to men with LUTS before treatment if diagnosis of prostate cancer would change management\n- **Urine dipstick + MSU:** exclude UTI, haematuria\n- **Bladder scan (post-void residual):** >150–200mL = significant retention\n- **Renal USS:** if suspected obstruction, elevated creatinine, hydronephrosis\n- **Flexible cystoscopy:** haematuria, suspected stricture or bladder pathology\n\n> [!warning] Haematuria (visible or non-visible) in any man with LUTS → urology referral to exclude bladder/renal cancer.\n\n---\n\n### Management\n\n**Lifestyle (mild, IPSS <8):**\n- Fluid restriction (especially evening), avoid caffeine/alcohol, bladder training, double voiding, treat constipation\n\n**Medical (moderate-severe, IPSS ≥8):**\n\n| Drug | Mechanism | Effect | Notes |\n|---|---|---|---|\n| **Alpha-blocker** (tamsulosin 0.4mg OD, alfuzosin 10mg OD) | Relax prostate/bladder neck smooth muscle | Rapid symptom relief (days) | SE: postural hypotension, retrograde ejaculation |\n| **5-alpha reductase inhibitor** (finasteride 5mg OD, dutasteride 0.5mg OD) | ↓ prostate volume (shrinks gland) | Slow onset (3–6 months) — best if prostate >30g | SE: ↓libido, ED, gynaecomastia. ↓PSA by 50% (adjust interpretation) |\n| **Combination** (alpha-blocker + 5ARI) | Both | Best for large prostate, high PSA | MTOPS trial |\n| **Anticholinergics** (oxybutynin, solifenacin) | Bladder muscle relaxation | If storage symptoms dominant | ⚠️ Avoid if post-void residual >150mL — precipitate retention |\n| **Mirabegron** (beta-3 agonist) | Bladder relaxation | Storage symptoms | Safer than anticholinergics in elderly |\n\n**Surgical (failed medical, retention, complications):**\n- TURP (transurethral resection of prostate) — gold standard\n- Laser prostatectomy (HoLEP), TUVP, Urolift (minimally invasive)\n- Urology referral\n\n---\n\n### Acute Urinary Retention\n\n> [!danger] Painful inability to void. Immediate catheterisation. Urgent urology if fails.\n\n- Catheterise (urethral catheter 14–16 Fr)\n- Measure and record drained volume (>800mL = chronic retention)\n- Identify precipitant: drugs (anticholinergics, TCAs, antihistamines), constipation, UTI, post-op, prostatic bleeding\n- Start alpha-blocker (tamsulosin) — aids trial without catheter (TWOC) at 48–72h\n- If TWOC fails or large residual → urology referral\n\n---"

          "markdown": "### Depression\n\n**PHQ-9 screening tool:** score 0–27\n- 0–4: none | 5–9: mild | 10–14: moderate | 15–19: moderately severe | ≥20: severe\n\n> [!note] Always ask about suicidal ideation. PHQ-9 question 9: \"Thoughts that you would be better off dead or of hurting yourself\"\n\n**Diagnosis (DSM-5):** ≥5 of 9 symptoms for ≥2 weeks, including depressed mood OR anhedonia\n\n**Management:**\n\n| Severity | Treatment |\n|---|---|\n| Mild | Psychoeducation, lifestyle (exercise), watchful waiting, consider counselling |\n| Moderate | Antidepressant + psychotherapy (CBT preferred) |\n| Severe | Antidepressant + refer psychiatry; consider urgent referral if suicidal |\n\n**First-line antidepressants (SSRIs):**\n\n| Drug | Starting Dose | Target Dose | Notes |\n|---|---|---|---|\n| Sertraline | 50 mg OD | 50–200 mg OD | Preferred: good tolerability, safe in CVD |\n| Escitalopram | 10 mg OD | 10–20 mg OD | Very clean side-effect profile |\n| Fluoxetine | 20 mg OD | 20–60 mg OD | Long half-life — useful if adherence concern; many drug interactions |\n\n- Start low, titrate after 2–4 weeks\n- **Trial period:** 6–8 weeks at therapeutic dose to assess response\n- **Duration:** at least 6 months after remission (first episode); 2+ years if recurrent\n\n> [!warning] SSRIs can worsen anxiety initially — warn patients; consider starting with half dose\n\n**Second-line:**\n- Venlafaxine (SNRI) 75–225 mg OD: especially if anxiety prominent; monitor BP\n- Mirtazapine 15–45 mg nocte: useful if poor sleep/appetite; less sexual SE; more sedating\n- Bupropion 150–300 mg OD: useful if sexual SE a concern, smoking cessation\n- Duloxetine 60–120 mg OD: if comorbid pain\n\n---\n\n### Anxiety Disorders (GAD, Panic Disorder, Social Anxiety)\n\n**GAD (Generalised Anxiety Disorder) — GAD-7 screening:**\n- Score ≥10 = moderate-severe anxiety; ≥15 = severe\n\n**Management:**\n- **CBT (cognitive behavioural therapy):** first-line for all anxiety disorders\n- **SSRIs:** sertraline or escitalopram first-line; same dosing as depression. Anxiety indication may need higher doses.\n- **SNRIs:** venlafaxine or duloxetine effective for GAD\n- **Buspirone:** 5–10 mg TDS (non-sedating, non-addictive; takes 2–4 weeks to work; GAD only)\n- **Benzodiazepines:** short-term only (≤4 weeks); risk of dependence; lorazepam 0.5–2 mg TDS\n  - Use for acute panic; avoid long-term. Taper slowly to avoid withdrawal.\n- **Beta-blockers:** propranolol 10–40 mg PRN for situational anxiety/performance anxiety (physical symptoms — tremor, palpitations)\n\n**Panic disorder:** SSRIs + CBT; avoid benzodiazepine dependence; address safety behaviours and avoidance\n\n---"

          "markdown": "### KDIGO Definition *(any one of)*\n- Cr rise ≥26.5 μmol/L within 48 hours\n- Cr rise ≥1.5× baseline within 7 days\n- UO <0.5 mL/kg/h for ≥6 hours\n\n### Staging\n\n| Stage | Creatinine | Urine Output |\n|---|---|---|\n| 1 | 1.5–1.9× baseline OR rise ≥26.5 μmol/L | <0.5 mL/kg/h × 6–12h |\n| 2 | 2.0–2.9× baseline | <0.5 mL/kg/h × ≥12h |\n| 3 | ≥3× baseline OR Cr ≥354 μmol/L OR RRT started | <0.3 mL/kg/h × ≥24h OR anuria ≥12h |\n\n> [!note] Stage by worst of Cr OR UO criteria. Unknown baseline: back-calculate from eGFR 75 mL/min/1.73m²\n\n---\n\n### Categories\n\n#### Prerenal\n- UNa <20, FeNa <1%, Uosm >500, U:P Cr >40\n- `FeNa = (UNa × PCr) / (PNa × UCr) × 100`\n- Causes: hypovolaemia, effective hypovolaemia (HF, cirrhosis, sepsis), NSAIDs (↓PGE₂ → afferent vasoconstriction), ACEi/ARB (↓efferent tone)\n\n> [!warning] FeNa unreliable on diuretics → use **FEUrea** instead (<35% = prerenal)\n\n#### Intrinsic Renal\n\n| Type | Key Finding | Causes | Treatment |\n|---|---|---|---|\n| **ATN** (most common) | Muddy brown granular casts; FeNa >2%, UNa >40 | Ischaemic (shocked), aminoglycosides, contrast, amphotericin, cisplatin, myoglobin | Supportive; remove nephrotoxins |\n| **GN** | RBC casts, haematuria, proteinuria, HTN | IgA (most common in SG), ANCA, anti-GBM, lupus, post-strep | Urgent nephrology referral; biopsy |\n| **AIN** | WBC casts; classic triad (fever/rash/eosinophilia) in only 10% | NSAIDs, PPIs, penicillins, sulfonamides, allopurinol | Stop drug; prednisolone 1 mg/kg/day if not improving |\n| **Vascular/TMA** | MAHA + thrombocytopenia ± fever/neuro | TTP (pentad), HUS (triad post-Shiga E. coli) | Haematology urgently |\n\n#### Postrenal\n- Bladder scan: residual >300 mL = significant\n- Renal USS: hydronephrosis\n- Causes: **BPH** (most common elderly males), pelvic malignancy, stones, neurogenic bladder\n- Management: catheterise; urology referral (stent/nephrostomy)\n- Post-obstructive diuresis: monitor volume and K⁺ carefully\n\n---\n\n### Emergency RRT Indications — AEIOU\n\n| Letter | Indication |\n|---|---|\n| **A** | Acidosis refractory (pH <7.1) |\n| **E** | Electrolytes (K⁺ >6.5 refractory to treatment) |\n| **I** | Intoxication (lithium, metformin, salicylate, methanol, ethylene glycol) |\n| **O** | Overload (pulmonary oedema refractory to diuretics) |\n| **U** | Uraemia (encephalopathy, pericarditis, bleeding) |\n\n---\n\n### CA-AKI Prevention\n- IV 0.9% NaCl 1 mL/kg/h for 6–12h before and after contrast\n- Use low/iso-osmolar contrast, minimum volume\n- Hold metformin 48h before and after if eGFR <60\n\n---"

          "markdown": "### Staging\n\n| Stage | eGFR | Monitoring |\n|---|---|---|\n| G1 | ≥90 (with structural/lab abnormality) | Annually |\n| G2 | 60–89 | Annually |\n| G3a | 45–59 | 6-monthly |\n| G3b | 30–44 | 3–6 monthly |\n| G4 | 15–29 | 3-monthly + **refer nephrology** |\n| G5 | <15 | Nephrology-managed |\n\n**UACR staging:** A1 <3 | A2 3–30 | A3 >30 mg/mmol\n\n**Common causes in SG:** DM nephropathy (most common), hypertensive nephrosclerosis, IgA nephropathy (most common primary GN in SG), lupus nephritis, obstructive uropathy\n\n---\n\n### Monitoring at Each Visit\nBP, weight, UEC (K⁺, Cr, eGFR), UACR\n\n**Annual (G3b+):** FBC (anaemia), Ca²⁺, PO₄, PTH, lipids, HbA1c (if DM)\n\n---\n\n### Slowing Progression\n\n| Intervention | Target/Dose |\n|---|---|\n| BP control | <130/80 mmHg |\n| ACEi or ARB | If DM or UACR >3. Do NOT combine. Acceptable Cr rise: up to 30%. Stop if K⁺ >6.0 or Cr rise >30%. |\n| SGLT2i | Dapagliflozin/empagliflozin — renoprotective down to eGFR 25 |\n| Finerenone | Add if DM + CKD + UACR >30 on max ACEi/ARB |\n| Protein intake | 0.8 g/kg/day (avoid high protein) |\n\n---\n\n### Managing Complications\n\n| Complication | Threshold | Treatment |\n|---|---|---|\n| Anaemia | Hb <100 | Iron first (TSAT <20% or ferritin <100). If iron-replete → refer ESA. |\n| Metabolic acidosis | HCO₃⁻ <22 | NaHCO₃ 500–1000 mg BD–TDS |\n| Hyperphosphataemia | ↑ PO₄ | Dietary restriction + CaCO₃ 500 mg with meals |\n| Hyperkalaemia | K⁺ >5.5 persistent | Dietary K⁺ restriction; review ACEi/ARB dose |\n\n---\n\n### Drug Adjustments in CKD\n\n| Drug | Action |\n|---|---|\n| NSAIDs | **Avoid** (worsen CKD, cause AKI) |\n| Metformin | Reduce if eGFR 30–45; **STOP if <30** |\n| Nitrofurantoin | **Avoid if eGFR <30** |\n| Contrast agents | Hold metformin 48h; pre-hydrate; use low-osmolar |\n\n---\n\n### Referral Criteria\n- eGFR <30 (G4)\n- Rapid decline >5 mL/min/1.73m²/year\n- Unexplained CKD or atypical features\n- UACR >70 or macrohaematuria\n- Resistant hypertension\n- eGFR <20 for RRT planning\n\n---"

          "slug": "hyponatraemia-workup-correction",
          "title": "Hyponatraemia — Workup & Correction",
          "markdown": "> [!danger] Correction rate: MAX 8–10 mmol/L per 24h. Too fast → Osmotic Demyelination Syndrome (ODS) — irreversible paralysis.\n> Highest risk: alcoholics, malnourished, hypokalaemic, liver disease.\n\n**Symptomatic/acute:** 1–2 mmol/L/h for first 2–3h only, then slow to ≤8 mmol/L/24h total\n\n### Step 1 — Serum Osmolality\n\n| Osmolality | Interpretation |\n|---|---|\n| >295 (hyperosmolar) | Pseudohyponatraemia from solute (hyperglycaemia, mannitol). Corrected Na = Na + 1.6 × [(glucose − 5.6) / 5.6] |\n| 280–295 (iso-osmolar) | Pseudohyponatraemia (severe lipaemia, hyperproteinaemia — old lab methods) |\n| <280 (hypo-osmolar) | **True hyponatraemia → proceed** |\n\n### Step 2 — Volume Status\n- **Hypovolaemic:** clinically dry (↓turgor, dry mucosae, postural drop, ↑HR)\n- **Euvolaemic:** normal examination\n- **Hypervolaemic:** oedematous (peripheral oedema, ascites, pulmonary oedema)\n\n### Step 3 — Urine Na⁺ and Osmolality\n- Uosm <100: kidneys correctly excreting water → primary polydipsia or low solute\n- Uosm >100: ADH active or renal Na wasting\n- UNa <20: Na-avid state\n- UNa >40: SIADH, renal wasting, diuretics\n\n### Classification\n\n| Type | UNa | Causes |\n|---|---|---|\n| Hypovolaemic | <20 | GI losses, bleeding, third-spacing |\n| Hypovolaemic | >20 | Diuretics ⚠️ **(very common SG elderly — check meds first!)**, adrenal insufficiency, cerebral salt wasting (post-SAH) |\n| Euvolaemic | <20 | Primary polydipsia, low solute (beer potomania) |\n| Euvolaemic | >40 | **SIADH**, hypothyroidism, adrenal insufficiency |\n| Hypervolaemic | <20 | HF, cirrhosis, nephrotic syndrome, CKD |\n\n### SIADH Diagnostic Criteria *(all required)*\n1. Posm <275 mOsm/kg\n2. Uosm >100 (usually >200) mOsm/kg\n3. UNa >40 mmol/L on normal salt/fluid intake\n4. Clinically euvolaemic\n5. No adrenal, thyroid, renal failure, or diuretic cause\n\n### SIADH Causes\n**CNS:** SAH, meningitis, encephalitis, subdural, stroke, TBI\n**Pulmonary:** pneumonia, TB, COPD exacerbation, positive pressure ventilation\n**Malignancy:** small cell lung Ca (ectopic ADH — most common), pancreas, prostate\n**Drugs (COMMON):** SSRIs *(most common drug cause)*, TCAs, carbamazepine, cyclophosphamide, NSAIDs, PPIs, opioids, MDMA\n**Other:** postoperative, pain/nausea (transient ADH release), HIV\n\n### Management\n\n| Type | Treatment |\n|---|---|\n| Acute severe (seizures/GCS↓) | 3% NaCl 100 mL IV over 10 min × up to 3 doses. Target +4–6 mmol/L acutely. Monitor Na q1–2h. |\n| Hypovolaemic | 0.9% NaCl (volume → suppresses ADH → Na corrects). ⚠️ Risk of overcorrection — monitor closely. |\n| SIADH | Fluid restriction 800–1000 mL/day. If insufficient: oral urea 15–30g/day OR furosemide + oral salt tablets. Tolvaptan: specialist use. |\n| Hypervolaemic | Fluid restriction + treat cause |\n| Overcorrection | Stop hypertonic saline; give D5W 3–6 mL/kg over 1h; consider DDAVP 2 mcg IV to clamp Na |\n\n---"

          "markdown": "> [!warning] Confirm with repeat — exclude pseudohyperkalaemia (haemolysis, delayed processing, fist clenching)\n\n**Severe:** ≥6.5 mmol/L or ANY level with ECG changes\n\n### ECG Changes (Progressive)\n\n| K⁺ Level | ECG Change |\n|---|---|\n| ~5.5–6.0 | Tall, peaked, narrow T waves (tent-shaped) |\n| ~6.0–6.5 | PR prolongation, P wave flattening |\n| ~6.5–7.0 | QRS widening |\n| ~7.0–8.0 | Sine wave pattern (P gone, QRS merges with T) |\n| >8.0 | VF, asystole |\n\n> [!danger] ECG changes do NOT reliably correlate with K⁺ level. Treat ECG changes regardless of measured K⁺.\n\n### Causes\n\n| Category | Examples |\n|---|---|\n| Spurious | Haemolysis, thrombocytosis, leucocytosis, fist clenching |\n| Transcellular shift | Acidosis (pH ↓0.1 → K⁺ ↑0.6), insulin deficiency, β-blockade, rhabdomyolysis, tumour lysis, succinylcholine, digoxin toxicity |\n| ↓ Excretion | CKD/AKI, ACEi/ARB/spironolactone/amiloride, NSAIDs, trimethoprim, heparin, ciclosporin |\n| Mineralocorticoid def | Adrenal insufficiency, Type 4 RTA (DM nephropathy — most common) |\n\n### Management\n\n**Priority: Stabilise → Shift In → Remove**\n\n#### Step 1 — Membrane Stabilisation *(ECG changes OR K⁺ ≥6.5)*\n- **Calcium gluconate 10%** 10 mL IV over 2–5 min\n- Onset: 1–3 min | Duration: 30–60 min | **Does NOT lower K⁺**\n- Repeat in 5 min if ECG changes persist\n\n> [!warning] On digoxin: give calcium slowly over 20–30 min (potentiates digoxin toxicity)\n\n#### Step 2 — Shift K⁺ Into Cells *(temporising)*\n\n| Drug | Dose | Onset | Effect |\n|---|---|---|---|\n| **Insulin + glucose** | Actrapid 10 units IV + 50 mL 50% dextrose | 15–30 min | ↓0.5–1.5 mmol/L. Monitor BG q30–60 min. |\n| **Salbutamol** (high dose) | 10–20 mg nebulised | 15–30 min | ↓0.5–1.0 mmol/L. Additive with insulin. ⚠️ Tachycardia. |\n| NaHCO₃ | 50 mmol IV | Variable | Only if significant metabolic acidosis (pH <7.2) |\n\n#### Step 3 — Remove K⁺ *(definitive)*\n\n| Agent | Dose | Notes |\n|---|---|---|\n| Furosemide | 40–80 mg IV | Only if producing urine |\n| **Lokelma** (sodium zirconium cyclosilicate) | 10g TDS × 48h → 5–10g OD maintenance | Faster, better tolerated; avoid in HF (Na load) |\n| Calcium resonium | 15–30g TDS PO or 30g PR enema | Older agent, GI SE |\n| Patiromer (Veltassa) | 8.4g OD with food | — |\n| **RRT** (haemodialysis) | — | Most effective; preferred for acute severe hyperK |\n\n---"

          "slug": "other-electrolytes-hypernatraemia-ca-mg-phosphate",
          "title": "Other Electrolytes — Hypernatraemia, Ca, Mg, Phosphate",
          "markdown": "### Hypernatraemia (Na⁺ >145 mmol/L)\nAlways reflects water deficit relative to Na. Nearly always + inadequate water access.\n\n**Urine osmolality differentiates:**\n\n| Uosm | Interpretation |\n|---|---|\n| <150 (dilute) | DI — kidneys losing free water |\n| >600 (concentrated) | Extrarenal loss or inadequate intake (kidneys working correctly) |\n| 300–600 | Osmotic diuresis (hyperglycaemia, mannitol), partial DI |\n\n**Diabetes Insipidus:**\n\n| Type | Response to DDAVP | Common Causes |\n|---|---|---|\n| Central (↓ADH production) | Responds | Trauma, pituitary surgery, SAH, infiltration |\n| Nephrogenic (↓ADH response) | No response | **Lithium** *(most common)*, hypercalcaemia, hypoK, CKD |\n\n**Correction:** MAX 10 mmol/L per 24h (risk cerebral oedema)\n```\nFree water deficit = 0.6 × weight (kg) × [(Na/140) − 1]\n```\nReplace over 24–48h + ongoing losses. Use D5W or 0.45% NaCl. **NOT 0.9% NaCl** (unless haemodynamically unstable).\n\n**Central DI:** DDAVP intranasal 10–40 mcg OD–BD | SC/IV 1–4 mcg OD–BD\n**Nephrogenic DI:** fix underlying cause; thiazide + low Na diet (paradoxical ↓urine volume)\n\n---\n\n### Hypocalcaemia (Ca²⁺ <2.1 mmol/L, ionised <1.1)\n\n> [!note] Always correct for albumin: `Corrected Ca = measured Ca + 0.02 × (40 − albumin)`. Or check ionised Ca directly.\n\n**Causes:**\n\n| Cause | Notes |\n|---|---|\n| Hypoparathyroidism | Post-thyroid/parathyroid surgery *(most common)*, autoimmune, DiGeorge |\n| Vitamin D deficiency | Poor sunlight, malabsorption, CKD (↓1-alpha-hydroxylase), liver disease |\n| **Hypomagnesaemia** | Mg required for PTH secretion — **fix Mg first** |\n| Acute pancreatitis | Ca saponification in peripancreatic fat |\n| CKD | ↓Vit D activation + hyperphosphataemia |\n| Alkalosis | ↑albumin binding → ↓ionised Ca (total Ca unchanged) |\n| Drugs | Bisphosphonates, denosumab, massive transfusion (citrate) |\n\n**Symptoms:** perioral tingling, tetany, carpopedal spasm, laryngospasm, Trousseau's sign, prolonged QT, seizures\n\n**Management:**\n- Mild–moderate (no symptoms): oral calcium carbonate 1–3g/day ± calcitriol/cholecalciferol\n- **Symptomatic / Ca <1.9 or ionised <0.9:**\n  - 10% Calcium gluconate 10 mL IV over 10 min → infusion 10 mL/hr\n  - If on digoxin: infuse over 30 min\n  - Replace Mg first if hypomagnesaemic\n\n---\n\n### Hypercalcaemia (Ca²⁺ >2.6 mmol/L)\n\n> [!note] 90% = primary hyperparathyroidism OR malignancy\n\n**Distinguish by PTH:**\n- PTH HIGH + Ca HIGH → primary hyperparathyroidism (outpatient setting — parathyroid adenoma)\n- PTH LOW + Ca HIGH → malignancy (PTHrP: squamous Ca; osteolytic mets: breast/lung/myeloma; lymphoma: ectopic 1,25-Vit D), sarcoidosis, thiazides, Vit D toxicity\n\n**Emergency Management** (Ca >3.0 + symptomatic):\n\n| Step | Intervention |\n|---|---|\n| 1 | IV 0.9% NaCl 200–500 mL/hr. Target UO 100–150 mL/hr. |\n| 2 | Furosemide 20–40 mg IV — **only after adequate rehydration** |\n| 3 | **Zoledronic acid** 4 mg IV over 15 min (onset 2–4 days; avoid eGFR <30) |\n| 4 | **Calcitonin** 4–8 IU/kg SC q6–12h (fast onset 4–6h; tachyphylaxis after 48h — bridging) |\n| 5 | **Denosumab** 120 mg SC (use if renal failure — not renally cleared) |\n| 6 | Steroids (prednisolone 40–60 mg OD): sarcoidosis, Vit D toxicity, lymphoma |\n| 7 | Dialysis: refractory severe + renal failure |\n\n---\n\n### Hypomagnesaemia (Mg²⁺ <0.7 mmol/L)\n\n**Causes:** GI (diarrhoea, malabsorption, chronic PPI use ← inhibits TRPM6 channels), renal (loop/thiazide diuretics, cisplatin, aminoglycosides, calcineurin inhibitors, alcohol), poorly controlled DM\n\n**Consequences:** refractory hypoK and hypoCa, prolonged QT, Torsades, arrhythmia, tetany, seizures\n\n**Management:**\n- Oral: Mg glycerophosphate or Mg oxide 240–480 mg OD\n- **IV (symptomatic or Mg <0.4):** MgSO₄ 2g (10 mL of 20%) IV over 15–30 min → infusion 10 mmol/hr\n- **Torsades:** 2g IV push rapidly\n- Monitor patellar reflex (loss = early toxicity at Mg ~4–5 mmol/L)\n\n---\n\n### Hypophosphataemia (PO₄ <0.8 mmol/L)\n\n**Causes:**\n\n| Cause | Notes |\n|---|---|\n| **Refeeding syndrome** | Insulin → PO₄ into cells on refeeding. Risk: malnourished, alcoholic, anorexia, prolonged starvation |\n| DKA treatment | Insulin drives PO₄ intracellularly |\n| Hungry bone syndrome | Post-parathyroidectomy — rapid bone mineralisation |\n| Antacid overuse | Al/Mg-based antacids bind dietary PO₄ |\n| Primary hyperparathyroidism | ↑PTH → ↑renal PO₄ excretion |\n| Malabsorption | Crohn's, coeliac |\n\n**Consequences** (severe <0.3 mmol/L): respiratory failure (diaphragm weakness), rhabdomyolysis, haemolytic anaemia, encephalopathy, seizures\n\n**Management:**\n- Mild–moderate (0.5–0.8): oral sodium/potassium phosphate 500–1000 mg TDS\n- **Severe (<0.5, symptomatic):** IV sodium/potassium phosphate 0.3–0.6 mmol/kg over 6–12h\n\n> [!warning] Monitor Ca²⁺ during IV phosphate replacement — risk of hypocalcaemia\n\n---"

ch episode\n- Renal USS to exclude structural abnormality\n- Prevention: post-coital voiding, adequate hydration, D-mannose (evidence emerging)\n- Antibiotic prophylaxis: trimethoprim 100mg nocte OR nitrofurantoin 50mg nocte OR post-coital single dose\n\n---"

          "markdown": "### Recognition — FAST + Posterior\n- **F**ace drooping | **A**rm weakness | **S**peech difficulty | **T**ime to call\n- Posterior: **diplopia, vertigo, ataxia, dysphagia, crossed findings** (contralateral body + ipsilateral face)\n\n### NIHSS (National Institutes of Health Stroke Scale)\n- Score 0–42: higher = more severe\n- Score 0–4: minor | 5–15: moderate | 16–20: moderate-severe | >20: severe\n- Guides thrombolysis and thrombectomy candidacy\n\n---\n\n### Acute Imaging\n- **Non-contrast CT (NCCT):** immediate — exclude haemorrhage (required before thrombolysis)\n- **CT angiography (CTA):** large vessel occlusion (LVO) — required if considering thrombectomy\n- **CT perfusion / MRI:** salvageable tissue (penumbra vs core); extends thrombectomy window\n\n---\n\n### IV Thrombolysis — Alteplase\n\n**Time window:** within **4.5 hours** of symptom onset (or last known well)\n\n**Dose:** 0.9 mg/kg IV (max 90 mg) — 10% as bolus over 1 min, rest over 60 min\n\n**Inclusion criteria:**\n- Ischaemic stroke with measurable neurological deficit\n- Within 4.5h of onset\n- Age ≥18\n\n**Absolute contraindications:**\n- Haemorrhage on CT\n- Prior ICH at any time\n- Ischaemic stroke within 3 months\n- Active bleeding or bleeding diathesis\n- SBP >185 or DBP >110 (treat first, then thrombolyse if controlled)\n- Recent surgery <14 days, or serious trauma <3 months\n- Platelets <100 × 10⁹/L, INR >1.7, aPTT >40, or therapeutic anticoagulation\n\n> [!warning] BP must be <185/110 before and during thrombolysis. Use labetalol 10–20 mg IV or GTN infusion to achieve.\n\n**Tenecteplase 0.25 mg/kg IV** (max 25 mg): single bolus; may replace alteplase (NOR-TEST, ATTEST-2); simpler administration\n\n---\n\n### Mechanical Thrombectomy (MT)\n\n**Time window:** within **24 hours** of onset (with appropriate imaging — DAWN/DEFUSE-3)\n**Standard window:** within 6h (all eligible patients with LVO)\n**Extended window 6–24h:** if penumbra imaging shows salvageable tissue\n\n**Inclusion (core):** LVO on CTA (ICA, M1, basilar) + NIHSS ≥6 + pre-stroke mRS 0–1\n\n**Who to call:** activate stroke team/interventional neuroradiology immediately on clinical suspicion\n\n**MT + alteplase:** if no contraindication to IV alteplase, give while preparing MT (\"bridging therapy\")\n\n---\n\n### Haemorrhagic Transformation\nRisk factors: large infarct, delayed thrombolysis, hypertension, anticoagulants, reperfusion\nManagement: BP control, reverse anticoagulation if applicable, neurosurgery if large haematoma with mass effect\n\n---\n\n### Secondary Prevention\n\n| Cause | Treatment |\n|---|---|\n| Non-cardioembolic (atherosclerotic, lacunar) | DAPT × 21 days (aspirin + clopidogrel) → clopidogrel monotherapy *(See [[#Anticoagulation by Indication]])* |\n| Cardioembolic (AF) | DOAC *(timing: delay large infarct 4 weeks, TIA/small stroke ≤7 days)* |\n| Cardioembolic (mechanical valve) | Warfarin INR 2.5–3.5 (mitral) |\n| LV thrombus | Warfarin × 3–6 months |\n| Cryptogenic + PFO | PFO closure if age <60 + high-risk; antiplatelets otherwise |\n\n**Risk factor control (all stroke):**\n- BP: target <130/80 mmHg\n- LDL-C: target <1.8 mmol/L (high-intensity statin — atorvastatin 80 mg OD post-stroke)\n- DM: HbA1c <7%\n- Smoking cessation, AF treatment, lifestyle\n\n---"

          "markdown": "### Bacterial Meningitis\n\n**Classic triad:** fever + headache + neck stiffness (only ~44% have all three)\n**Also:** photophobia, phonophobia, non-blanching petechial rash (meningococcal — emergency)\n\n**Kernig's sign:** hip flexed 90° → pain/resistance on knee extension\n**Brudzinski's sign:** passive neck flexion → involuntary hip/knee flexion\n\n> [!danger] Petechial/purpuric rash in febrile patient = meningococcaemia until proven otherwise. Give antibiotics IMMEDIATELY.\n\n**Immediate management — do NOT delay antibiotics for LP if:**\n- GCS <13, focal neurological signs, papilloedema, immunocompromised, seizures\n- Give antibiotics → then CT head → then LP if CT shows no contraindication\n\n**Empirical treatment:**\n- **Ceftriaxone 2g IV q12h** (covers Strep pneumoniae, Neisseria meningitidis, Listeria partially)\n- **+ Dexamethasone 10 mg IV q6h × 4 days** — give BEFORE or WITH first antibiotic dose (reduces mortality/morbidity in Strep pneumo; give even if uncertain)\n- **+ Ampicillin 2g IV q4h** if: age >50, immunocompromised, pregnancy, alcoholism (Listeria coverage)\n- **+ Aciclovir 10 mg/kg IV q8h** if viral encephalitis cannot be excluded (until HSV PCR returns)\n\n**CSF interpretation:**\n\n| | Bacterial | Viral | TB | Cryptococcal |\n|---|---|---|---|---|\n| Appearance | Turbid | Clear | Clear/xanthochromic | Clear/turbid |\n| White cells | >1000 (PMN) | <500 (lymph) | 100–500 (lymph) | <500 (lymph) |\n| Protein | ↑↑ (>1g/L) | Mildly ↑ | ↑ | ↑ |\n| Glucose | ↓↓ (<0.4 plasma) | Normal | ↓ | ↓ |\n| Other | Culture/gram stain | PCR (HSV, entero) | AFB/TB PCR | India ink, CrAg |\n\n**Common organisms in SG:**\n- Adults: Streptococcus pneumoniae, Neisseria meningitidis\n- Elderly/immunocompromised: Listeria monocytogenes\n- Post-neurosurgery/shunt: Staphylococcus, gram-negatives\n- HIV: Cryptococcus neoformans (CrAg latex agglutination; treat with amphotericin B + flucytosine)\n- TB meningitis: consider in endemic area, immunocompromised, subacute onset\n\n---\n\n### Viral Encephalitis\n\n**Causes:** HSV-1 (most common treatable cause — temporal lobe involvement, fever, altered consciousness, seizures, behavioural change), CMV, EBV, VZV, enteroviruses, JE (Japanese encephalitis — SG risk — mosquito-borne), rabies\n\n**Investigations:** MRI brain with contrast (temporal lobe signal change in HSV), CSF PCR, EEG (temporal lobe epileptiform in HSV)\n\n**Treatment:**\n- **Aciclovir 10 mg/kg IV q8h × 14–21 days** (HSV) — start empirically, do not wait for CSF results\n- Treat until HSV PCR negative and clinical improvement\n\n---"

          "markdown": "### Epilepsy — Chronic Management\n\n*(See [[#Status Epilepticus]] for acute management)*\n\n**Classification:**\n- **Focal (partial):** start in one brain area. Aware (simple) or impaired awareness (complex). May secondarily generalise.\n- **Generalised:** both hemispheres simultaneously. Types: absence, myoclonic, tonic-clonic, tonic, atonic.\n- **Unknown onset**\n\n**After first seizure:** not automatically treated. Discuss recurrence risk, driving, triggers.\n**Start AED after:**\n- Two or more unprovoked seizures\n- One seizure + high recurrence risk (abnormal EEG, brain lesion, specific epilepsy syndrome)\n\n---\n\n#### First-Line AEDs by Seizure Type\n\n| Seizure Type | First-Line | Alternatives | Avoid |\n|---|---|---|---|\n| **Focal (all types)** | Lamotrigine 25→100–200 mg BD | Levetiracetam 250→1000–1500 mg BD; carbamazepine 100→400–600 mg BD (watch for hyponatraemia, drug interactions via CYP3A4) | Sodium valproate (teratogenic) in women of childbearing age |\n| **Generalised tonic-clonic** | Sodium valproate 200→500–1500 mg BD (most effective) | Lamotrigine; levetiracetam; topiramate | Carbamazepine/oxcarbazepine (may worsen absence/myoclonic) |\n| **Absence** | Ethosuximide 250→500–750 mg BD | Sodium valproate; lamotrigine | Carbamazepine (worsens absence) |\n| **Juvenile myoclonic epilepsy (JME)** | Sodium valproate | Levetiracetam; lamotrigine; topiramate | Carbamazepine (worsens myoclonic) |\n\n> [!warning] Sodium valproate: AVOID or minimise in women of childbearing potential (teratogenic — neural tube defects, neurodevelopmental issues). Use with mandatory contraception if no alternative. In SG: follow HIRA/NPRS valproate guidelines.\n\n**Lamotrigine titration:** slow titration essential (SJS risk — especially with valproate co-prescribing). Start 25 mg OD × 2 weeks → 25 mg BD × 2 weeks → 50 mg BD → increase by 50 mg every 2 weeks. If on valproate: start 12.5 mg OD (valproate doubles lamotrigine levels).\n\n**Monitoring:**\n- FBC, LFTs, Na⁺ (carbamazepine → hyponatraemia), drug levels where relevant\n- Review annually: seizure frequency, AED tolerance, driving status, contraception\n\n**Driving (Singapore LTA regulations):** seizure-free ≥1 year before driving (private vehicle). Commercial vehicle: stricter requirements. Seizure = report to LTA; license suspended.\n\n---\n\n### Parkinson's Disease\n\n**Cardinal features (3 of 4 for diagnosis):**\n- **Tremor** (resting, pill-rolling, 4–6 Hz, disappears with action)\n- **Rigidity** (cogwheel or leadpipe)\n- **Bradykinesia** (slowness of movement)\n- **Postural instability** (late feature)\n\n**Red flags suggesting Parkinson's Plus (atypical):**\n- Early falls, early autonomic failure, rapid progression, symmetrical onset, no tremor, poor levodopa response → think MSA, PSP, DLB, CBS\n\n**Non-motor features:** REM sleep behaviour disorder (RBD — earliest marker), constipation, hyposmia, depression, anxiety, autonomic (orthostatic hypotension, urinary dysfunction), cognitive decline (Parkinson's dementia — late)\n\n---\n\n#### Treatment\n\n**Levodopa (most effective):**\n- Co-careldopa (Sinemet) or co-beneldopa (Madopar): levodopa + peripheral DOPA decarboxylase inhibitor (carbidopa/benserazide — reduces peripheral SE)\n- Start: 100 mg levodopa TDS (with meals — food slows absorption but reduces nausea) or 25/100 mg co-careldopa TDS\n- Titrate: increase by 50–100 mg every 1–2 weeks to response\n- SE: wearing off, dyskinesias (peak-dose), nausea (domperidone — not metoclopramide — for antiemesis), postural hypotension, impulse control disorders\n- **Timing:** take 30–60 min BEFORE meals for optimal absorption (protein competes with levodopa at gut/BBB transport)\n\n**Dopamine agonists (younger patients, delay motor complications):**\n- Pramipexole 0.125 mg TDS → 0.5–1 mg TDS\n- Ropinirole 0.25 mg TDS → 2–8 mg TDS\n- Rotigotine patch 2 mg/24h → 4–8 mg/24h\n- SE: impulse control disorder (gambling, hypersexuality, binge eating), somnolence, hallucinations (especially in elderly/advanced PD), peripheral oedema\n\n**MAO-B inhibitors (mild disease, neuroprotective — evidence modest):**\n- Rasagiline 1 mg OD or selegiline 5 mg BD — add-on to levodopa (reduce wearing off)\n\n**COMT inhibitors (reduce levodopa wearing off):**\n- Entacapone 200 mg with each levodopa dose (extends levodopa effect — takes with each levodopa dose)\n- Opicapone 50 mg OD nocte\n\n**Advanced disease:**\n- Duodopa (levodopa-carbidopa intestinal gel) via PEG-J tube\n- **Deep brain stimulation (DBS):** STN or GPi stimulation; best for motor fluctuations/dyskinesias in cognitively intact patient\n\n> [!warning] AVOID in PD: metoclopramide, prochlorperazine, haloperidol (dopamine blockers — worsen PD). Use domperidone (does not cross BBB) for nausea.\n\n---\n\n> [!note] Vertigo / BPPV / HINTS / Ménière's moved to [[#vertigo-peripheral-dizziness-ddx]] (ENT).\n\n### Peripheral Neuropathy — Classification & Approach\n\n| Pattern | Likely Cause |\n|---|---|\n| Distal symmetrical (length-dependent) | DM (most common), alcohol, CKD, hypothyroidism, B12/folate deficiency, drugs (vincristine, isoniazid, metronidazole, nitrofurantoin) |\n| Asymmetric (mononeuritis multiplex) | DM, vasculitis (PAN, ANCA), leprosy, sarcoidosis, amyloid |\n| Demyelinating (AIDP/CIDP) | Guillain-Barré (acute), CIDP (chronic > 8 weeks), paraprotein |\n| Predominantly motor | AIDP/GBS, CIDP, multifocal motor neuropathy |\n| Painful neuropathy | DM, alcohol, HIV, amyloid, hereditary (Fabry's) |\n\n**Workup:** FBC, UEC, LFTs, glucose/HbA1c, TFTs, B12, folate, protein electrophoresis (SPEP), VDRL/HIV (if at risk), ANA/ANCA/anti-Ro (vasculitis), nerve conduction studies (NCS) + EMG (characterise axonal vs demyelinating, distribution)\n\n**Diabetic neuropathy management:**\n- Strict glycaemic control (slows progression)\n- **Pregabalin** 75 mg BD → 150–300 mg BD (first-line neuropathic pain)\n- **Duloxetine** 60–120 mg OD (first-line, especially if depression co-exists)\n- **Amitriptyline** 10–25 mg nocte → 75 mg (cheap; monitor QTc; avoid in elderly falls risk)\n- Gabapentin 300 mg nocte → 300–600 mg TDS\n- Topical: lidocaine 5% patch, capsaicin 0.075% (small area pain)\n- Opioids: tramadol (last resort), avoid long-term high-dose\n\n---"

          "markdown": "### Red Flags (SNOOP4) — Secondary Headache Must Be Excluded\n\n| Letter | Feature |\n|---|---|\n| **S** | Systemic symptoms (fever, weight loss) or Systemic disease (HIV, malignancy) |\n| **N** | Neurological symptoms or signs (focal deficits, altered consciousness, papilloedema) |\n| **O** | Onset sudden (\"thunderclap\" headache — worst headache of life — SAH until proven otherwise) |\n| **O** | Onset after age 50 (new headache) |\n| **P** | Positional headache (worse lying flat = ↑ICP; worse standing = low pressure/CSF leak) |\n| **P** | Precipitated by Valsalva (cough, sneeze, exertion) |\n| **P** | Progressive worsening |\n| **P** | Papilloedema or Prior headache change |\n\n---\n\n### Thunderclap Headache\n- **Subarachnoid haemorrhage (SAH) until proven otherwise**\n- CT head (non-contrast): 90–98% sensitive in first 6h; sensitivity drops after\n- LP (if CT negative + high suspicion): xanthochromia (yellow CSF) 2h–2 weeks after bleed\n- Also: RCVS (reversible cerebral vasoconstriction), cerebral venous thrombosis, hypertensive emergency, pituitary apoplexy\n\n---\n\n### Primary Headaches\n\n**Tension-type headache:**\n- Bilateral, pressing/tightening, mild-moderate, not worsened by activity\n- Treatment: paracetamol 1g, NSAIDs; amitriptyline 10–75 mg nocte (prevention)\n\n**Migraine:**\n- Unilateral, pulsating, moderate-severe, nausea/vomiting/photophobia/phonophobia, worsened by activity\n- Aura (in ~30%): visual (most common — fortification spectra, scotoma), sensory, speech (fully reversible within 60 min)\n- **Acute treatment:**\n  - NSAIDs (ibuprofen 400 mg or naproxen 500 mg) ± antiemetic (metoclopramide 10 mg)\n  - **Triptans** (if moderate-severe or NSAID failure): sumatriptan 50–100 mg oral or 6 mg SC; zolmitriptan 2.5 mg; rizatriptan 10 mg\n    - Take early in attack; CI in: haemiplegic migraine, basilar migraine, ischaemic CVD, uncontrolled HTN\n  - Ergotamine: rarely used now (less specific, more SE)\n- **Prevention** (if ≥4 attacks/month or significant disability):\n  - **Propranolol** 40–120 mg BD (first-line)\n  - **Topiramate** 25–100 mg BD\n  - Amitriptyline 10–75 mg nocte (if concurrent tension-type or depression)\n  - Candesartan 8–16 mg OD\n  - CGRP antagonists (erenumab, fremanezumab SC monthly): newer, expensive; specialist-initiated\n\n**Cluster headache:**\n- Strictly unilateral, severe orbital/temporal pain, ipsilateral autonomic features (lacrimation, rhinorrhoea, ptosis, miosis, conjunctival injection)\n- Duration 15–180 min, 1–8 attacks/day; clock-like periodicity; mostly in men\n- **Acute:** 100% O₂ via NRB mask × 15–20 min (highly effective) + sumatriptan 6 mg SC\n- **Prevention:** verapamil 120–240 mg TDS (first-line); short course prednisolone as bridge; lithium; topiramate\n\n---"

          "title": "Contraception — GP Overview",
          "markdown": "### Choosing a Method\n\n| Method | Efficacy (typical use) | Key Points |\n|---|---|---|\n| **Combined oral contraceptive (COCP)** | 91% | Oestrogen + progestogen. Once daily. |\n| **Progestogen-only pill (POP/mini-pill)** | 91% | No oestrogen. Good if COCP CI. Take within same 3h window daily. |\n| **Copper IUD** | >99% | Non-hormonal. Lasts 5–10 years. Also emergency contraception within 5 days. |\n| **Hormonal IUD (Mirena)** | >99% | Lasts 5 years. Reduces/stops periods. |\n| **Implant (Nexplanon)** | >99% | Subdermal arm. Lasts 3 years. Most effective reversible. |\n| **Depot injection (Depo-Provera)** | 94% | IM q12 weeks. Fertility return delayed 6–12 months. |\n| **Male condom** | 85% | Only method with STI protection. |\n| **Emergency contraception (ECP)** | 85–89% | Levonorgestrel 1.5mg within 72h (up to 120h — efficacy ↓). Copper IUD within 5 days (most effective). |\n\n---\n\n### COCP — Contraindications\n\n> [!danger] Combined oestrogen-containing methods are contraindicated if ANY of these present:\n\n- Migraine **with aura** (↑stroke risk)\n- Personal history of VTE / thrombophilia\n- Uncontrolled hypertension (BP >160/100)\n- Smoking + age >35\n- Breastfeeding <6 weeks postpartum\n- Active liver disease / hepatic adenoma\n- History of stroke or ischaemic heart disease\n- Current breast cancer\n\n→ Use **progestogen-only** method instead\n\n---\n\n### COCP — Starting and Counselling\n\n- Start day 1–5 of cycle (no backup needed). If starting later — 7-day backup needed.\n- SE: nausea (take at night), breast tenderness, mood changes, breakthrough bleeding (usually settles in 3 months)\n- **Missed pill:** >24h late → take ASAP, continue pack, use backup × 7 days\n- Interactions: rifampicin, phenytoin, carbamazepine, St John's Wort (enzyme inducers — reduce efficacy)\n- Review annually: BP, symptoms, ongoing need\n\n---\n\n### Emergency Contraception\n\nLevonorgestrel (Plan B / Postinor-2): 1.5mg stat within 72h (up to 120h). OTC in SG.\nUlipristal acetate (EllaOne): within 120h — more effective in obese patients. Prescription.\nCopper IUD: within 5 days — most effective. Also provides ongoing contraception.\n\n> [!warning] ECP does not protect against STIs. Offer STI screening if relevant.\n\n---"

          "slug": "menopause",
          "title": "Menopause",
          "markdown": "### Diagnosis\n\n**Clinical:** amenorrhoea × 12 months in a woman >45 = menopause. No investigation needed.\n**Under 45:** premature ovarian insufficiency (POI) — check FSH (>25 IU/L on 2 occasions, ≥4 weeks apart) + LH + oestradiol.\n\n**Perimenopause:** irregular cycles, vasomotor symptoms (hot flushes, night sweats), still cycling. FSH elevated but can be normal.\n\n---\n\n### Symptoms\n\nVasomotor: hot flushes, night sweats (affect 75% of women)\nGenitourinary: vaginal dryness, dyspareunia, recurrent UTIs, urgency\nMood/cognitive: irritability, low mood, poor sleep, brain fog\nLong-term: ↑osteoporosis, ↑cardiovascular risk (loss of oestrogen cardioprotection)\n\n---\n\n### Management\n\n**Non-hormonal (if HRT declined/CI):**\n- Vasomotor: venlafaxine 37.5–75mg OD, paroxetine 10–20mg OD, or clonidine 50mcg BD\n- Vaginal dryness: topical oestrogen (safe even if systemic HRT CI in most cases), lubricants\n\n**Hormone Replacement Therapy (HRT):**\n\n| Component | Route | Notes |\n|---|---|---|\n| Oestrogen (systemic) | Transdermal patch or gel (preferred) or oral | Transdermal has lower VTE and stroke risk than oral |\n| Progestogen (if uterus intact) | Combined with oestrogen | Prevents endometrial hyperplasia |\n| Post-hysterectomy | Oestrogen-only | No progestogen needed |\n| Tibolone | Oral tablet | Combined estrogenic/progestogenic/androgenic — good for libido + vasomotor |\n\n**Benefits of HRT:** ↓hot flushes, ↓vaginal atrophy, ↓osteoporosis, ↓cardiovascular risk (if started <60 or within 10 years of menopause — \"window of opportunity\")\n\n**Risks:**\n- Breast cancer: small ↑risk with combined HRT (≥5 years); oestrogen-only: minimal risk\n- VTE: lower with transdermal vs oral\n- Stroke: lower with transdermal vs oral\n\n**Duration:** no arbitrary limit — reassess annually. Benefits often outweigh risks in symptomatic women <60.\n\n**Contraindications:** current/recent breast cancer, unexplained vaginal bleeding, active VTE, liver disease\n\n---"
