        {
          "slug": "vertigo-peripheral-dizziness-ddx",
          "title": "Vertigo / Peripheral Dizziness — DDx",
          "markdown": "## Peripheral vs Central\n\n| Feature | Peripheral | Central |\n|---|---|---|\n| Onset | Sudden | Gradual or sudden |\n| Severity | Usually severe | Mild–moderate |\n| Nausea/vomiting | Prominent | Variable |\n| Nystagmus | Horizontal + torsional; fatigable; direction-fixed; **suppressed by fixation** | Vertical, pure horizontal, or direction-changing; non-fatigable; **NOT suppressed by fixation** |\n| Hearing loss / tinnitus | May be present (Ménière's, labyrinthitis) | Absent (unless lateral pontine lesion) |\n| Other neuro signs | Absent | Present (diplopia, dysphagia, dysarthria, ataxia, limb weakness) |\n| Duration | Seconds–days | Persistent |\n\n## HINTS Exam — Rule Out Posterior Stroke\n\n**HINTS = Head Impulse, Nystagmus, Test of Skew** — applied to acute vestibular syndrome (continuous vertigo >24h with nystagmus).\n\n| Test | Peripheral (reassuring) | Central (ALARMING — stroke) |\n|---|---|---|\n| **H**ead Impulse | Abnormal — catch-up saccade when head thrust | Normal — no saccade (paradoxically reassuring-looking but worse) |\n| **N**ystagmus | Direction-fixed (horizontal + torsional) | Direction-changing or vertical / pure torsional |\n| **T**est of Skew | Absent | Present — vertical ocular misalignment on cover test |\n\n> [!warning] An **INFARCT pattern** (Impulse Normal, Fast-phase Alternating, Refixation on Cover Test) has >99% sensitivity for posterior circulation stroke — better than early MRI in the first 24–48h.\n\n> [!note] HINTS is for **continuous** vertigo. Do NOT apply to episodic/positional vertigo (BPPV) — false positives.\n\n## Common Peripheral Causes\n\n### BPPV (Benign Paroxysmal Positional Vertigo)\nMost common cause. Brief (<1 min) vertigo triggered by head position change.\n\n- **Diagnosis:** Dix–Hallpike (posterior canal — most common) → upbeat + torsional nystagmus; latency 5–20 s; fatigable.\n- **Treatment: Epley manoeuvre** (>85% success for posterior canal)\n  1. Dix–Hallpike to affected side\n  2. Turn head 90° to opposite side\n  3. Roll body to opposite side (nose down)\n  4. Sit up\n- **Horizontal canal BPPV:** Barbecue roll (log roll).\n\n### Vestibular neuritis / labyrinthitis\nViral; acute severe vertigo for days → weeks. Labyrinthitis = neuritis + hearing loss. Short course oral steroid within 72h may speed recovery.\n\n### Ménière's disease\nEpisodic vertigo (20 min – hours) + fluctuating sensorineural hearing loss + tinnitus + aural fullness. Treat with salt restriction (<2 g/d), diuretic (HCTZ), betahistine 8–16 mg TDS.\n\n### Vestibular migraine\nRecurrent vertigo ± headache in known migraineur. Treat with migraine prophylaxis (propranolol, topiramate).\n\n## Symptomatic Medications\n*(Short-term only — do NOT aid recovery and suppress central compensation)*\n\n- Prochlorperazine 5–10 mg PO/IM TDS — antiemetic + vestibular sedative\n- Betahistine 8–16 mg TDS — primarily for Ménière's\n- Domperidone for nausea (does not cross BBB)\n\n> [!warning] Do not mask a central cause with antiemetics/antihistamines before ruling out stroke. If red flags (sudden severe headache, neurological deficit, unable to walk unaided, HINTS central) — **CT/MRI + neurology**.\n"

          "markdown": "### Targets\n\n| Parameter | Target |\n|---|---|\n| HbA1c | <7.0% (<8.0% elderly/frail/hypoglycaemia-prone) |\n| FBG | 4.0–7.0 mmol/L |\n| 2h post-prandial | 5.0–10.0 mmol/L |\n| BP | <130/80 mmHg |\n| LDL-C | <1.8 (high risk) / <1.4 (very high risk / established CVD) |\n\nReassess HbA1c at 3 months. At maximum tolerated dose of current step → add next agent.\n\n---\n\n### Step 1 — Metformin\n\n| Formulation | Start | Max |\n|---|---|---|\n| Standard release | 500 mg OD evening → 500 mg BD → 1000 mg BD | **2000 mg/day** *(practical; licensed max 2550 mg)* |\n| Extended release (XR) | 500–1000 mg OD with evening meal | **2000 mg OD** |\n\n**Renal / situational adjustments:**\n\n- eGFR 30–45 → max 1000 mg/day, with caution\n- eGFR <30 → **STOP**\n- Hold perioperatively, before contrast, in AKI or sepsis\n\n---\n\n### Step 2 — Add a second agent *(choose by comorbidity)*\n\n| Comorbidity | Preferred add-on |\n|---|---|\n| Established CVD / high CV risk | SGLT2i or GLP-1 RA |\n| CKD (eGFR 25–60, UACR >300) | SGLT2i |\n| HFrEF | SGLT2i (empagliflozin / dapagliflozin) |\n| Obesity | GLP-1 RA or SGLT2i |\n| Low hypoglycaemia risk priority | DPP-4i or SGLT2i or GLP-1 RA |\n| Cost-conscious | DPP-4i or sulphonylurea |\n\n#### SGLT2 inhibitors\n\n| Drug | Start | Max | Notes |\n|---|---|---|---|\n| Empagliflozin | 10 mg OD | **25 mg OD** | |\n| Dapagliflozin | 10 mg OD | **10 mg OD** (fixed) | |\n| Canagliflozin | 100 mg OD | **300 mg OD** | |\n\nAvoid starting if eGFR <30. Hold 3–5 days perioperatively. SE: genital mycotic infections, UTI, euglycaemic DKA (rare in T2DM).\n\n#### GLP-1 receptor agonists\n\n| Drug | Start | Max |\n|---|---|---|\n| Semaglutide SC (Ozempic) | 0.25 mg weekly × 4 wks | **1 mg SC weekly** |\n| Semaglutide oral (Rybelsus) | 3 mg OD × 4 wks | **14 mg OD** *(empty stomach, 30 min before food)* |\n| Dulaglutide (Trulicity) | 0.75 mg SC weekly | **1.5 mg SC weekly** |\n\nSE: nausea/vomiting (transient, improves with titration), pancreatitis (rare).\nCI: personal/family history of medullary thyroid Ca, MEN2.\n\n#### DPP-4 inhibitors\n\n| Drug | Standard | eGFR 30–49 | eGFR <30 |\n|---|---|---|---|\n| Sitagliptin | 100 mg OD | 50 mg OD | 25 mg OD |\n| Vildagliptin | 50 mg BD | — | — |\n\nWeight-neutral, low hypoglycaemia risk. Avoid saxagliptin in HF.\n\n#### Sulphonylureas\n\n| Drug | Start | Max | Notes |\n|---|---|---|---|\n| Gliclazide MR | 30 mg OD | **120 mg OD** | Titrate q4 weeks; preferred SU (lower hypo risk) |\n| Glimepiride | 1 mg OD | **4 mg OD** | |\n| Glipizide | 2.5–5 mg OD | **20 mg/day** | Doses >15 mg divide BD |\n\n> [!danger] Avoid glibenclamide in elderly — prolonged action, high hypoglycaemia risk.\n\n---\n\n### Step 3 — Insulin\n\n**Basal insulin (start here):**\n\n| Drug | Starting dose | Titration |\n|---|---|---|\n| Glargine (Lantus / Toujeo U300) or Detemir (Levemir) | 0.1–0.2 units/kg nocte (or 10 units fixed) | ↑ 2 units every 3 days if FBG >7.0 mmol/L |\n\n**Prandial insulin** (if post-prandial uncontrolled despite optimised basal):\n\n- Novorapid / Humalog 4 units before largest meal\n- Titrate ↑ 1–2 units every 3 days to post-meal BG 5–10 mmol/L\n\n#### Insulin types — duration of action\n\n| Insulin | Onset | Peak | Duration | Use |\n|---|---|---|---|---|\n| Rapid (Novorapid, Humalog, Apidra) | 15 min | 1–2 h | 3–5 h | Mealtime bolus, just before eating |\n| Short / Regular (Actrapid) | 30–60 min | 2–4 h | 6–8 h | Mealtime (inject 30 min before); IV in DKA |\n| Intermediate (NPH / Insulatard) | 2–4 h | 4–10 h | 12–18 h | Basal BD; cheaper but more variable |\n| Long (Glargine, Detemir) | 2–4 h | Flat | 20–24 h | Once-daily basal (glargine), BD (detemir) |\n| Ultra-long (Toujeo U300, Degludec) | 6 h | Very flat | >40 h | Least nocturnal hypo; flexible timing |\n| Premixed (NovoMix 30, Mixtard 30) | 15–30 min | Biphasic | 12–18 h | BD with meals — simpler but less flexible |\n\n> [!note] In CKD / ESRF insulin half-life is prolonged (kidneys clear insulin). Dose requirements often ↓ and hypoglycaemia risk ↑. Monitor BG closely and titrate down.\n\n---\n\n### Drug selection by eGFR\n\n| Class | eGFR 45–60 | eGFR 30–44 | eGFR 15–29 | eGFR <15 / dialysis |\n|---|---|---|---|---|\n| **Metformin** | Reduce dose (max 1 g/day) | Max 500 mg BD, caution | **STOP** | Contraindicated |\n| **SGLT2i** | Glucose-lowering ↓; CV/renal benefit maintained | Glucose-lowering ↓↓; CV/renal benefit continues (empa/dapa to eGFR ~20) | Avoid for glucose-lowering; CV/renal benefit (canagliflozin to eGFR 20) | **Contraindicated** |\n| **GLP-1 RA** | Full dose | Full dose | Full dose | Caution — limited data; generally avoid |\n| **DPP-4i (sitagliptin)** | 100 mg OD | 50 mg OD | 25 mg OD | 25 mg OD (usable on dialysis) |\n| **Sulphonylurea (gliclazide)** | Reduce, monitor hypo | Caution; gliclazide preferred | **Avoid** most SUs | **Avoid** |\n| **Insulin** | Full dose | Full dose | Full dose — often need ↓ (↑t½) | Full dose, careful monitoring |\n| **Pioglitazone** | Full dose | Full dose | Full dose | Avoid (fluid retention, HF) |\n| **Acarbose** | Full dose | Avoid if Cr >177 | Avoid | Avoid |\n\n**If metformin cannot be used** (renal failure, contrast, perioperative, lactic acidosis):\n\n- eGFR 15–29 → DPP-4i (sitagliptin 25 mg OD) + insulin ± pioglitazone (if no HF / oedema)\n- eGFR <15 / dialysis → insulin (primary agent) + sitagliptin 25 mg OD; avoid other orals\n\n> [!warning] In CKD stage 4–5 (eGFR <30), DPP-4i (dose-adjusted sitagliptin) + insulin are the safest combination. Gliclazide is avoided (risk of prolonged severe hypoglycaemia). Most GLP-1 RAs are not well-studied at this stage.\n\n---\n\n### Monitoring schedule\n\n| Test | Frequency |\n|---|---|\n| HbA1c | 3-monthly until stable → 6-monthly |\n| FBG (SMBG) | Daily if on insulin; 2–3 ×/week on OHA |\n| SiDRP (retinal screening) | Annually |\n| Foot exam (monofilament, pulses) | Annually |\n| UACR + eGFR | Annually |\n| Lipids, BP, weight | Annually |\n| Vaccinations | Influenza annually; pneumococcal |\n\n**UACR:** >3 → start ACEi / ARB · >30 → add SGLT2i, consider finerenone\n"

          "slug": "dka-hhs-diagnosis-protocol-monitoring",
          "title": "DKA & HHS — Diagnosis, Protocol & Monitoring",
          "markdown": "### Diagnostic Criteria\n\n| Feature | DKA | HHS |\n|---|---|---|\n| Blood glucose | Usually >14 mmol/L | Usually >33 mmol/L |\n| pH | <7.3 | ≥7.3 |\n| Bicarbonate | <15 mmol/L | ≥15 mmol/L |\n| Ketones | ≥3 mmol/L or 2+ on urine dipstick | <3 mmol/L or absent |\n| Osmolality | Usually <320 mOsm/kg | Usually >320 mOsm/kg |\n| Anion gap | Elevated (>12) | Normal or mildly elevated |\n| Onset | Hours–1 day | Days–weeks |\n\n> [!warning] Mixed DKA+HHS can occur, especially in T2DM. Euglycaemic DKA occurs with SGLT2i — ketones elevated but glucose may be near-normal.\n\n**Effective serum osmolality = 2×Na + glucose (mmol/L)**\n\n**Precipitants (6 I's):** Infection, Infarction, Insufficiency (adrenal), Inadequate insulin, Intoxication, Injection site problems\n\n---\n\n### DKA Management Protocol\n\n#### Fluids (most important intervention)\n\n| Time | Fluid |\n|---|---|\n| 0–30 min | 0.9% NaCl 1 L IV over 30–60 min (if shocked: faster) |\n| 1–4h | 0.9% NaCl 1 L per hour × 2h |\n| 4–8h | 0.9% NaCl 1 L over 2–4h |\n| When BG <14 mmol/L | Switch to 10% dextrose 125 mL/hr alongside 0.9% NaCl (maintain hydration + prevent hypoglycaemia) |\n\n> [!note] Do NOT stop insulin just because glucose falls — ketone clearance takes longer than glucose normalisation. Continue insulin until ketones cleared (ketones <0.6 mmol/L, pH >7.3, HCO₃ >15).\n\n#### Insulin\n\n**Fixed-rate insulin infusion (FRIII):** 0.1 units/kg/hr of soluble insulin (Actrapid)\n\n> [!warning] Do NOT give insulin bolus routinely. Do NOT start insulin before K⁺ is known — if K⁺ <3.5, replace first.\n\n**Stop FRIII when:**\n- Ketones <0.6 mmol/L AND pH >7.3 AND patient eating and drinking\n- Convert to subcutaneous insulin (overlap by 30–60 min before stopping FRIII)\n\n#### Potassium Replacement\n\n| Serum K⁺ | Action |\n|---|---|\n| <3.5 | Replace K⁺ first, hold insulin until K⁺ ≥3.5 |\n| 3.5–5.5 | Add 40 mmol KCl per litre of IV fluid |\n| >5.5 | Do not add K⁺; recheck hourly |\n\n> [!danger] K⁺ falls rapidly as insulin drives K⁺ into cells. Hypokalaemia is the leading cause of death in DKA.\n\n#### Monitoring\n\n| Time | Monitoring |\n|---|---|\n| Hourly | Capillary BG, capillary ketones (if available), fluid balance |\n| 2-hourly | VBG (pH, HCO₃, K⁺) |\n| 4-hourly | Na⁺, K⁺, Cr if VBG not sufficient |\n| Every shift | Clinical review, fluid balance, look for precipitant |\n\n**Resolution criteria (all of):**\n- Ketones <0.6 mmol/L\n- pH >7.3 (or HCO₃ >15)\n- Glucose <14 mmol/L (not a resolution criterion on its own)\n\n---\n\n### HHS Management\n\nSlower correction — over **48–72h** (risk of cerebral oedema if too fast)\n\n**Fluids:**\n- 0.9% NaCl first (even if osmolality high — relative hypovolemia more important)\n- Aim: positive fluid balance of 3–6L in first 12h, rest over next 24–36h\n- Switch to 0.45% NaCl only if Na⁺ not falling despite adequate 0.9% NaCl\n\n**Insulin:** start at LOW dose (0.05 units/kg/hr) ONLY after fluids started\n- Glucose should fall by 5 mmol/L per hour (fluids alone may achieve this)\n- Avoid rapid glucose fall — risk of cerebral oedema\n\n**Osmolality target:** fall by no more than **3–8 mOsm/kg/h**\n\n**Anticoagulation:** LMWH prophylactic dose (high VTE risk in HHS — dehydrated, immobile)\n\n**Potassium:** replace per DKA protocol\n\n---"

          "markdown": "### TSH Interpretation\n\n| TSH | Free T4 | Interpretation |\n|---|---|---|\n| ↑ | Low | Primary hypothyroidism |\n| ↑ | Normal | Subclinical hypothyroidism |\n| Low/undetectable | ↑ | Primary hyperthyroidism |\n| Low | Normal | Subclinical hyperthyroidism |\n| Low | Low | Central hypothyroidism (pituitary/hypothalamic) |\n| Normal | ↑ | Thyroid hormone resistance (rare) |\n\n---\n\n### Hypothyroidism\n\n**Common causes in SG:** Hashimoto's thyroiditis (most common), post-radioiodine/post-thyroidectomy, amiodarone, lithium, subacute thyroiditis (post-inflammatory)\n\n**Symptoms:** fatigue, weight gain, cold intolerance, constipation, dry skin, bradycardia, depression, delayed relaxation of reflexes, myxoedema, periorbital puffiness\n\n**Treatment:**\n- **Levothyroxine (T4):** 1.6 mcg/kg/day starting dose\n  - Elderly or cardiac disease: start 25–50 mcg OD, titrate slowly\n  - Young healthy: can start at full replacement dose 100–125 mcg OD\n- Titrate by 25 mcg every 6–8 weeks; recheck TSH 6–8 weeks after each change\n- Target TSH: 0.5–2.5 mIU/L (tighter in pregnancy)\n- Take on empty stomach, 30–60 min before breakfast; separate from Ca²⁺, iron, PPIs (↓absorption)\n\n**Subclinical hypothyroidism (TSH elevated, T4 normal):**\n- Treat if: TSH >10, symptoms, pregnancy, fertility planning, cardiac risk factors\n- Monitor if TSH 4.5–10, asymptomatic\n\n---\n\n### Hyperthyroidism\n\n**Common causes in SG:** Graves' disease (most common, ~70–80%), toxic multinodular goitre, toxic adenoma, subacute thyroiditis (painful, post-viral), amiodarone-induced\n\n**Graves' disease specific:** exophthalmos (proptosis), pretibial myxoedema, thyroid acropachy, diffuse goitre, TSH receptor antibodies (TRAb)\n\n**Symptoms:** weight loss, heat intolerance, tremor, palpitations/AF, diarrhoea, anxiety, sweating, proximal myopathy, lid lag\n\n**Investigations:** TSH, free T4, free T3, TRAb (if Graves' suspected), thyroid USS + technetium scan (differentiate Graves' vs toxic nodule vs thyroiditis)\n\n**Treatment options:**\n1. **Anti-thyroid drugs (ATD)** — first-line for Graves'\n   - Carbimazole 20–40 mg OD (titrate down to 5–10 mg OD maintenance) OR\n   - Propylthiouracil (PTU) 100–150 mg TDS (preferred in pregnancy — 1st trimester)\n   - Monitor FBC (agranulocytosis — rare, 0.3%; warn patient to stop and seek care if fever/sore throat)\n   - Duration: 12–18 months then trial of withdrawal; ~50% relapse\n2. **Radioiodine (I-131):** definitive; avoid in pregnancy, moderate-severe ophthalmopathy, lactation; causes hypothyroidism ~50–90% (need lifelong T4)\n3. **Surgery (thyroidectomy):** large goitre, malignancy suspicion, ophthalmopathy, failed ATD/radioiodine\n\n**Symptomatic control:** propranolol 10–40 mg TDS (reduces HR, tremor, symptoms) while awaiting ATD effect\n\n---\n\n### Thyroid Storm\n\n> [!danger] Endocrine emergency — mortality 10–20%\n\n**Burch-Wartofsky Score:** ≥45 = highly suggestive of thyroid storm\n\n**Features:** hyperthermia (>38.5°C), severe tachycardia/AF, hypertension, agitation/psychosis/coma, N/V/diarrhoea, jaundice, heart failure\n\n**Precipitants:** infection, surgery, iodine load (contrast), non-compliance with ATD, MI, trauma\n\n**Management:**\n1. **PTU 500–1000 mg loading → 250 mg q4–6h** (blocks synthesis AND T4→T3 conversion; preferred over carbimazole in storm)\n2. **Iodine** (1h AFTER PTU — blocks release): Lugol's iodine 5–10 drops TDS or potassium iodide 5 drops q6h\n3. **Propranolol 60–80 mg q4–6h oral** or **1–2 mg IV** (controls HR, blocks T4→T3 conversion)\n4. **Hydrocortisone 100 mg IV q8h** (↓T4→T3 conversion, treat relative adrenal insufficiency)\n5. **Treat precipitant** (antibiotics if infection)\n6. **Cooling, IV fluids, oxygen, monitoring in ICU**\n7. Cholestyramine: can be added to reduce enterohepatic recycling of thyroid hormones\n\n---\n\n### Myxoedema Coma\n\n> [!danger] Endocrine emergency — mortality 20–40%\n\n**Features:** hypothermia, bradycardia, hypotension, hyponatraemia, hypoglycaemia, respiratory failure, GCS ↓\n\n**Precipitants:** cold exposure, infection, sedatives/opioids, non-compliance\n\n**Management:**\n1. **IV T4 (levothyroxine) 200–400 mcg IV loading → 50–100 mcg IV OD** (IV if unconscious/absorbing poorly)\n2. **IV T3 (liothyronine) 5–20 mcg IV** (faster acting; can use if severe) ± T4\n3. **Hydrocortisone 100 mg IV q8h** (always give before T4 — risk of adrenal crisis)\n4. **Rewarm passively** (active external warming → vasodilation → shock)\n5. **Treat precipitant**, glucose, fluid correction, mechanical ventilation if needed\n\n---"

          "title": "Endocrinology — Adrenal, Pituitary & PCOS",
          "markdown": "### Adrenal Insufficiency\n\n**Primary (Addison's):** adrenal gland destruction — low cortisol + low aldosterone → ACTH elevated (skin hyperpigmentation)\n- Causes: autoimmune (most common in developed world), TB (common in SG), metastases, adrenal haemorrhage (Waterhouse-Friderichsen — meningococcaemia)\n\n**Secondary/Tertiary:** pituitary or hypothalamic failure → low ACTH → low cortisol. NO aldosterone deficiency. NO skin hyperpigmentation.\n- Common cause: **exogenous steroid withdrawal** (most common cause of secondary AI — iatrogenic)\n\n**Features:** fatigue, postural hypotension, weight loss, nausea, anorexia, salt craving\n**Primary specific:** hyperpigmentation (ACTH stimulates melanocyte receptors), hyponatraemia + hyperK + metabolic acidosis (↓aldosterone)\n\n**Investigations:**\n- Morning cortisol (8–9am):\n  - <100 nmol/L: likely AI\n  - >500 nmol/L: AI unlikely\n  - 100–500 nmol/L: **Short Synacthen Test (SST)** needed\n- SST: 250 mcg synthetic ACTH IM/IV → cortisol at 0, 30, 60 min. Peak <550 nmol/L = abnormal.\n- ACTH level: elevated (primary) vs low/normal (secondary)\n- Adrenal USS/CT: TB, infiltration, haemorrhage, metastases\n\n**Treatment:**\n- **Hydrocortisone** 15–25 mg/day oral in divided doses (10 mg morning, 5 mg early afternoon)\n  - Sick-day rules: **double dose** during illness (fever, vomiting, minor surgery) → seek medical help if not improving\n  - **Adrenal crisis:** hydrocortisone 100 mg IM/IV STAT → 200 mg/24h continuous IV or q6h bolus + 0.9% NaCl IVF + glucose (hypoglycaemia common)\n- **Fludrocortisone** (primary AI only): 50–200 mcg OD (mineralocorticoid replacement)\n- Medical alert bracelet + emergency injection kit\n\n---\n\n### Cushing's Syndrome\n\n**Causes:**\n1. **Exogenous steroids** (most common overall)\n2. Pituitary ACTH-secreting adenoma → bilateral adrenal hyperplasia (**Cushing's disease** ~70% of endogenous)\n3. Ectopic ACTH (small cell lung Ca, carcinoid, phaeochromocytoma — ~15%)\n4. Adrenal adenoma/carcinoma (~15%)\n\n**Features:** central obesity, moon face, buffalo hump, purple striae (>1cm), proximal myopathy, easy bruising, acne, hirsutism, hypertension, diabetes, osteoporosis, depression/psychosis, irregular menses\n\n**Screening tests (any one abnormal → further workup):**\n1. **24h urine free cortisol** (>3× ULN = abnormal) — most reliable\n2. **1mg overnight dexamethasone suppression test (DST):** give 1 mg dex at midnight → 8am cortisol. Normal: cortisol <50 nmol/L. Failure to suppress (>138 nmol/L) = Cushing's.\n3. **Late-night salivary cortisol** (cortisol normally nadir at midnight; Cushing's = loss of diurnal rhythm)\n\n**Localisation:**\n- ACTH level: high (ACTH-dependent: pituitary or ectopic) vs suppressed (ACTH-independent: adrenal)\n- **If ACTH-dependent:** 8mg high-dose DST + pituitary MRI + inferior petrosal sinus sampling (IPSS — gold standard to distinguish pituitary vs ectopic)\n- **If ACTH-independent:** adrenal CT\n\n**Treatment:**\n- Cushing's disease: transsphenoidal surgery (first-line)\n- Ectopic ACTH: treat primary tumour; adrenal enzyme inhibitors (metyrapone, ketoconazole) if inoperable\n- Adrenal adenoma: laparoscopic adrenalectomy\n\n---\n\n### Phaeochromocytoma / Paraganglioma\n\n> [!danger] Rare but dangerous — hypertensive crises can be fatal. Rule out before any surgery in patient with episodic HTN, headache, and sweating.\n\n**Classic triad:** episodic headache + sweating + palpitations (in hypertensive patient)\n**Hypertension:** paroxysmal (50%) or sustained (50%); resistant to usual medications\n**10% rule:** 10% bilateral, 10% extra-adrenal (paraganglioma), 10% malignant, 10% in children — less true with genetic testing\n\n**Investigations:**\n- **24h urine metanephrines** (sensitivity ~98%) — first-line screening\n- **Plasma fractionated metanephrines** (sensitivity ~99%, slightly less specific)\n- CT/MRI adrenal (localisation after biochemical confirmation)\n- MIBG scan (metastatic/extra-adrenal disease)\n- Genetic testing (20–30% hereditary: VHL, RET, NF1, SDHB/C/D — SDHB = high malignant risk)\n\n**Management:**\n- **Alpha-blockade FIRST** (phenoxybenzamine 10 mg BD → titrate, or doxazosin 2–8 mg OD) — 10–14 days before surgery\n- **THEN add beta-blockade** (only after adequate alpha-blockade — never BB first, causes paradoxical HTN)\n- High-salt, high-fluid diet during alpha-blockade\n- **Laparoscopic adrenalectomy** (definitive)\n- Hypertensive crisis (intraoperative or spontaneous): phentolamine 2–5 mg IV or nitroprusside infusion\n\n---\n\n### Primary Hyperaldosteronism (Conn's Syndrome)\n\nMost common cause of secondary hypertension (~5–10% of hypertensive patients)\n\n**Suspect in:** resistant HTN (≥3 agents), HTN + hypokalaemia (spontaneous K⁺ <3.5 or easy hypokalaemia on diuretics), young-onset HTN (<40), adrenal incidentaloma + HTN\n\n**Screening:** **Aldosterone-to-Renin Ratio (ARR)**\n- Prepare: correct K⁺, stop spironolactone/eplerenone ≥4 weeks, stop ACEi/ARB ≥2 weeks (can give amlodipine or verapamil — safe)\n- ARR >750 pmol/L per ng/mL/h (or equivalent, lab-dependent) = positive screening\n\n**Confirmation:** fludrocortisone suppression test OR salt loading test\n\n**Subtype differentiation:**\n- **Adrenal CT** (50% miss small adenomas)\n- **Adrenal vein sampling (AVS)** — gold standard for lateralisation; determines unilateral vs bilateral\n\n**Treatment:**\n- Unilateral adenoma (APA): **laparoscopic adrenalectomy** (curative in ~50%)\n- Bilateral hyperplasia (IHA): **spironolactone** 25–100 mg OD (or eplerenone if gynaecomastia)\n\n---\n\n### Pituitary Disorders\n\n#### Hypopituitarism\n\n**Causes:** pituitary adenoma (most common — mass effect), craniopharyngioma, pituitary apoplexy (infarction/haemorrhage into adenoma — sudden headache + visual loss + ophthalmoplegia), post-surgery/radiation, Sheehan's (post-partum infarction), infiltrative (sarcoid, haemochromatosis)\n\n**Order of GH/LH/FSH/TSH/ACTH loss (most vulnerable first):**\nGH → LH/FSH → TSH → ACTH (ACTH last, most life-threatening to miss)\n\n**Investigations:** morning cortisol (ACTH), TSH + free T4 (TSH), LH/FSH + testosterone/oestradiol, IGF-1 (GH), prolactin, MRI pituitary (with gadolinium)\n\n**Treatment:** replace deficient hormones\n- Cortisol deficiency: hydrocortisone (as above) — most urgent\n- Thyroid: levothyroxine (start after cortisol replaced — don't start T4 alone if ACTH-deficient)\n- Gonadal: testosterone (men), oestrogen/progesterone (premenopausal women) or fertility Rx (FSH/LH injections)\n- GH: somatropin SC (adults — if significant QoL impact and no contraindication)\n\n#### Prolactinoma\n\nMost common pituitary adenoma. Elevated prolactin → hypogonadism (infertility, amenorrhoea, galactorrhoea in women; impotence, gynaecomastia in men)\n\n**Causes of hyperprolactinaemia:**\n- Physiological: pregnancy, breastfeeding\n- Drugs: **dopamine antagonists** (metoclopramide, domperidone, antipsychotics — haloperidol, risperidone) — most common cause of hyperprolactinaemia in clinical practice\n- Hypothyroidism (TRH stimulates prolactin)\n- Pituitary stalk compression (any macroadenoma — \"stalk effect\")\n- Prolactinoma (usually elevated >200 mU/L, often >1000 with macroprolactinoma)\n\n**Treatment:** **dopamine agonists** (first-line — medical, not surgery)\n- Cabergoline 0.5 mg twice weekly → 1–2 mg twice weekly (preferred — better tolerated, more effective than bromocriptine)\n- Bromocriptine 1.25 mg nocte → 2.5–15 mg/day (older; more SE; preferred in pregnancy — more data)\n- Surgery (transsphenoidal): only if drug intolerance or resistance, visual compromise not responding\n\n#### Acromegaly\n\nGH-secreting adenoma in adult → insulin resistance, organomegaly, soft tissue hypertrophy, bony changes\n\nFeatures: coarse facial features, large hands/feet, macroglossia, prognathism, carpal tunnel syndrome, DM, HTN, OSA, colonic polyps, ↑cardiovascular mortality\n\n**Diagnosis:** IGF-1 (best screening) + failure to suppress GH below 1 μg/L after 75g OGTT (gold standard)\n\n**Treatment:** transsphenoidal surgery (first-line) → if incomplete: somatostatin analogues (octreotide LAR monthly or lanreotide) → pegvisomant (GH receptor antagonist) → radiotherapy\n\n---\n\n### Polycystic Ovary Syndrome (PCOS)\n\n**Rotterdam criteria (2 of 3):**\n1. Oligo/anovulation (irregular cycles)\n2. Clinical/biochemical hyperandrogenism (acne, hirsutism, ↑free testosterone)\n3. Polycystic ovaries on USS (≥12 follicles 2–9mm per ovary, OR ovarian volume >10 mL)\n\n**Associations:** insulin resistance (~70%), obesity, dyslipidaemia, ↑T2DM risk, ↑cardiovascular risk, endometrial cancer (anovulation → unopposed oestrogen), depression, OSA\n\n**Investigations:** LH/FSH (elevated LH:FSH ratio), testosterone (free testosterone or calculated free androgen index), DHEAS (adrenal androgen), prolactin (to exclude prolactinoma), TSH (hypothyroidism), 17-OHP (CAH if severe hyperandrogenism), fasting glucose/HbA1c, lipids, USS pelvis\n\n**Management by concern:**\n\n| Concern | Treatment |\n|---|---|\n| **Menstrual regulation** | Combined oral contraceptive (COCP) — regulates cycles, reduces androgen, protects endometrium |\n| **Hirsutism/acne** | COCP ± anti-androgen: spironolactone 50–200 mg OD or cyproterone acetate |\n| **Fertility** | Lifestyle (weight loss restores ovulation in many); clomiphene citrate (first-line ovulation induction); letrozole (aromatase inhibitor — may be superior to clomiphene); gonadotrophins (FSH injections); IVF if failed |\n| **Metabolic** | Weight loss (even 5–10% improves ovulation, insulin resistance, androgens); metformin 1–2g/day (improves insulin resistance, restores cycles — not FDA-approved for PCOS but widely used) |\n| **Endometrial protection** | Progestogen (norethisterone or OCP) to induce withdrawal bleed if infrequent periods (every 3 months minimum) |\n\n---"

          "title": "Liver Disease — LFT Interpretation, Hepatitis & Cirrhosis",
          "markdown": "### LFT Interpretation — Hepatocellular vs Cholestatic\n\n```\nHEPATOCELLULAR PATTERN:          CHOLESTATIC PATTERN:\n  ALT/AST >> ALP/GGT               ALP/GGT >> ALT/AST\n\n  ALT: >3× ULN prominent           ALP: >3× ULN prominent\n  AST: elevated (AST>ALT in          (ALP elevated: bile duct obstruction,\n       alcohol, cirrhosis)            infiltrative disease, bone)\n  ALP: mildly elevated              GGT: confirms ALP is hepatic\n                                    (GGT elevated = hepatic; GGT normal = bone)\n  \n  Examples:                         Examples:\n  - Viral hepatitis                 - Choledocholithiasis (bile duct stones)\n  - Drug-induced hepatitis          - Cholangiocarcinoma\n  - Autoimmune hepatitis            - Primary sclerosing cholangitis (PSC)\n  - Ischaemic hepatitis             - Primary biliary cholangitis (PBC)\n  - MAFLD                           - Drug-induced cholestasis (co-amoxiclav, flucloxacillin)\n  - Alcoholic hepatitis             - Intrahepatic cholestasis of pregnancy\n```\n\n### R-Ratio (Hepatocellular vs Cholestatic)\n\n```\nR = (ALT / ULN) ÷ (ALP / ULN)\n\nR > 5:   Hepatocellular pattern\nR < 2:   Cholestatic pattern\nR 2–5:   Mixed pattern\n```\n\n---\n\n### Degree of LFT Elevation — What to Think\n\n| ALT Elevation | Interpretation |\n|---|---|\n| <3× ULN | Mild — likely MAFLD, medication, thyroid, coeliac, muscle (check CK) |\n| 3–10× ULN | Moderate — viral hepatitis, drug-induced, alcohol, autoimmune |\n| >10× ULN | Severe — acute viral hepatitis, ischaemic hepatitis (\"shock liver\"), drug toxicity (paracetamol), autoimmune |\n| >100× ULN | Ischaemic hepatitis, acute paracetamol toxicity, autoimmune |\n\n> [!note] ALT is more liver-specific than AST. AST also elevated in: myocardial infarction, rhabdomyolysis, haemolysis.\n\n**AST:ALT ratio:**\n- >2:1 → alcoholic liver disease (AST predominantly from mitochondria — alcohol damages mitochondria)\n- <1:1 → viral hepatitis, MAFLD\n- >3:1 → strongly suggests alcoholic hepatitis\n\n---\n\n### Bilirubin\n\n| Pattern | Cause |\n|---|---|\n| Unconjugated (indirect) ↑ | Haemolysis (↑production), Gilbert's syndrome (↓conjugation — benign, fasting-induced), neonatal jaundice |\n| Conjugated (direct) ↑ | Hepatocellular disease, biliary obstruction (intrahepatic or extrahepatic) |\n| Both ↑ | Severe hepatocellular disease |\n\n**Gilbert's syndrome:** benign autosomal recessive. UGT1A1 mutation. Intermittent unconjugated hyperbilirubinaemia with fasting, illness, exercise. Normal LFTs. No treatment needed. Reassure.\n\n---\n\n### Synthetic Function (Severity Markers)\n\n| Marker | What It Measures | Notes |\n|---|---|---|\n| Albumin | Chronic synthetic function | Half-life 20 days — reflects chronic liver disease |\n| PT/INR | Acute synthetic function | Half-life of clotting factors hours–days — reflects acute disease |\n| Bilirubin | Excretory function | |\n\n**Child-Pugh Score (cirrhosis severity):**\n\n| Variable | 1 pt | 2 pts | 3 pts |\n|---|---|---|---|\n| Bilirubin (μmol/L) | <34 | 34–50 | >50 |\n| Albumin (g/L) | >35 | 28–35 | <28 |\n| PT prolongation (sec) | <4 | 4–6 | >6 |\n| Ascites | None | Mild | Moderate-severe |\n| Encephalopathy | None | Grade 1–2 | Grade 3–4 |\n\nClass A (5–6): well-compensated | Class B (7–9): significant | Class C (10–15): decompensated\n\n---\n\n### Approach to Abnormal LFTs\n\n**First step — pattern analysis:**\n1. Calculate R-ratio (hepatocellular vs cholestatic)\n2. Severity (degree of elevation)\n3. Acuity (acute vs chronic)\n\n**Second step — targeted workup:**\n\n*Hepatocellular:*\n- Hepatitis B (HBsAg, HBeAg, HBV DNA), Hepatitis C (anti-HCV, HCV RNA)\n- Hepatitis A IgM (acute), Hepatitis E IgM (travel, pregnancy)\n- ANA, anti-SMA, IgG (autoimmune hepatitis)\n- Ferritin, transferrin saturation (haemochromatosis — common in Chinese)\n- Caeruloplasmin, slit-lamp (Wilson's disease — young patient)\n- Alpha-1 antitrypsin\n- USS liver (fatty liver, cirrhosis, HCC)\n- Drug/alcohol history\n\n*Cholestatic:*\n- USS abdomen (dilated bile ducts = extrahepatic obstruction)\n- MRCP / ERCP if USS shows dilatation\n- AMA (anti-mitochondrial Ab) → PBC\n- p-ANCA, IgG4 → PSC, IgG4 cholangiopathy\n- ALP isoforms (bone ALP vs hepatic) if GGT normal\n- ERCP/MRCP for structural cause\n\n---\n\n### Hepatitis B — Singapore Context & Management\n\n> [!note] SG HBV prevalence ~3–4%. All newborns vaccinated since 1985. High risk: Chinese, Malay; immigrants from endemic regions.\n\n**Serology interpretation:**\n\n| HBsAg | HBeAg | HBV DNA | Anti-HBs | Anti-HBc | Interpretation |\n|---|---|---|---|---|---|\n| + | + | High | − | + | Chronic HBV, high replication (HBeAg+) |\n| + | − | Low/undetectable | − | + | Chronic HBV, low replication (inactive carrier) |\n| + | − | Detectable | − | + | HBeAg-negative chronic HBV (precore mutation) |\n| − | − | − | + | − | Vaccinated (no natural infection) |\n| − | − | − | + | + | Resolved infection + natural immunity |\n| − | − | − | − | + (IgM) | Acute HBV |\n| − | − | − | − | + (IgG) | Past infection, no immunity |\n\n**Treatment thresholds (MOH/APASL guidelines):**\nTreat if: HBV DNA >2000 IU/mL + elevated ALT, OR HBV DNA >20,000 IU/mL regardless of ALT, OR significant fibrosis (APRI/FIB-4/biopsy), OR cirrhosis (any detectable HBV DNA)\n\n**First-line antiviral:**\n- **Tenofovir disoproxil fumarate (TDF) 300 mg OD** — high barrier to resistance; preferred\n  - Monitor: renal function, bone density (long-term)\n- **Tenofovir alafenamide (TAF) 25 mg OD** — less nephrotoxic/bone SE; preferred if CKD/osteoporosis\n- **Entecavir 0.5 mg OD** (1 mg OD if lamivudine-resistant) — alternative to tenofovir\n\n**HCC surveillance:** USS liver + AFP every 6 months (all chronic HBV regardless of HBV DNA)\n\n**Prophylaxis during immunosuppression:** reactivation risk — check HBsAg + anti-HBc before chemotherapy/biologics. If HBsAg+: start prophylactic entecavir/TDF. If anti-HBc+ HBsAg−: monitor closely or prophylax depending on immunosuppression level.\n\n---\n\n### Hepatitis C\n\n- Prevalence ~0.4% in SG (lower than HBV)\n- Routes: blood-borne (IVDU, transfusion pre-1992, tattoos, healthcare exposure)\n- **Screening:** anti-HCV. If positive → HCV RNA (confirms active infection)\n- **Genotype:** determines treatment duration (genotype 1 most common globally)\n\n**Direct-acting antivirals (DAA) — curative ~95–99%:**\n- **Sofosbuvir/velpatasvir (Epclusa) 400/100 mg OD × 12 weeks** — pan-genotypic (all genotypes)\n- **Glecaprevir/pibrentasvir (Maviret) 300/120 mg OD × 8 weeks** — pan-genotypic, shortest duration\n- **Sofosbuvir/ledipasvir (Harvoni) × 8–12 weeks** — genotype 1 primarily\n\n> [!note] Treat all patients with chronic HCV — cure eliminates transmission, prevents cirrhosis/HCC. No vaccine available.\n\n**Sustained virological response (SVR):** HCV RNA undetectable 12 weeks post-treatment = cured\n\n---\n\n### Cirrhosis — Complications & Management\n\n**Causes in SG:** HBV (most common), alcohol, MAFLD, HCV, autoimmune, cryptogenic\n\n**Diagnosis:** clinical + USS (nodular liver, portal hypertension) + non-invasive fibrosis markers (FIB-4, FibroScan/Fibroscan) ± liver biopsy\n\n---\n\n#### Ascites\n\n**Pathophysiology:** portal HTN + hypoalbuminaemia → splanchnic vasodilation → ↓effective circulating volume → renin-angiotensin-aldosterone activation → Na/water retention\n\n**Diagnosis:** USS + diagnostic paracentesis (all new ascites)\n- **SAAG (serum-ascites albumin gradient)** = serum albumin − ascites albumin\n  - SAAG ≥11 g/L → portal hypertension (cirrhosis, Budd-Chiari, heart failure)\n  - SAAG <11 g/L → not portal HTN (malignancy, TB, nephrotic)\n- Ascitic protein <25 g/L + SAAG ≥11 → cirrhosis\n\n**Management:**\n- Dietary Na restriction <2g/day (most important)\n- **Spironolactone** 100 mg OD → max 400 mg OD (first-line; anti-aldosterone)\n- **Furosemide** 40 mg OD → max 160 mg OD (add to spironolactone; ratio 100:40)\n- Target weight loss: 0.5 kg/day (ascites only) or 1 kg/day (+ peripheral oedema)\n- **Refractory ascites** (not responding to max diuretics): therapeutic paracentesis ± TIPS\n  - Large-volume paracentesis (>5L): give albumin 6–8 g per litre removed (prevents post-paracentesis circulatory dysfunction)\n\n#### Spontaneous Bacterial Peritonitis (SBP)\n\n**Diagnosis:** ascitic fluid PMN >250 cells/μL (treat empirically without waiting for culture)\n\n**Treatment:** ceftriaxone 2g IV OD × 5 days + albumin 1.5 g/kg day 1, 1 g/kg day 3 (reduces hepatorenal syndrome risk — SORT trial)\n\n**Prophylaxis:**\n- Primary (ascitic protein <15 g/L + Child-Pugh B/C or bilirubin >50): norfloxacin 400 mg OD\n- Secondary (after first SBP): norfloxacin 400 mg OD indefinitely (or until liver transplant)\n\n#### Hepatic Encephalopathy (HE)\n\n**West Haven grades:**\n- Grade 1: Subtle personality change, mild confusion\n- Grade 2: Lethargy, asterixis, inappropriate behaviour\n- Grade 3: Somnolent but rousable, gross confusion, asterixis\n- Grade 4: Coma (unresponsive)\n\n**Precipitants (TIPS mnemonic):** **T**ransgression (protein binge), **I**nfection (SBP), **P**ortal/GI bleed, **S**edatives/drugs, constipation, hyponatraemia, HyperK, dehydration\n\n**Management:**\n- Identify and treat precipitant\n- **Lactulose** 30–45 mL TDS–QID (target 2–3 soft stools/day) — reduces NH3 absorption\n- **Rifaximin** 550 mg BD (non-absorbable antibiotic — reduces gut bacteria; prevents recurrence)\n- Low protein diet: AVOID (causes malnutrition); use BCAA-enriched diet if tolerated\n- Zinc supplementation (deficient in cirrhosis)\n\n#### Hepatorenal Syndrome (HRS)\n\n**HRS-AKI (Type 1 — formerly):** Rapid deterioration (Cr doubles to >226 μmol/L in <2 weeks). High mortality without liver transplant.\n\n**HRS-CKD (Type 2 — formerly):** Slower, moderate renal impairment. Better prognosis.\n\n**Diagnosis:** exclude other causes of AKI (hypovolaemia, drugs, intrinsic renal disease)\n- No improvement after 48h of albumin challenge (1g/kg/day) and diuretic withdrawal\n- Cr >133 μmol/L; no proteinuria; normal USS\n\n**Treatment:**\n- **Terlipressin** 0.5–2 mg IV q4–6h + albumin 20–40 g/day (CONFIRM trial — reduces need for RRT)\n- **Noradrenaline** infusion + albumin (alternative if terlipressin unavailable/expensive)\n- **Midodrine** + octreotide + albumin (oral outpatient option — less effective)\n- RRT as bridge to liver transplant\n- **Liver transplant** — only definitive treatment\n\n#### Variceal Bleeding\n*(See [[#Upper GI Bleed — Assessment, Scoring & Management]])*\n\n#### HCC Surveillance\nUSS + AFP every 6 months — all cirrhotic patients regardless of aetiology\n\n---\n\n### Acute Liver Failure (ALF)\n\n**Definition:** acute liver injury + coagulopathy (INR ≥1.5) + hepatic encephalopathy — in a patient WITHOUT prior liver disease\n\n**Causes in SG:**\n- Paracetamol overdose (most common in West — increasing in SG)\n- Viral (HBV — reactivation or acute; HAV; HEV especially in pregnancy)\n- Drug-induced (isoniazid, anti-epileptics, herbal remedies — high use in SG)\n- Autoimmune hepatitis (acute presentation)\n- Ischaemic (shock liver)\n- Wilson's disease (young patient, Coombs-negative haemolytic anaemia + ALF)\n- Acute fatty liver of pregnancy / HELLP syndrome\n\n**King's College Criteria** (poor prognosis — referral for liver transplant):\n\n*Paracetamol-induced:*\n- pH <7.3 (after resuscitation), OR\n- All three: PT >100s (INR >6.5) + Cr >300 μmol/L + Grade 3–4 encephalopathy\n\n*Non-paracetamol:*\n- PT >100s (INR >6.5) regardless of encephalopathy, OR\n- Any three of: age <10 or >40, jaundice to encephalopathy >7 days, PT >50s (INR >3.5), bilirubin >300 μmol/L, unfavourable aetiology (seronegative, drug-induced)\n\n**Management:**\n- **N-acetylcysteine (NAC):** paracetamol OD — 150 mg/kg IV over 1h → 50 mg/kg over 4h → 100 mg/kg over 16h. Also consider in non-paracetamol ALF (antioxidant effect — ALFSG trial: improved transplant-free survival in early HE)\n- Treat precipitant (antivirals for HBV, steroids for autoimmune if appropriate)\n- **Supportive ICU care:** ICP monitoring (grade 3–4 HE), mannitol for cerebral oedema, correct coagulopathy only if bleeding (avoid FFP prophylactically — masks prognosis), glucose infusion, lactulose for HE\n- **Urgent liver transplant referral** if meeting King's College Criteria\n\n---"

          "markdown": "### Inflammatory Bowel Disease (IBD)\n\n#### Crohn's Disease vs Ulcerative Colitis\n\n| Feature | Crohn's Disease | Ulcerative Colitis |\n|---|---|---|\n| Location | Any part of GI tract (mouth to anus); often terminal ileum + right colon | Colon only; starts at rectum, extends proximally |\n| Pattern | Skip lesions (patchy) | Continuous |\n| Depth | Transmural (full thickness) | Mucosal only |\n| Perianal disease | Common (fistulae, abscesses) | Rare |\n| Smoking | Risk factor | Protective (paradoxically) |\n| Bloody diarrhoea | Variable | Hallmark |\n| Obstruction | Common (strictures) | Less common |\n| Fistulae | Yes (enterocutaneous, enterovesical) | No |\n| Cancer risk | ↑ (colonic) | ↑↑ (pancolitis >10 years) |\n| Surgery curative | No (recurs) | Yes (colectomy) |\n\n**Investigations:** colonoscopy + biopsy (gold standard); CRP, faecal calprotectin (disease activity); MRI small bowel (Crohn's extent); CT (complications: abscess, perforation)\n\n**Histology:**\n- Crohn's: granulomas (classic but only 30%), transmural inflammation\n- UC: crypt abscesses, continuous mucosal inflammation, no granulomas\n\n---\n\n#### UC — Management\n\n**Mild-Moderate (TRUELOVE criteria: ≤4 stools/day, minimal bleeding, no systemic features):**\n- **Mesalazine (5-ASA)** 2.4–4.8 g/day oral + mesalazine suppository/enema (rectal component essential)\n- Proctitis: suppository 1g OD; left-sided: enema; extensive: oral + enema\n\n**Moderate-Severe (>4 stools/day, or systemic features):**\n- Oral prednisolone 40 mg OD → taper over 8 weeks\n- Start thiopurine (azathioprine 2–2.5 mg/kg/day or 6-mercaptopurine 1–1.5 mg/kg/day) as steroid-sparing\n- Check TPMT activity before starting thiopurine (TPMT deficiency → myelosuppression)\n\n**Biologic therapy (moderate-severe failing conventional):**\n- **Infliximab (anti-TNF)** 5 mg/kg IV at 0, 2, 6 weeks → q8 weekly maintenance\n- **Vedolizumab** (anti-integrin) 300 mg IV 0, 2, 6 weeks → q8 weekly (gut-selective, safer infections)\n- **Ustekinumab** (anti-IL12/23) — also used\n- **Tofacitinib** (JAK inhibitor) 10 mg BD × 8 weeks → 5 mg BD maintenance (oral — convenient; caution thrombosis/infections)\n\n**Acute severe UC (hospitalised):**\n- IV hydrocortisone 100 mg q6h × 3 days → if no response → **IV ciclosporin** or **infliximab rescue**\n- Avoid: NSAIDs, antidiarrhoeals (precipitate toxic megacolon)\n- Toxic megacolon (transverse colon >6cm): surgery urgently\n\n---\n\n#### Crohn's Disease — Management\n\n**Induction:**\n- Mild-moderate: prednisolone 40 mg OD → taper; budesonide 9 mg OD (ileal/right colonic Crohn's — less systemic SE)\n- 5-ASA: less effective than in UC\n\n**Maintenance (prevent relapse):**\n- **Azathioprine** 2–2.5 mg/kg/day or 6-MP (check TPMT first)\n- **Methotrexate** 25 mg SC/IM weekly × 16 weeks → 15 mg SC weekly maintenance\n\n**Biologics (moderate-severe, fistulating, steroid-dependent/refractory):**\n- Anti-TNF: infliximab (IV) or adalimumab (40 mg SC q2 weeks) — combine with azathioprine (↑efficacy, ↓antibody formation)\n- Vedolizumab | Ustekinumab | Risankizumab (newer IL-23 inhibitor)\n\n**Perianal fistula:** antibiotics (metronidazole/ciprofloxacin) + seton drain + infliximab + surgery (advance flap, LIFT procedure)\n\n**Nutritional support:** exclusive enteral nutrition (EEN) in children; important in active Crohn's; screen for B12/iron/folate/zinc/Vit D deficiency\n\n---\n\n### Acute Pancreatitis\n\n**Causes in SG:** gallstones (most common ~60%), alcohol (~20%), idiopathic, hypertriglyceridaemia (TG >11.3 mmol/L), post-ERCP, drugs (valproate, azathioprine, thiazides), hypercalcaemia, trauma\n\n**Diagnosis:** ≥2 of: (1) clinical features, (2) lipase/amylase >3× ULN, (3) imaging (CT/USS)\n\n> [!note] Lipase is more sensitive and specific than amylase for pancreatitis. Amylase also elevated in: salivary disease, perforated viscus, bowel obstruction.\n\n**Severity (Modified Atlanta Classification):**\n- Mild: no organ failure, no local complications\n- Moderately severe: transient organ failure (<48h) or local complications\n- Severe: persistent organ failure (>48h) — mortality ~20–40%\n\n**BISAP Score (at admission — score ≥3 = severe):**\n- BUN >25 mg/dL (>8.9 mmol/L)\n- Impaired mental status\n- SIRS criteria present (≥2 of: temp >38 or <36, HR >90, RR >20, WBC >12 or <4 or bands >10%)\n- Age >60\n- Pleural effusion on imaging\n\n**CT Severity Index (Balthazar score):** used at 48–72h if not improving\n\n---\n\n**Management:**\n\n**Fluid resuscitation:** \n- 250–500 mL/hr lactated Ringer's (Hartmann's) — LR preferred over NS (WATERFALL trial: lower SIRS with LR)\n- Target: UO >0.5 mL/kg/hr, HR <100, MAP >65\n- Avoid aggressive overresuscitation (abdominal compartment syndrome)\n\n**Analgesia:** regular paracetamol + NSAIDs; opioids (morphine or fentanyl) if severe. Avoid ketorolac routinely.\n\n**Nutrition:**\n- Mild: oral intake within 24h (clear liquids → soft diet as tolerated — no need to wait for resolution)\n- Severe/cannot eat: nasojejunal (NJ) or nasogastric (NG) enteral feeding within 48h — superior to parenteral (reduces infections, organ failure)\n- TPN: only if enteral route not feasible\n\n**Antibiotics:** NOT routinely. Only if: infected pancreatic necrosis (fever persisting >7 days, CT changes, rising CRP), sepsis, extrapancreatic infection\n\n**ERCP:** within 24–72h if biliary pancreatitis + cholangitis or persistent biliary obstruction (bile duct stones). Elective cholecystectomy after recovery.\n\n**Hypertriglyceridaemic pancreatitis:** insulin infusion (drives TG into cells) + gemfibrozil/fenofibrate after recovery. Plasmapheresis if TG >11.3 mmol/L.\n\n---\n\n**Complications:**\n- Pancreatic necrosis: CT at 72–96h; infected necrosis → step-up approach (percutaneous drainage → endoscopic/surgical debridement)\n- Pancreatic pseudocyst: encapsulated fluid collection — often resolves; drain if symptomatic, infected, or growing\n- Walled-off necrosis (WON): solid-containing; endoscopic drainage\n- Portal vein/splenic vein thrombosis, pseudoaneurysm\n\n---"

          "title": "Upper GI Bleed — Assessment, Scoring & Management",
          "markdown": "### Causes\n- **Non-variceal:** peptic ulcer (most common ~50%), gastric erosions, Mallory-Weiss tear, Dieulafoy's lesion, upper GI malignancy\n- **Variceal:** oesophageal varices (cirrhosis, portal HTN)\n\n---\n\n### Risk Stratification\n\n**Glasgow-Blatchford Score (GBS)** — used pre-endoscopy; determines if patient can be managed as outpatient\n\n| Variable | Score |\n|---|---|\n| BUN ≥6.5–8.0 | 2 |\n| BUN 8.0–10.0 | 3 |\n| BUN 10.0–25.0 | 4 |\n| BUN ≥25.0 | 6 |\n| Hb 12.0–12.9 (men) / 10.0–11.9 (women) | 1 |\n| Hb 10.0–11.9 (men) | 3 |\n| Hb <10.0 (any) | 6 |\n| SBP 100–109 | 1 |\n| SBP 90–99 | 2 |\n| SBP <90 | 3 |\n| HR ≥100 | 1 |\n| Melaena | 1 |\n| Syncope | 2 |\n| Hepatic disease | 2 |\n| Cardiac failure | 2 |\n\n**GBS = 0:** very low risk — consider outpatient management\n**GBS ≥6:** high risk — admit for urgent endoscopy\n\n**Rockall Score** — used post-endoscopy to predict rebleed/mortality risk\n\n---\n\n### Immediate Management\n\n**Resuscitation:**\n- 2 large-bore IVs, FBC, UEC, LFTs, coag, group & crossmatch, INR\n- 0.9% NaCl to stabilise, then **transfuse packed RBC if Hb <7 g/dL** (target 7–9)\n  - Higher threshold (Hb <8) if: cardiovascular disease, ongoing bleeding\n  - Avoid overtransfusion in variceal bleeds (increases portal pressure → worsens bleeding)\n- FFP if coagulopathy (INR >1.5) + active bleeding\n- Platelets if <50 × 10⁹ + active bleeding\n\n**PPI:**\n- **Pantoprazole or esomeprazole 80 mg IV bolus → 8 mg/hr infusion** (before endoscopy if suspected peptic ulcer)\n- High-dose IV PPI reduces stigmata of recent haemorrhage, rebleed, surgery\n- After endoscopic therapy: IV PPI × 72h, then oral PPI\n\n> [!warning] Do NOT delay endoscopy >24h for stable patients. Immediate endoscopy if haemodynamically unstable after resuscitation.\n\n---\n\n### Endoscopy Timing\n\n| Situation | Timing |\n|---|---|\n| Haemodynamically unstable | Immediate (<12h) after resuscitation |\n| High-risk GBS | Within 24h |\n| Low-risk, stable | Can be outpatient or within 24–48h |\n\n---\n\n### Variceal Bleed (Cirrhosis)\n\n> [!danger] Variceal bleed: mortality ~20–30% per episode in decompensated cirrhosis\n\n**Immediate:**\n- Resuscitate carefully — avoid overtransfusion (↑portal pressure)\n- **Terlipressin 2 mg IV q4–6h** (reduces portal pressure) — start immediately on suspicion, before endoscopy\n  - Alternative: octreotide 50 mcg IV bolus → 50 mcg/hr infusion × 5 days\n- **Ceftriaxone 1g IV OD × 7 days** (SBP + infection prophylaxis — reduces mortality)\n- **Urgent endoscopy** + band ligation (oesophageal varices) or sclerotherapy\n- **Balloon tamponade** (Sengstaken-Blakemore tube): bridge only if endoscopy unavailable/failed; high complication rate\n- **TIPS** (transjugular intrahepatic portosystemic shunt): if refractory bleeding\n\n**Secondary prevention:** propranolol + ISMN (non-selective BB reduces portal pressure) + repeat band ligation q2–4 weeks until eradication\n\n---\n\n### Forrest Classification (endoscopic stigmata — guides rebleed risk)\n\n| Class | Finding | Rebleed Risk | Endoscopic Therapy |\n|---|---|---|---|\n| Ia | Active spurting | >90% | Yes |\n| Ib | Active oozing | ~55% | Yes |\n| IIa | Non-bleeding visible vessel | ~45% | Yes |\n| IIb | Adherent clot | ~22% | Consider |\n| IIc | Haematin/flat pigmented spot | ~7% | No |\n| III | Clean base | ~2% | No |\n\n---"

          "markdown": "### Causes by Age\n\n**Young (<40):** IBD (Crohn's/UC), haemorrhoids, fissure, polyps\n**Middle-aged:** polyps, diverticular disease, IBD\n**Elderly (>60):** diverticular disease (most common), angiodysplasia, colorectal cancer, ischaemic colitis\n\n---\n\n### Assessment\n\n**Resuscitation first:**\n- 2× large-bore IV access | FBC, UEC, coag, crossmatch\n- Transfuse if Hb <70 (target 70–90)\n- Most LGIB (80–85%) stops spontaneously\n\n**Bleeding source localisation:**\n- Haematochezia (fresh/maroon blood PR) → LGIB likely\n- Haematochezia + haemodynamic instability → consider UGIB (brisk upper source)\n  → **Gastroscopy first** if shocked with rectal bleeding\n\n**History clues:**\n- Fresh blood on paper only + straining → haemorrhoids/fissure\n- Blood mixed with stool + mucus → IBD, cancer\n- Painless large-volume bleed → diverticular disease or angiodysplasia\n- Post-meals left iliac fossa pain + bleeding → ischaemic colitis (elderly, vascular disease, constipation)\n- Weight loss + altered bowel habit → colorectal cancer (urgent scope)\n\n---\n\n### Investigations\n\n- Urgent colonoscopy: within 24h if major bleed, or semi-elective if settled\n- CT angiography: if active brisk bleed (>0.5mL/min) and haemodynamically unstable — identifies source for IR embolisation\n- Technetium red cell scan: intermittent slow bleeding not seen on CTA\n\n---\n\n### Management\n\n- Most stop with resuscitation alone\n- **Haemorrhoids:** conservative (high fibre, stool softeners, topical), banding, injection sclerotherapy\n- **Diverticular bleed:** usually stops spontaneously; embolisation if persistent\n- **IBD flare:** treat underlying disease (steroids, biologics)\n- **Colorectal cancer:** surgical referral\n- **Angiodysplasia:** endoscopic argon plasma coagulation or embolisation\n- **Ischaemic colitis:** supportive, bowel rest, treat underlying cause; surgery if full-thickness ischaemia\n\n> [!warning] Red flag symptoms requiring urgent colonoscopy: weight loss, iron deficiency anaemia, rectal bleeding >40 years, family history CRC, change in bowel habit >6 weeks.\n\n---"

          "markdown": "### GORD\n\n**Typical symptoms:** heartburn (retrosternal burning), acid regurgitation, worse after meals/lying down\n**Atypical:** chronic cough, hoarseness, laryngitis, non-cardiac chest pain, globus\n\n> [!warning] Red flag symptoms → urgent endoscopy: dysphagia, odynophagia, weight loss, haematemesis, melaena, anaemia, age >50 new onset, palpable mass\n\n**Management:**\n- **Lifestyle:** elevate head of bed, avoid large meals/late eating, reduce fatty/spicy food, alcohol, caffeine; weight loss\n- **Antacids/alginates:** PRN for mild symptoms\n- **H2 antagonists:** famotidine 20–40 mg BD (ranitidine withdrawn globally)\n- **PPIs (first-line for moderate-severe):**\n  - Omeprazole 20–40 mg OD | Pantoprazole 40 mg OD | Rabeprazole 20 mg OD | Esomeprazole 20–40 mg OD\n  - Take 30 min before meals\n  - Trial 4–8 weeks; step down to lowest effective dose/PRN\n  - Long-term PPI risks: B12 deficiency, hypomagnesaemia, C. difficile, bone density (↓Ca absorption)\n- **Non-erosive reflux disease (NERD):** PPIs work in ~40–60% (lower than erosive disease)\n- **Refractory GORD:** 24h pH impedance study; consider antireflux surgery (Nissen fundoplication) if confirmed\n\n**Barrett's oesophagus:** metaplasia of oesophageal epithelium; surveillance endoscopy; high-grade dysplasia → ablation\n\n---\n\n### Helicobacter pylori\n\n**Indications to test and treat:**\n- Peptic ulcer disease (PUD) — active or past history\n- MALT lymphoma\n- Uninvestigated dyspepsia (test-and-treat strategy in <60, no alarm features)\n- Chronic NSAID use (prior to starting)\n- First-degree relative of gastric cancer patient\n- After resection of early gastric cancer\n\n**Testing:**\n- **Urea breath test** (UBT): best non-invasive; avoid PPIs ×2 weeks, antibiotics ×4 weeks before\n- **Stool antigen test:** good alternative; same preparation\n- **Serology (IgG):** NOT recommended for active infection (cannot distinguish past from current)\n- **Endoscopy + biopsy (CLO test, histology, culture):** if endoscopy indicated\n\n**First-line treatment (clarithromycin resistance ~20% in SG):**\n\n| Regimen | Duration |\n|---|---|\n| **Bismuth quadruple** (preferred in SG given clarithromycin resistance): PPI BD + bismuth subcitrate 120 mg QID + metronidazole 400 mg TDS + tetracycline 500 mg QID | 14 days |\n| **Clarithromycin triple** (if local resistance <15%): PPI BD + amoxicillin 1g BD + clarithromycin 500 mg BD | 14 days |\n| **Concomitant quadruple (non-bismuth)**: PPI BD + amoxicillin 1g BD + clarithromycin 500 mg BD + metronidazole 400 mg BD | 14 days |\n\n**Confirm eradication:** UBT or stool antigen ≥4 weeks after completing antibiotics and ≥2 weeks off PPI\n\n---"

          "slug": "falls-assessment-sg-elderly",
          "title": "Falls Assessment — SG Elderly",
          "markdown": "> [!note] Falls are the leading cause of injury-related death in Singaporeans >65. 1 in 3 elderly fall each year.\n\n### When to Assess\n\n- Any fall requiring medical attention\n- Recurrent falls (≥2 in past year)\n- Fear of falling affecting mobility\n- Abnormal gait or balance on observation\n\n---\n\n### FRAT — Quick Risk Stratification\n\n**High risk (any one):** age ≥80, ≥2 falls in past year, daily walking aid, cognitive impairment, incontinence, postural hypotension\n\n---\n\n### Assessment — Causes to Find\n\n**Intrinsic:**\n- Vision: test acuity, glaucoma, cataracts\n- Cognition: MoCA, MCI or dementia ↑ fall risk 3×\n- Gait/balance: Timed Up and Go (TUG) test — >12 seconds = high fall risk\n- Muscle weakness: sarcopenia (grip strength, sit-to-stand)\n- Postural hypotension: BP lying and standing, 1 and 3 minutes after standing (drop ≥20mmHg systolic = significant)\n- Neuropathy: diabetic, B12 deficiency — impairs proprioception\n- Feet: deformity, calluses, improper footwear\n\n**Extrinsic (environment):**\n- Loose rugs, wet floors, poor lighting, cluttered walkways\n- No grab rails in bathroom\n\n**Medications (biggest modifiable risk factor):**\n- Review all: sedatives/hypnotics (benzodiazepines — high risk), antipsychotics, antihypertensives (postural hypotension), diuretics, opioids, anticholinergics, antidepressants (TCAs)\n- Polypharmacy (≥5 medications): deprescribing review\n\n---\n\n### Management\n\n1. **Medication review** — deprescribe benzodiazepines, sedatives, rationalise antihypertensives\n2. **Physiotherapy** — strength and balance exercises (Otago programme — reduces falls by ~35%)\n3. **Vision correction** — refer ophthalmology\n4. **Home hazard assessment** — occupational therapy\n5. **Vitamin D 800–1000 IU/day** — especially if housebound\n6. **Postural hypotension** — review antihypertensives, adequate hydration, compression stockings, rise slowly\n7. **Hip protectors** — for very high-risk patients\n8. **Osteoporosis treatment** — if fragility fracture occurred (see osteoporosis section)\n\n> [!note] SG resources: Action on Falls — TTSH, CGH, KTPH offer falls prevention programmes. Community Silver Trust funded programmes available for eligible elderly.\n\n---"

          "markdown": "Standardised tools for risk stratification, functional, and cognitive assessment in older adults.\n\n## Performance & Frailty\n\n| Tool | Scale | Use |\n|------|-------|-----|\n| **ECOG** | 0–4 | Functional capacity (0 = asymptomatic, 4 = bedridden) |\n| **Rockwood Frailty Scale** | 1–9 | Fit (1–3), vulnerable (4–5), frail (6–7), severely frail (8–9) |\n| **TUG (Timed Up and Go)** | Seconds | Fall risk (≥12 s = high risk) |\n\n## Cognition\n\n| Tool | Format | Cut-Off |\n|------|--------|---------|\n| **MMSE** | 30 items | <24 = impaired; <18 = moderate; <10 = severe |\n| **MoCA** | 30 items | <26 = MCI (more sensitive than MMSE) |\n| **Mini-Cog** | 3-word recall + clock | Abnormal = impaired |\n| **GDS-15** | 15 items | ≥5 = depression |\n\n## Delirium & Function\n\n**CAM:** Acute + fluctuation + inattention. **Barthel Index (ADLs):** 0–100; <60 needs support. **Lawton IADL:** complex tasks (shopping, meds, finances).\n\nExample: 78yo post-fall → ECOG 1–2, Rockwood 6, TUG >15s (fall risk), MMSE 24 (borderline), CAM negative, Barthel 70 (mild dependence), GDS-15 = 6 (depression).\n"

          "slug": "dementia-screening-management",
          "title": "Dementia — Screening & Management",
          "markdown": "### Common Types\n\n| Type | Features | Key Pathology |\n|---|---|---|\n| Alzheimer's disease (~60–70%) | Insidious onset, memory first, progressive | Amyloid plaques, tau tangles |\n| Vascular dementia (~15–20%) | Stepwise decline, focal deficits, CVD risk factors, post-stroke | Cerebrovascular disease |\n| Lewy body dementia (DLB) | Fluctuating cognition, visual hallucinations, parkinsonism, REM sleep behaviour disorder | Lewy bodies (α-synuclein) |\n| Frontotemporal dementia (FTD) | Behavioural/personality change or language problems; relatively preserved memory early | TDP-43, tau |\n| Mixed | Often AD + vascular | — |\n\n---\n\n### Screening — MMSE & MoCA\n\n- **MMSE** (Mini-Mental State Exam): 0–30. <24 = probable cognitive impairment. Less sensitive for mild cognitive impairment (MCI).\n- **MoCA** (Montreal Cognitive Assessment): 0–30. <26 = cognitive impairment. More sensitive than MMSE for MCI.\n- **Abbreviated Mental Test (AMT-4)**: quick bedside screen (person, place, year, DOB)\n- **Clock-drawing test**: screens for visuospatial and executive dysfunction\n\n---\n\n### Workup (to exclude reversible causes — DEMENTIA mnemonic)\n\n| | Reversible cause |\n|---|---|\n| **D** | Drugs (anticholinergics, opioids, sedatives, polypharmacy) |\n| **E** | Electrolytes (hypoNa, hypoCa) |\n| **M** | Metabolic (thyroid, liver, renal failure) |\n| **E** | Eyes/Ears (sensory deprivation) |\n| **N** | Nutritional (B12, folate, thiamine) |\n| **T** | Tumour/trauma (subdural, brain tumour) |\n| **I** | Infection (neurosyphilis, HIV, HSV encephalitis) |\n| **A** | Atherosclerosis/psychiatric (depression — pseudodementia) |\n\n**Investigations:** FBC, UEC, LFTs, TFTs, calcium, B12, folate, VDRL, glucose | CT/MRI brain | Neuropsychological assessment\n\n---\n\n### Management\n\n**Non-pharmacological (cornerstone):**\n- Structured routine, familiar environment\n- Cognitive stimulation therapy\n- Caregiver support and education\n- Safety: driving assessment, wandering precautions, kitchen safety, medication management\n- Advance care planning early\n\n**Pharmacological:**\n- **Acetylcholinesterase inhibitors (AChEI):** mild-moderate Alzheimer's + DLB\n  - Donepezil 5→10 mg OD (any stage AD)\n  - Rivastigmine 1.5→6 mg BD oral or 4.6→9.5 mg/24h patch (preferred in DLB; also in Parkinson's dementia)\n  - Galantamine 8→16→24 mg OD (SR formulation)\n  - SE: nausea, vomiting, diarrhoea, bradycardia\n- **Memantine** 5→10→15→20 mg OD (NMDA antagonist): moderate-severe AD; can combine with AChEI\n- **No proven pharmacological treatment for vascular dementia or FTD**\n- DLB: **AVOID antipsychotics** (severe neuroleptic sensitivity — can cause irreversible parkinsonism/death); use quetiapine lowest dose if absolutely necessary\n\n**Behavioural and psychological symptoms (BPSD):**\n- First: identify and treat underlying cause (pain, infection, constipation, sensory impairment)\n- Non-pharmacological: redirection, music therapy, environmental modification\n- If pharmacological needed: **quetiapine** (lowest effective dose, shortest duration); consider SSRIs for depression/anxiety in dementia\n\n> [!warning] Singapore context: TTSH Memory Clinic, NUH Memory Clinic, IMH — refer for diagnosis confirmation, neuropsychological testing, and complex management. Check CHAS eligibility for subsidised specialist visits.\n\n\n---"

          "slug": "delirium-acute-confusion",
          "title": "Delirium — Acute Confusion",
          "markdown": "### Definition\nAcute, fluctuating disturbance in attention, awareness, and cognition — not better explained by pre-existing dementia\n\n**Fluctuating course** is the hallmark — distinguishes from dementia (chronic, progressive)\n\n### Subtypes\n- **Hyperactive:** agitated, combative, hallucinating (~25%)\n- **Hypoactive:** withdrawn, quiet, somnolent — often MISSED (~50%) — worse prognosis\n- **Mixed:** (~25%)\n\n---\n\n### CAM (Confusion Assessment Method) — Diagnostic\n\nDelirium = Features 1 AND 2 AND (3 OR 4):\n1. Acute onset + fluctuating course\n2. Inattention\n3. Disorganised thinking\n4. Altered level of consciousness\n\n---\n\n### Causes — PINCH ME\n\n| Letter | Cause |\n|---|---|\n| **P** | Pain |\n| **I** | Infection (UTI, pneumonia, sepsis — most common in elderly) |\n| **N** | Non-pharmacological (constipation, urinary retention, sensory deprivation — glasses/hearing aids) |\n| **C** | Change in environment, sleep deprivation |\n| **H** | Hypo/Hyperglycaemia, Hypothyroidism, Hypoxia, Hypo/Hypernatraemia |\n| **M** | Medication (opioids, benzodiazepines, anticholinergics, steroids, antihistamines, polypharmacy) |\n| **E** | Epilepsy (post-ictal), Electrolyte disturbance |\n\n---\n\n### Workup\n- FBC, UEC, LFTs, calcium, glucose, TFTs, urine dipstick/MCS, blood cultures if febrile\n- CXR, ECG\n- CT head if: new focal signs, head injury, first episode without obvious cause, anticoagulated\n- LP if meningitis/encephalitis suspected\n\n---\n\n### Management\n\n**Non-pharmacological (always first-line):**\n- Re-orientation: visible clock, calendar, familiar faces, daylight\n- Restore sleep-wake cycle: avoid daytime sedatives, noise at night\n- Restore sensory aids: glasses, hearing aids, dentures\n- Early mobilisation, physiotherapy\n- Address pain, constipation, urinary retention\n- Hydration and nutrition\n- Familiar environment; minimise room changes\n\n**Pharmacological (only if patient is a danger to self/others):**\n- **Haloperidol 0.5–1 mg oral/IM** — lowest effective dose; avoid in Parkinson's/Lewy body dementia\n- **Quetiapine 12.5–25 mg oral** (preferred if Parkinson's or Lewy body dementia)\n- **Lorazepam 0.5–1 mg** (alcohol/BZD withdrawal delirium, or if antipsychotic CI)\n\n> [!danger] Benzodiazepines generally WORSEN delirium (except alcohol withdrawal delirium). Use antipsychotics preferentially.\n\n**Monitor:** falls risk, pressure areas, fluid balance, medication review\n\n---"

          "slug": "adult-immunisation-geriatric",
          "title": "Adult Immunisation — Elderly Focus",
          "markdown": "> [!note] Singapore National Adult Immunisation Schedule (NAIS) — focus on adults ≥65y. Subsidised under CHAS for Singapore Citizens/PRs at most polyclinics and GPs.\n\n> [!tip] **Before every encounter** check vaccination status — it's cheap, high-yield preventive care and frequently forgotten in the elderly.\n\n### Priority Vaccines in the Elderly\n\n| Vaccine | Age / Indication | Dose / Schedule | SG notes |\n|---|---|---|---|\n| **Influenza** (inactivated) | ≥65y, or any chronic disease (DM, CKD, cardiac, COPD), HCW, pregnant | **Annually** — NH quadrivalent | Give as soon as new strain available each year |\n| **Pneumococcal — PCV13/15/20** | ≥65y, or high-risk (asplenia, CKD, DM, immunocompromised, CSF leak, cochlear implant) | Single dose | Give PCV first, then PPSV23 ≥1 year later |\n| **Pneumococcal — PPSV23** | As above | Single dose (second dose ≥5y later if very high risk) | Broader serotype coverage, no T-cell memory |\n| **Shingrix** (recombinant zoster) | ≥50y; also immunocompromised ≥19y | **2 doses** 2–6 months apart | **NOT live** — safe in immunocompromised (unlike old Zostavax). ~97% efficacy at 50–69y |\n| **Tdap** (+ subsequent Td) | All adults — one lifetime Tdap, then Td every 10y; additional Tdap in every pregnancy for mother | Single 0.5 mL IM | Many older adults have never had Tdap — ask explicitly |\n| **RSV** (Arexvy / Abrysvo) | ≥75y routine; 60–74y with chronic cardiopulmonary / renal / liver / DM / frailty / NH resident | Single dose (duration of benefit still being defined) | MOH-endorsed ≥60y high-risk; self-pay in most GPs |\n| **COVID-19** | ≥60y, immunocompromised, NH resident | Per current MOH advisories — typically annual booster | Can co-administer with influenza |\n| **Hepatitis B** | If non-immune & ongoing risk (HCW, dialysis, household contact of HBV, MSM) | 3-dose series 0, 1, 6 mo | Check anti-HBs post-series if dialysis/immunocompromised |\n\n### Co-administration & Timing\n\n- **Flu + pneumococcal + shingrix**: can all be given at the same visit (different sites). Practical approach in clinic to minimise return visits.\n- **Live vaccines** in immunocompromised: avoid MMR, varicella, live flu (LAIV), yellow fever. Shingrix and the standard IM flu are **not live** — safe.\n- **Steroid dose matters:** prednisolone ≥20 mg/day for ≥14 days = immunosuppressed. Wait ≥1 month after stopping before any live vaccine.\n\n### Specific Geriatric Pitfalls\n\n- **Frailty / sarcopenia:** immune response wanes — higher-dose flu (Fluzone High-Dose) or adjuvanted flu (Fluad) preferred where accessible.\n- **Nursing home residents:** aim >90% influenza coverage each year; outbreaks drive morbidity.\n- **Post-splenectomy / functional asplenia:** triple cover — pneumococcal + Hib + meningococcal ACWY + B; annual flu; lifetime antibiotic prophylaxis discussion.\n- **Recent live vaccine & biologics:** stop anti-TNF / rituximab ≥3 months before; **inactivated vaccines OK anytime** — do not defer flu for anti-TNF.\n\n### Contraindications / Cautions\n\n| Finding | Implication |\n|---|---|\n| Anaphylaxis to previous dose | Absolute contraindication |\n| Egg allergy | Most modern flu vaccines OK; cell-based alternatives exist |\n| Acute moderate/severe illness | Defer until recovered; mild URTI is NOT a contraindication |\n| GBS within 6 weeks of previous flu vaccine | Relative contraindication — weigh risk |\n| Pregnancy | Live vaccines contraindicated; inactivated + Tdap actively recommended |\n\n---\n\n> [!note] Full Screen-for-Life schedule including paediatric / young adult (HPV, catch-up) is in [[#sg-preventive-care-screen-for-life]].\n"

          "markdown": "> [!note] Screen for Life (MOH) — subsidised at CHAS GP clinics for Singapore Citizens and PRs\n\n### Screening by Condition\n\n| Condition | Who | How often |\n|---|---|---|\n| Diabetes | ≥40 years (earlier if RF) | FBG/HbA1c annually |\n| Hypertension | ≥18 years | BP at every primary care visit |\n| Hyperlipidaemia | ≥40 years | Fasting lipids annually |\n| CRC | ≥50 years | FIT annually OR colonoscopy q10 years |\n| Breast cancer | Women 50–69 | Mammogram q2 years |\n| Cervical cancer | Women 25–29 | Pap smear q3 years |\n| Cervical cancer | Women ≥30 | HPV test q5 years *(preferred)* |\n| Lung cancer | Age 50–74, ≥20 pack-years, current/quit <15yr | LDCT annually |\n| Osteoporosis | Women ≥65, men ≥70 | DEXA scan |\n| HBV | If unvaccinated | HBsAg + anti-HBs; vaccinate if seronegative |\n| HCC | Chronic HBV or cirrhosis | USS + AFP q6 months |\n| CKD | DM or HTN | UEC + UACR annually |\n\n- Positive FIT → colonoscopy within 6–8 weeks\n- HPV vaccine (Gardasil 9): ages 9–26; consider up to 45\n- Stop cervical screening at 65 if ≥3 negative results in past 10 years\n\n---\n\n### National Adult Immunisation Schedule (NAIS)\n\n| Vaccine | Target | Frequency |\n|---|---|---|\n| Influenza | ≥65, DM, CKD, heart/lung disease, HCW | Annually |\n| Pneumococcal (PCV15/20 + PPSV23) | ≥65 or high-risk (DM, CKD, asplenia) | Per schedule |\n| Shingrix (zoster recombinant) | ≥50 years | 2-dose series *(NOT live)* |\n| Tdap | All adults | Every 10 years; every pregnancy |\n| HPV (Gardasil 9) | Up to age 45 if not previously vaccinated | Per schedule |\n| COVID-19 | All | Per MOH advisories |\n\n---\n\n*Last updated: {{date}}*\n*Sources: MOH CPG, GINA 2023, GOLD 2023, KDIGO, AHA/ACC, ESC, Singapore context*\n\n---"

          "slug": "blood-transfusion-indications-thresholds-reactions",
          "title": "Blood Transfusion — Indications, Thresholds & Reactions",
          "markdown": "### Transfusion Thresholds\n\n| Clinical Context | Trigger Hb | Target Hb |\n|---|---|---|\n| General hospital (stable) | <70 g/L | 70–90 g/L |\n| Cardiovascular disease / ACS | <80 g/L | 80–100 g/L |\n| Active haemorrhage | Clinical (haemodynamic instability) | Haemostasis first |\n| Pre-op (elective surgery) | <80 g/L usually | >80–100 |\n| ICU (no active haemorrhage) | <70 g/L | 70–90 g/L |\n\n> [!note] Restrictive strategy (transfuse at Hb <70) = equivalent or superior to liberal in most patients (TRICC, TRISS trials). Avoid unnecessary transfusions.\n\n---\n\n### Blood Products\n\n| Product | Volume/Unit | Increment | Indication |\n|---|---|---|---|\n| Packed RBC | ~250 mL | Hb ↑~10 g/L per unit | Anaemia, haemorrhage |\n| Platelets (1 adult dose = 5 units pooled or 1 apheresis) | ~250–300 mL | Plt ↑~25–50 × 10⁹ | Plt <10 (prophylactic) or <50 + active bleeding/surgery |\n| FFP (Fresh Frozen Plasma) | ~250 mL | INR correction | Coagulopathy + active bleeding; INR >1.5 |\n| Cryoprecipitate | ~40 mL/unit (5–10 units) | Fibrinogen ↑ | Fibrinogen <1.5 + bleeding; DIC; haemophilia A |\n| Albumin | 4% or 20% | — | See fluid section |\n\n---\n\n### Massive Haemorrhage Protocol (MHP)\n\n**Trigger:** transfusion of ≥10 units pRBC in 24h, or anticipated\n\n**Ratio:** 1 pRBC : 1 FFP : 1 platelet pool (1:1:1 ratio = damage control resuscitation)\n\n**Adjuncts:**\n- **Tranexamic acid (TXA):** 1g IV over 10 min within 3h of injury → 1g IV over 8h (CRASH-2 trial); reduces mortality in trauma. Also use in post-partum haemorrhage.\n- **Fibrinogen concentrate or cryoprecipitate** if fibrinogen <1.5 g/L\n- **Calcium chloride** 10 mL 10% IV per 4 units pRBC (calcium chelated by citrate in stored blood)\n- **Avoid:** hypothermia, acidosis, hypocalcaemia (the lethal triad of trauma coagulopathy)\n\n---\n\n### Transfusion Reactions\n\n| Reaction | Timing | Features | Management |\n|---|---|---|---|\n| **Acute haemolytic** | During/immediately | Fever, rigors, back pain, haemoglobinuria, ↓BP, DIC | **STOP transfusion immediately.** Supportive, IV fluids, monitor renal function. Send blood to lab. |\n| **Febrile non-haemolytic (FNHTR)** | During | Fever, rigors — no haemolysis | Slow or stop. Paracetamol. Usually can restart if mild. |\n| **Allergic/urticarial** | During | Urticaria, pruritus | Slow transfusion. Chlorphenamine 10 mg IV. Continue if mild. |\n| **Anaphylaxis** | Minutes | Urticaria + hypotension + bronchospasm | **STOP. Adrenaline 0.5 mg IM. Resuscitate.** |\n| **TACO** (Transfusion-associated circulatory overload) | During/2h after | Dyspnoea, ↑BP, pulmonary oedema, ↑BNP | Stop/slow. Furosemide. Sit up. O₂. |\n| **TRALI** (Transfusion-related acute lung injury) | Within 6h | Non-cardiogenic pulmonary oedema, ↓SpO₂, bilateral infiltrates, fever, ↓BP | Stop. O₂, supportive. ICU if severe. |\n| **Delayed haemolytic** | 3–14 days | Mild haemolysis, ↓Hb, jaundice | Usually self-limiting. Monitor. |\n| **Transfusion-associated GvHD** | 1–6 weeks | Rash, diarrhoea, pancytopenia, liver dysfunction | Irradiated blood for immunocompromised patients |\n\n---"

        {
          "slug": "anaemia",
          "title": "Anaemia — Microcytic, Normocytic, Macrocytic",
          "markdown": "Start with FBC → **MCV** → further tests. Symptoms: fatigue, dyspnoea, pallor, palpitations, angina in known CAD.\n\n> [!tip] Most GP anaemia is iron deficiency in menstruating women, occult GI loss in men/post-menopausal women (always investigate), or B12/folate deficiency. New IDA in a man or post-menopausal woman = colonoscopy.\n\n### Microcytic anaemia (MCV <80)\n\n| Cause | Ferritin | Iron / TIBC | Other |\n|---|---|---|---|\n| **Iron deficiency (IDA)** | ↓ (<30 = diagnostic; <100 + inflammation = possible) | ↓ iron, ↑ TIBC, ↓ transferrin sat (<20%) | ↑ RDW, pencil cells |\n| **Thalassaemia trait** | Normal or ↑ | Normal | Disproportionately ↓ MCV for mild anaemia, ↑ RBC count, ↑ HbA2 (β-thal) on electrophoresis |\n| **Anaemia of chronic disease** | Normal or ↑ | ↓ iron, ↓ TIBC, normal sat | CRP ↑, ferritin is acute-phase reactant |\n| **Sideroblastic (rare)** | ↑ | ↑ sat | Ring sideroblasts on marrow |\n\n**IDA workup:**\n\n- **History:** menstrual loss, GI symptoms, diet, NSAIDs, family history thalassaemia\n- **Tests:** ferritin, iron studies, reticulocytes, FOBT/FIT, coeliac serology (tTG IgA + total IgA), consider H. pylori\n- **>50 y or red flags (weight loss, PR bleed, FHx) → OGD + colonoscopy.** New IDA in an adult **male** or post-menopausal **female** is colorectal cancer until proven otherwise.\n- Thalassaemia screen (Hb electrophoresis) — essential in SG/SEA patients with microcytosis, and for partner screening before pregnancy\n\n**Treatment:**\n\n- **Oral iron:** ferrous sulphate 200 mg OD–TDS (65 mg elemental/tab) or ferrous fumarate. Take with vit C, empty stomach; avoid with tea/calcium/PPI. Continue 3 months after Hb normalises to replenish stores.\n- **Alternate-day** dosing (every other day) may ↑ absorption, ↓ side effects (Hepcidin escape).\n- **IV iron** (ferric carboxymaltose, iron sucrose) if: intolerance, malabsorption, CKD, functional deficiency, severe deficiency.\n\n### Macrocytic anaemia (MCV >100)\n\n**Megaloblastic (B12 / folate):**\n\n- **B12 deficiency** — causes: pernicious anaemia (anti-IF / anti-parietal cell Abs), vegan diet, gastric surgery, ileal disease (Crohn's), **metformin** (chronic use), PPIs, H₂ blockers. Symptoms: glossitis, peripheral neuropathy, SACD (dorsal columns → proprioception, ataxia), cognitive change.\n- **Folate deficiency** — dietary, alcoholism, haemolysis, pregnancy, drugs (methotrexate, phenytoin, trimethoprim).\n\n> [!warning] Correct **B12 before folate** in combined deficiency — folate alone can precipitate/worsen subacute combined degeneration.\n\n**Treatment:**\n\n- **B12:** hydroxocobalamin 1 mg IM alternate days × 2 weeks (or until neuro improvement plateaus), then 1 mg IM q3 months lifelong if pernicious / malabsorption. Oral 1 mg/day an alternative if dietary cause and no neuro signs.\n- **Folate:** folic acid 5 mg OD for 4 months (life-long in haemolysis / chronic causes).\n\n**Non-megaloblastic macrocytosis:**\n\n- Alcohol (commonest — direct marrow toxicity, often no anaemia)\n- Hypothyroidism\n- Liver disease\n- Reticulocytosis (haemolysis, acute blood loss)\n- **Myelodysplastic syndrome (MDS)** — elderly, persistent macrocytosis ± cytopenia ± dysplastic cells → refer haematology\n- Drugs: methotrexate, hydroxycarbamide, zidovudine\n\n### Normocytic anaemia (MCV 80–100)\n\n- **Acute blood loss** — history, reticulocytosis within days\n- **Haemolysis** — screen: ↑ reticulocytes, ↑ LDH, ↑ unconjugated bilirubin, ↓ haptoglobin. **DAT (Coombs)** distinguishes immune (positive) from non-immune (negative). Blood film for schistocytes (MAHA), spherocytes (hereditary spherocytosis, AIHA), sickle cells.\n- **Anaemia of CKD** — EPO deficiency. Treat with darbepoetin / epoetin if Hb <100 once iron replete.\n- **Mixed deficiencies** — look for ↑ RDW\n- **Marrow failure / infiltration** → pancytopenia, refer haematology\n\n### When to refer\n\n- Suspected haematological malignancy (pancytopenia, blasts on film, unexplained pancytopenia)\n- Haemolysis without obvious cause\n- MDS suspicion (persistent macrocytosis ± cytopenia in elderly)\n- Pregnant patient with significant anaemia / partner with haemoglobinopathy trait\n"
